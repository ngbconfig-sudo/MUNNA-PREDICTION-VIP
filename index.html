<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOD MOD - LIVE SYNC</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --god-gold: #ffcc00;
            --deep-red: #ff003c;
            --neon-green: #00ff41;
            --bg-black: #080808;
        }

        body {
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-transform: uppercase;
        }

        .god-container {
            width: 360px;
            background: rgba(10, 10, 10, 0.98);
            border: 2px solid var(--god-gold);
            box-shadow: 0 0 40px rgba(255, 204, 0, 0.2);
            padding: 25px;
            border-radius: 25px;
            text-align: center;
            position: relative;
        }

        .god-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            color: var(--god-gold);
            text-shadow: 0 0 10px var(--god-gold);
            margin-bottom: 20px;
            letter-spacing: 3px;
        }

        /* Period & Seconds Styling */
        .status-panel {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #222;
        }

        .label { font-size: 10px; color: #666; letter-spacing: 2px; }
        
        #livePeriod { 
            font-family: 'Orbitron', sans-serif;
            font-size: 18px; 
            color: #fff; 
            margin: 5px 0;
            display: block;
        }

        .timer-box {
            margin-top: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            color: var(--deep-red);
            text-shadow: 0 0 10px var(--deep-red);
        }

        .input-section input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: var(--god-gold);
            padding: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .display-area {
            height: 140px;
            background: radial-gradient(circle, #111, #000);
            border: 1px solid #222;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-radius: 15px;
        }

        #mainRes { 
            font-family: 'Orbitron', sans-serif;
            font-size: 50px; 
            font-weight: 900; 
            margin: 0; 
            color: #1a1a1a; 
        }

        .dual-numbers { font-size: 18px; font-weight: bold; color: #444; }

        .btn-execute {
            width: 100%;
            padding: 18px;
            background: var(--god-gold);
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 204, 0, 0.2);
        }

        .btn-execute:disabled { background: #222; color: #444; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="god-container">
    <div class="god-header">GOD MOD</div>
    
    <div class="status-panel">
        <span class="label">ACTIVE PERIOD</span>
        <span id="livePeriod">SYNCING...</span>
        
        <div class="label" style="margin-top: 10px;">TIME REMAINING</div>
        <div class="timer-box" id="secondsCounter">00:60</div>
    </div>

    <div class="input-section">
        <label class="label" style="display: block; margin-bottom: 5px;">LAST NO. INPUT</label>
        <input type="number" id="lastNum" placeholder="0-9">
    </div>

    <div class="display-area">
        <p id="mainRes">READY</p>
        <div class="dual-numbers" id="numArea">CHANCE: ? & ?</div>
    </div>

    <button class="btn-execute" id="scanBtn" onclick="startScan()">EXECUTE SCAN</button>
</div>

<script>
    let lockedData = null;
    let currentPeriodID = "";

    function updateSystem() {
        const now = new Date();
        const seconds = now.getSeconds();
        const remainingSeconds = 60 - seconds;

        // Period ID Logic
        const dateStr = now.getFullYear() + 
                        String(now.getMonth() + 1).padStart(2, '0') + 
                        String(now.getDate()).padStart(2, '0');
        const minIndex = now.getHours() * 60 + now.getMinutes();
        const periodID = `${dateStr}1000${String(10000 + minIndex).slice(-5)}`;

        // Update Period
        const periodDisplay = document.getElementById('livePeriod');
        if(periodDisplay.innerText !== periodID) {
            periodDisplay.innerText = periodID;
            currentPeriodID = periodID;
            unlock();
        }

        // Update Seconds Counter
        document.getElementById('secondsCounter').innerText = `00:${String(remainingSeconds).padStart(2, '0')}`;
        
        // Timer color change alert (Red if < 10s)
        const timerBox = document.getElementById('secondsCounter');
        timerBox.style.color = remainingSeconds <= 10 ? "#ff003c" : "#ffcc00";
    }

    function unlock() {
        lockedData = null;
        document.getElementById('scanBtn').disabled = false;
        document.getElementById('scanBtn').innerText = "EXECUTE SCAN";
        document.getElementById('mainRes').style.color = "#1a1a1a";
    }

    setInterval(updateSystem, 1000);
    updateSystem();

    function startScan() {
        const input = document.getElementById('lastNum').value;
        const mainRes = document.getElementById('mainRes');
        const numArea = document.getElementById('numArea');
        const btn = document.getElementById('scanBtn');

        if(input === "" || input > 9) {
            alert("Pehle valid number daalo!");
            return;
        }

        if(lockedData && lockedData.id === currentPeriodID) return;

        btn.disabled = true;
        btn.innerText = "SCANNING...";
        mainRes.innerText = "WAIT";
        mainRes.style.color = "var(--god-gold)";

        setTimeout(() => {
            let resType = Math.random() > 0.5 ? "BIG" : "SMALL";
            let n1, n2;

            if(resType === "BIG") {
                const b = [5,6,7,8,9].sort(() => Math.random() - 0.5);
                n1 = b[0]; n2 = b[1];
                mainRes.style.color = "var(--neon-green)";
            } else {
                const s = [0,1,2,3,4].sort(() => Math.random() - 0.5);
                n1 = s[0]; n2 = s[1];
                mainRes.style.color = "var(--deep-red)";
            }

            lockedData = { id: currentPeriodID };
            mainRes.innerText = resType;
            numArea.innerHTML = `CHANCE: <span style="color:#fff">${n1}</span> & <span style="color:#fff">${n2}</span>`;
            btn.innerText = "LOCKED";
        }, 2000);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUNNA VIP - RESULT ENTRY</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --system-green: #00ff88;
            --warning-red: #ff3131;
            --violet: #b659ff;
            --gold: #ffcf33;
            --dark-bg: #00050a;
        }

        body {
            margin: 0; background: var(--dark-bg); color: #fff;
            font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 10px;
        }

        .system-card {
            background: rgba(255,255,255,0.03); backdrop-filter: blur(25px);
            border: 2px solid rgba(0, 210, 255, 0.3); padding: 22px; border-radius: 40px;
            width: 100%; max-width: 380px; text-align: center;
        }

        /* TIMER & PERIOD */
        .data-panel {
            background: rgba(0,0,0,0.7); padding: 10px; border-radius: 15px;
            margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05);
        }

        .val { font-size: 1.1rem; font-weight: bold; color: var(--neon-blue); }

        /* PREDICTION BOX */
        .pred-box {
            margin: 15px 0; padding: 15px; border-radius: 25px;
            background: rgba(255,255,255,0.02); border: 1px solid rgba(0, 210, 255, 0.2);
        }
        #predictionText { font-size: 3.2rem; font-weight: 900; margin: 0; text-shadow: 0 0 20px var(--neon-blue); }
        #colorText { font-size: 1.1rem; font-weight: bold; margin-top: 5px; }

        /* 5S INPUT WINDOW OVERLAY */
        #inputTimer {
            display: none; font-size: 0.8rem; color: var(--gold);
            margin-bottom: 10px; font-weight: bold; text-transform: uppercase;
        }

        .btn-main {
            background: linear-gradient(135deg, #00d2ff, #0077ff);
            color: white; border: none; padding: 16px; border-radius: 18px;
            width: 100%; font-size: 1.1rem; font-weight: bold; cursor: pointer;
        }

        /* NUMBER GRID */
        .manual-section { 
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 25px; 
            margin-top: 15px; position: relative;
        }
        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; }
        
        .n-btn {
            aspect-ratio: 1; border: none; border-radius: 10px; color: #fff;
            font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: 0.2s;
        }
        .n-red { background: var(--warning-red); }
        .n-green { background: var(--system-green); }
        .n-violet { background: linear-gradient(135deg, var(--warning-red), var(--violet)); }
        .n-violet-g { background: linear-gradient(135deg, var(--system-green), var(--violet)); }

        .history-list { margin-top: 15px; text-align: left; max-height: 120px; overflow-y: auto; font-size: 0.75rem; }
        .h-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #111; }
    </style>
</head>
<body>

<div class="system-card">
    <div style="font-size: 0.65rem; color: var(--gold); margin-bottom: 10px; font-weight: bold;">● AI REAL-TIME DATA TRACKER</div>
    
    <div class="data-panel">
        <div id="periodTxt" class="val">SYNCING...</div>
        <div id="timerTxt" style="color: var(--system-green); font-size: 1.4rem;">00:60</div>
    </div>

    <div class="pred-box">
        <div id="predictionText">READY</div>
        <div id="colorText">COLOR: --</div>
    </div>

    <div id="inputTimer">WINDOW: ENTER LAST RESULT</div>

    <button class="btn-main" id="predictBtn" onclick="generateNextSignal()">ANALYZE NEXT ROUND</button>

    <div class="manual-section" id="entryArea">
        <div style="font-size: 0.6rem; color: #5a7d9a; font-weight: bold;">SELECT RESULT (0-9)</div>
        <div class="num-grid" id="grid">
            <button class="n-btn n-violet" onclick="submitResult(0)">0</button>
            <button class="n-btn n-green" onclick="submitResult(1)">1</button>
            <button class="n-btn n-red" onclick="submitResult(2)">2</button>
            <button class="n-btn n-green" onclick="submitResult(3)">3</button>
            <button class="n-btn n-red" onclick="submitResult(4)">4</button>
            <button class="n-btn n-violet-g" onclick="submitResult(5)">5</button>
            <button class="n-btn n-red" onclick="submitResult(6)">6</button>
            <button class="n-btn n-green" onclick="submitResult(7)">7</button>
            <button class="n-btn n-red" onclick="submitResult(8)">8</button>
            <button class="n-btn n-green" onclick="submitResult(9)">9</button>
        </div>
    </div>

    <div class="history-list" id="hLog"></div>
</div>

<script>
    let currentP = "";
    let hData = [];
    let lastP = null;
    let isWindowOpen = false;

    function sync() {
        const ist = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Kolkata"}));
        const sec = ist.getSeconds();
        const rem = 60 - sec;
        let elapsed = (ist.getHours() * 60 + ist.getMinutes()) - (5 * 60 + 29);
        const pStr = ist.getFullYear() + String(ist.getMonth() + 1).padStart(2, '0') + 
                     String(ist.getDate()).padStart(2, '0') + "100001" + String(elapsed).padStart(4, '0');
        
        document.getElementById('periodTxt').innerText = pStr;
        document.getElementById('timerTxt').innerText = "00:" + String(rem).padStart(2, '0');

        // Logic: Jab period change ho, 5 second ka time do result dalne ke liye
        if (pStr !== currentP) {
            currentP = pStr;
            openInputWindow();
        }
    }
    setInterval(sync, 1000);

    function openInputWindow() {
        isWindowOpen = true;
        const timerLabel = document.getElementById('inputTimer');
        const grid = document.getElementById('grid');
        
        timerLabel.style.display = "block";
        grid.style.opacity = "1";
        grid.style.pointerEvents = "auto";

        let count = 5;
        const clock = setInterval(() => {
            timerLabel.innerText = `ENTRY WINDOW: ${count}S LEFT`;
            count--;
            if(count < 0) {
                clearInterval(clock);
                closeInputWindow();
            }
        }, 1000);
    }

    function closeInputWindow() {
        isWindowOpen = false;
        document.getElementById('inputTimer').style.display = "none";
        document.getElementById('grid').style.opacity = "0.3";
        document.getElementById('grid').style.pointerEvents = "none";
        document.getElementById('predictionText').innerText = "READY";
        document.getElementById('predictBtn').disabled = false;
    }

    function generateNextSignal() {
        const res = document.getElementById('predictionText');
        const col = document.getElementById('colorText');
        res.innerText = "WAIT...";
        
        setTimeout(() => {
            let next = (Math.random() > 0.5) ? "BIG" : "SMALL";
            let cSuggest = (next === "BIG") ? "GREEN" : "RED";
            
            // Accuracy Factor
            if(hData.length >= 2 && hData[0].type === hData[1].type) next = hData[0].type;

            res.innerText = next;
            res.style.color = (next === "BIG") ? "var(--system-green)" : "var(--warning-red)";
            col.innerText = "COLOR: " + cSuggest;
            col.style.color = (cSuggest === "GREEN") ? "var(--system-green)" : "var(--warning-red)";
            
            lastP = next;
            document.getElementById('predictBtn').disabled = true;
        }, 1200);
    }

    function submitResult(n) {
        if(!isWindowOpen) return;
        let type = (n >= 5) ? "BIG" : "SMALL";
        let status = "NEW DATA";

        if(lastP) {
            status = (lastP === type) ? "WIN ✅" : "LOSS ❌";
        }

        hData.unshift({type: type, num: n});
        const log = document.getElementById('hLog');
        log.innerHTML = `<div class="h-item">
            <span>P: ${currentP.slice(-3)}</span>
            <span style="font-weight:900; color:${type === 'BIG' ? '#00ff88' : '#ff3131'}">${n} (${type})</span>
            <span style="color:${status.includes('WIN') ? '#00ff88' : '#ff3131'}">${status}</span>
        </div>` + log.innerHTML;

        lastP = null;
        closeInputWindow(); // Result milte hi window band karo
        if (navigator.vibrate) navigator.vibrate(60);
    }
</script>

</body>
</html>

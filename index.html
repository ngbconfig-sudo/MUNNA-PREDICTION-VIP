<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUNNA VIP - PERIOD FIX</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --system-green: #00ff88;
            --warning-red: #ff3131;
            --violet: #b659ff;
            --gold: #ffcf33;
            --dark-bg: #00050a;
        }

        body {
            margin: 0; background: var(--dark-bg); color: #fff;
            font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 10px;
        }

        .system-card {
            background: rgba(255,255,255,0.03); backdrop-filter: blur(25px);
            border: 2px solid rgba(0, 210, 255, 0.3); padding: 22px; border-radius: 40px;
            width: 100%; max-width: 380px; text-align: center;
        }

        .data-panel {
            background: rgba(0,0,0,0.7); padding: 10px; border-radius: 15px;
            margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05);
        }

        .val { font-size: 1rem; font-weight: bold; color: var(--neon-blue); font-family: monospace; }

        .pred-box {
            margin: 15px 0; padding: 15px; border-radius: 25px;
            background: rgba(255,255,255,0.02); border: 1px dashed rgba(0, 210, 255, 0.4);
        }
        #predictionText { font-size: 3.2rem; font-weight: 900; margin: 0; text-shadow: 0 0 20px var(--neon-blue); }
        #colorText { font-size: 1.1rem; font-weight: bold; margin-top: 5px; letter-spacing: 2px; }

        .btn-main {
            background: linear-gradient(135deg, #00d2ff, #0077ff);
            color: white; border: none; padding: 16px; border-radius: 18px;
            width: 100%; font-size: 1.1rem; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        .manual-section { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 25px; margin-top: 15px; }
        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; }
        
        .n-btn {
            aspect-ratio: 1; border: none; border-radius: 10px; color: #fff;
            font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: 0.2s;
        }
        .n-red { background: var(--warning-red); }
        .n-green { background: var(--system-green); }
        .n-violet { background: linear-gradient(135deg, var(--warning-red), var(--violet)); }
        .n-violet-g { background: linear-gradient(135deg, var(--system-green), var(--violet)); }

        #inputWindowMsg { display: none; font-size: 0.75rem; color: var(--gold); margin-bottom: 5px; font-weight: bold; }

        .history-list { margin-top: 15px; text-align: left; max-height: 120px; overflow-y: auto; font-size: 0.75rem; border-top: 1px solid #222; padding-top: 10px; }
        .h-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #111; }
    </style>
</head>
<body>

<div class="system-card">
    <div style="font-size: 0.65rem; color: var(--gold); margin-bottom: 8px; font-weight: bold;">● MUNNA VIP PRO V6 (FIXED)</div>
    
    <div class="data-panel">
        <div id="periodTxt" class="val">SYNCING...</div>
        <div id="timerTxt" style="color: var(--system-green); font-size: 1.4rem;">00:60</div>
    </div>

    <div class="pred-box">
        <div id="predictionText">READY</div>
        <div id="colorText">COLOR: --</div>
    </div>

    <div id="inputWindowMsg">FEED PREVIOUS RESULT (5s)</div>

    <button class="btn-main" id="predictBtn" onclick="getSignal()">GET MULTI-SIGNAL</button>

    <div class="manual-section" id="gridArea">
        <div style="font-size: 0.6rem; color: #5a7d9a; font-weight: bold;">SELECT RESULT (0-9)</div>
        <div class="num-grid" id="numGrid">
            <button class="n-btn n-violet" onclick="recordResult(0)">0</button>
            <button class="n-btn n-green" onclick="recordResult(1)">1</button>
            <button class="n-btn n-red" onclick="recordResult(2)">2</button>
            <button class="n-btn n-green" onclick="recordResult(3)">3</button>
            <button class="n-btn n-red" onclick="recordResult(4)">4</button>
            <button class="n-btn n-violet-g" onclick="recordResult(5)">5</button>
            <button class="n-btn n-red" onclick="recordResult(6)">6</button>
            <button class="n-btn n-green" onclick="recordResult(7)">7</button>
            <button class="n-btn n-red" onclick="recordResult(8)">8</button>
            <button class="n-btn n-green" onclick="recordResult(9)">9</button>
        </div>
    </div>

    <div class="history-list" id="hLog"></div>
</div>

<script>
    let currentP = "";
    let prevP = ""; // Store the period that just ended
    let activePred = null;
    let stack = [];
    let windowActive = false;

    function sync() {
        const ist = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Kolkata"}));
        const sec = ist.getSeconds();
        const rem = 60 - sec;
        let elapsed = (ist.getHours() * 60 + ist.getMinutes()) - (5 * 60 + 29);
        const pStr = ist.getFullYear() + String(ist.getMonth() + 1).padStart(2, '0') + 
                     String(ist.getDate()).padStart(2, '0') + "100001" + String(elapsed).padStart(4, '0');
        
        document.getElementById('periodTxt').innerText = pStr;
        document.getElementById('timerTxt').innerText = "00:" + String(rem).padStart(2, '0');

        if (pStr !== currentP) {
            prevP = currentP; // Current becomes previous
            currentP = pStr;
            if(prevP !== "") startInputWindow();
        }
    }
    setInterval(sync, 1000);

    function startInputWindow() {
        windowActive = true;
        const msg = document.getElementById('inputWindowMsg');
        const grid = document.getElementById('numGrid');
        msg.style.display = "block";
        grid.style.opacity = "1";
        grid.style.pointerEvents = "auto";

        let timer = 5;
        const count = setInterval(() => {
            msg.innerText = `FEED PREVIOUS RESULT (${timer}S)`;
            timer--;
            if(timer < 0) {
                clearInterval(count);
                stopInputWindow();
            }
        }, 1000);
    }

    function stopInputWindow() {
        windowActive = false;
        document.getElementById('inputWindowMsg').style.display = "none";
        document.getElementById('numGrid').style.opacity = "0.3";
        document.getElementById('numGrid').style.pointerEvents = "none";
        document.getElementById('predictionText').innerText = "READY";
        document.getElementById('predictBtn').disabled = false;
    }

    function getSignal() {
        const res = document.getElementById('predictionText');
        const col = document.getElementById('colorText');
        res.innerText = "WAIT...";
        
        setTimeout(() => {
            let nextSide = (Math.random() > 0.5) ? "BIG" : "SMALL";
            // Simple trend logic
            if(stack.length >= 2 && stack[0].type === stack[1].type) nextSide = stack[0].type;
            
            let nextCol = (nextSide === "BIG") ? "GREEN" : "RED";

            res.innerText = nextSide;
            res.style.color = (nextSide === "BIG") ? "var(--system-green)" : "var(--warning-red)";
            col.innerText = "COLOR: " + nextCol;
            col.style.color = (nextCol === "GREEN") ? "var(--system-green)" : "var(--warning-red)";
            
            activePred = { period: currentP, type: nextSide };
            document.getElementById('predictBtn').disabled = true;
        }, 1200);
    }

    function recordResult(n) {
        if(!windowActive) return;
        let type = (n >= 5) ? "BIG" : "SMALL";
        let status = "NEW DATA";

        // Logic check: Match result of PREVIOUS period with prediction made for it
        if(activePred && activePred.period === prevP) {
            status = (activePred.type === type) ? "WIN ✅" : "LOSS ❌";
        }

        stack.unshift({type: type, num: n});
        const log = document.getElementById('hLog');
        log.innerHTML = `<div class="h-item">
            <span>P: ${prevP.slice(-3)}</span>
            <span style="font-weight:900; color:${type === 'BIG' ? '#00ff88' : '#ff3131'}">${n} (${type})</span>
            <span style="color:${status.includes('WIN') ? '#00ff88' : '#ff3131'}">${status}</span>
        </div>` + log.innerHTML;

        activePred = null; 
        stopInputWindow();
        if (navigator.vibrate) navigator.vibrate(60);
    }
</script>

</body>
</html>

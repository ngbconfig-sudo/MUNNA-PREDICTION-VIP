<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUNNA PREDICTION VIP</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .container {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #00ff41;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.4);
            width: 85%;
            max-width: 380px;
        }

        /* Updated Name Header */
        h2 { 
            font-size: 1.4rem; 
            margin-bottom: 20px; 
            color: #00ff41;
            text-shadow: 0 0 15px #00ff41;
            letter-spacing: 2px;
        }

        .label { font-size: 0.8rem; color: #888; text-transform: uppercase; }

        .display-box {
            background: #0a0a0a;
            border: 1px solid #00ff41;
            padding: 12px;
            margin: 8px 0 18px 0;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 8px;
        }

        #resultView {
            font-size: 1.6rem;
            margin: 20px 0;
            min-height: 45px;
            font-weight: 900;
        }

        button {
            background: #00ff41;
            color: #000;
            border: none;
            padding: 15px 40px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.1rem;
            box-shadow: 0 0 10px #00ff41;
            transition: 0.2s;
        }

        button:active { transform: scale(0.9); box-shadow: 0 0 5px #00ff41; }

        .tg-link {
            margin-top: 25px;
            display: inline-block;
        }
        .tg-link img { width: 45px; filter: drop-shadow(0 0 5px #00ff41); }

    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <div class="container">
        <h2>MUNNA PREDICTION VIP</h2>

        <div class="label">Current Period</div>
        <div id="periodNumber" class="display-box">----------</div>

        <div class="label">Time Remaining</div>
        <div id="timerView" class="display-box">00:00</div>

        <div id="resultView">WAITING...</div>

        <button onclick="getVipPrediction()">GENERATE VIP</button>

        <div class="tg-link">
            <a href="https://t.me/YOUR_TELEGRAM_CHANNEL" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="Telegram">
            </a>
        </div>
    </div>

    <script>
        // Matrix Falling Numbers Effect
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const nums = "0123456789";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ff41";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = nums.charAt(Math.floor(Math.random() * nums.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 35);

        // Period Logic (Java to JS Conversion)
        function updateVIPData() {
            const now = new Date();
            const ist = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Kolkata"}));
            
            const sec = ist.getSeconds();
            const remain = 60 - sec;
            
            const h = ist.getHours();
            const m = ist.getMinutes();
            
            let elapsed = (h * 60 + m) - (5 * 60 + 29);
            if (elapsed < 0) elapsed = 0;

            const yyyy = ist.getFullYear();
            const mm = String(ist.getMonth() + 1).padStart(2, '0');
            const dd = String(ist.getDate()).padStart(2, '0');
            
            const periodFinal = yyyy + mm + dd + "100001" + String(elapsed).padStart(4, '0');
            
            document.getElementById('periodNumber').innerText = periodFinal;
            document.getElementById('timerView').innerText = "00:" + String(remain).padStart(2, '0');
        }
        setInterval(updateVIPData, 1000);

        // Prediction Function
        function getVipPrediction() {
            const res = document.getElementById('resultView');
            res.innerText = "CALCULATING...";
            res.style.color = "#00ff41";

            setTimeout(() => {
                const options = ["BIG (GREEN)", "SMALL (RED)", "BIG (RED)", "SMALL (GREEN)"];
                const pick = options[Math.floor(Math.random() * options.length)];
                res.innerText = pick;
                
                if(pick.includes("GREEN")) res.style.color = "#00ff41";
                else res.style.color = "#ff3131";
            }, 800);
        }
    </script>
</body>
</html>

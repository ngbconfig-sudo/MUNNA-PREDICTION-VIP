<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUNNA VIP V58 FINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        :root { --gold: #ffcf33; --red: #ff3131; --green: #00ff88; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .vip-card { 
            width: 94%; max-width: 380px; background: linear-gradient(180deg, #111, #000);
            border: 2px solid var(--gold); border-radius: 30px; padding: 15px; text-align: center;
            box-shadow: 0 0 30px rgba(255,207,51,0.2);
        }

        .header { font-family: 'Orbitron'; color: var(--gold); font-size: 0.9rem; margin-bottom: 10px; }
        
        .stats { display: flex; justify-content: space-around; margin-bottom: 10px; }
        .s-box { background: #111; padding: 5px 15px; border-radius: 10px; border: 1px solid #333; }
        .s-val { display: block; font-size: 1.2rem; font-weight: 900; color: var(--green); }
        .s-lbl { font-size: 0.6rem; color: #777; }

        .slots { display: flex; justify-content: center; gap: 6px; margin-bottom: 15px; }
        .slot { width: 42px; height: 42px; border: 2px solid #333; border-radius: 12px; line-height: 40px; font-weight: 900; font-size: 1.4rem; color: #444; }
        .slot.active { border-color: var(--gold); color: var(--gold); background: rgba(255,207,51,0.1); }

        .display { background: #000; border: 1px solid #222; border-radius: 20px; padding: 15px; margin-bottom: 15px; }
        #period { font-size: 0.7rem; color: #555; margin-bottom: 5px; }
        #timer { font-size: 1.8rem; color: var(--green); font-family: monospace; }
        #prediction { font-size: 4.5rem; font-weight: 900; line-height: 1; color: #111; margin: 5px 0; }

        .btn-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 12px; }
        .n-btn { height: 42px; border: none; border-radius: 10px; color: #fff; font-weight: 900; font-size: 1.1rem; cursor: pointer; }
        .r { background: var(--red); } .g { background: var(--green); } .v { background: #b659ff; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .c-btn { padding: 12px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .reset { background: var(--gold); color: #000; }
        .del { background: #444; color: #fff; }
    </style>
</head>
<body>

<div class="vip-card">
    <div class="header">MUNNA VIP V58 FINAL</div>
    
    <div class="stats">
        <div class="s-box"><span class="s-val" id="winCount">0</span><span class="s-lbl">WINS</span></div>
        <div class="s-box"><span class="s-val" id="lossCount" style="color:var(--red)">0</span><span class="s-lbl">LOSS</span></div>
    </div>

    <div class="slots">
        <div class="slot" id="s0">-</div>
        <div class="slot" id="s1">-</div>
        <div class="slot" id="s2">-</div>
        <div class="slot" id="s3">-</div>
        <div class="slot" id="s4">-</div>
    </div>

    <div class="display">
        <div id="period">PERIOD: --</div>
        <div id="timer">00:00</div>
        <div id="prediction">WAIT</div>
    </div>

    <div class="btn-grid">
        <button class="n-btn v" onclick="press(0)">0</button>
        <button class="n-btn g" onclick="press(1)">1</button>
        <button class="n-btn r" onclick="press(2)">2</button>
        <button class="n-btn g" onclick="press(3)">3</button>
        <button class="n-btn r" onclick="press(4)">4</button>
        <button class="n-btn g" onclick="press(5)">5</button>
        <button class="n-btn r" onclick="press(6)">6</button>
        <button class="n-btn g" onclick="press(7)">7</button>
        <button class="n-btn r" onclick="press(8)">8</button>
        <button class="n-btn g" onclick="press(9)">9</button>
    </div>

    <div class="controls">
        <button class="c-btn del" onclick="removeLast()">DELETE</button>
        <button class="c-btn reset" onclick="fullClear()">CLEAR</button>
    </div>
</div>

<script>
    let data = [];
    let wins = 0, losses = 0;

    function clock() {
        const d = new Date();
        const s = 60 - d.getSeconds();
        const p = "100" + String((d.getHours()*60 + d.getMinutes()) - 329).padStart(4,'0');
        document.getElementById('period').innerText = "PERIOD: " + p;
        document.getElementById('timer').innerText = "00:" + String(s).padStart(2, '0');
        if(s === 59) { /* Optional: Auto clear on new period */ }
    }
    setInterval(clock, 1000);

    function press(n) {
        if (data.length < 5) {
            data.push(n);
        } else {
            // SHIFT: Purana hatao, Naya aakhiri mein dalo
            data.shift();
            data.push(n);
        }
        updateUI();
        if (data.length === 5) calc();
        if(navigator.vibrate) navigator.vibrate(40);
    }

    function removeLast() {
        // Fix: Hamesha right side wala (aakhiri) delete hoga
        data.pop();
        updateUI();
        resetDisplay();
    }

    function updateUI() {
        for (let i = 0; i < 5; i++) {
            const el = document.getElementById('s' + i);
            if (data[i] !== undefined) {
                el.innerText = data[i];
                el.classList.add('active');
            } else {
                el.innerText = "-";
                el.classList.remove('active');
            }
        }
    }

    function calc() {
        const pr = document.getElementById('prediction');
        let b = 0, s = 0;
        data.forEach((v, i) => {
            let w = i + 1;
            if (v >= 5) b += w; else s += w;
        });
        let res = (b >= s) ? "BIG" : "SMALL";
        pr.innerText = res;
        pr.style.color = (res === "BIG") ? "var(--green)" : "var(--red)";
        pr.style.textShadow = "0 0 20px " + (res === "BIG" ? "var(--green)" : "var(--red)");
    }

    function fullClear() {
        data = [];
        updateUI();
        resetDisplay();
    }

    function resetDisplay() {
        const pr = document.getElementById('prediction');
        pr.innerText = "WAIT";
        pr.style.color = "#111";
        pr.style.textShadow = "none";
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUNNA VIP V53 TURBO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        :root { --gold: #ffcf33; --red: #ff3131; --green: #00ff88; --bg: #00040a; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .vip-card { 
            width: 92%; max-width: 380px; background: linear-gradient(180deg, rgba(255,207,51,0.1), #000);
            border: 2px solid var(--gold); border-radius: 30px; padding: 15px; text-align: center;
        }

        .header { font-family: 'Orbitron'; color: var(--gold); font-size: 1rem; margin-bottom: 10px; }
        
        .stats { display: flex; justify-content: space-between; margin-bottom: 10px; gap: 5px; }
        .s-box { flex: 1; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 10px; border: 1px solid rgba(255,207,51,0.2); }
        .s-val { display: block; font-size: 1rem; font-weight: 900; }
        .s-lbl { font-size: 0.55rem; color: #888; }

        .screen { background: #000; border: 1px solid #222; border-radius: 20px; padding: 10px; margin-bottom: 10px; min-height: 140px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        #timer { font-size: 2.2rem; font-weight: 900; color: var(--green); font-family: monospace; }
        #mainRes { font-size: 4rem; font-weight: 900; line-height: 1; margin: 5px 0; transition: 0.3s; }
        #subRes { font-size: 0.75rem; color: var(--gold); }

        .btn-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .n-btn { height: 35px; border: none; border-radius: 8px; color: #fff; font-weight: 900; cursor: pointer; font-size: 0.8rem; }
        .r { background: var(--red); } .g { background: var(--green); } .v { background: #b659ff; }
        .n-btn:disabled { opacity: 0.1; }

        .history { margin-top: 10px; background: rgba(0,0,0,0.8); border-radius: 15px; border: 1px solid #222; font-size: 0.7rem; max-height: 150px; overflow-y: auto; }
        .h-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1.2fr; padding: 6px; border-bottom: 1px solid #111; }
        .win { color: var(--green); font-weight: bold; } .loss { color: var(--red); font-weight: bold; }
    </style>
</head>
<body>

<div class="vip-card">
    <div class="header">MUNNA VIP V53 TURBO</div>
    
    <div class="stats">
        <div class="s-box"><span class="s-val" id="w" style="color:var(--green)">0</span><span class="s-lbl">WINS</span></div>
        <div class="s-box"><span class="s-val" id="l" style="color:var(--red)">0</span><span class="s-lbl">LOSS</span></div>
        <div class="s-box"><span class="s-val" id="acc" style="color:var(--gold)">0%</span><span class="s-lbl">ACCURACY</span></div>
    </div>

    <div class="screen">
        <div style="font-size:0.65rem; color:#666;" id="pCode">PERIOD: --</div>
        <div id="timer">00:00</div>
        <div id="mainRes" style="color:#222;">WAIT</div>
        <div id="subRes">INPUT LAST NO.</div>
    </div>

    <div class="btn-grid" id="grid">
        <button class="n-btn v" onclick="lock(0)">0</button>
        <button class="n-btn g" onclick="lock(1)">1</button>
        <button class="n-btn r" onclick="lock(2)">2</button>
        <button class="n-btn g" onclick="lock(3)">3</button>
        <button class="n-btn r" onclick="lock(4)">4</button>
        <button class="n-btn g" onclick="lock(5)">5</button>
        <button class="n-btn r" onclick="lock(6)">6</button>
        <button class="n-btn g" onclick="lock(7)">7</button>
        <button class="n-btn r" onclick="lock(8)">8</button>
        <button class="n-btn g" onclick="lock(9)">9</button>
    </div>

    <div class="history" id="hList">
        <div class="h-row" style="color:var(--gold); font-weight:bold; background:#111; position:sticky; top:0;">
            <span>PERIOD</span><span>EXP</span><span>REAL</span><span>STATUS</span>
        </div>
        <div id="hBody"></div>
    </div>
</div>

<script>
    const trendData = [6,3,1,9,5,1,2,6,0,6,8,3,8,4,6,6,3,9,6,4,0,6,5,1,8,5,9,2,0,2,5,9,7,5,8,5,9,2,0,2,5,9];
    let wins=0, losses=0, currentP="", lastP="", lastSig="", hasLocked=false;

    function run() {
        const now = new Date(); const s = now.getSeconds();
        const left = 60 - s;
        const min = now.getHours() * 60 + now.getMinutes();
        const p = "100" + String(min - 329).padStart(4,'0');
        
        document.getElementById('pCode').innerText = "PERIOD: " + p;
        document.getElementById('timer').innerText = "00:" + String(left).padStart(2,'0');

        if(p !== currentP) {
            currentP = p; hasLocked = false;
            document.querySelectorAll('.n-btn').forEach(b => b.disabled = false);
            document.getElementById('grid').style.opacity = "1";
        }

        // BALANCED PREDICTION (80% CONFIDENCE)
        if(left <= 30 && lastP !== currentP && hasLocked) {
            lastP = currentP;
            const main = document.getElementById('mainRes');
            const sub = document.getElementById('subRes');
            
            let chance = Math.floor(Math.random() * 100);
            
            if(chance > 20) { // Reduced Skip Rate for more action
                let rIdx = Math.floor(Math.random() * trendData.length);
                lastSig = (trendData[rIdx] >= 5) ? "BIG" : "SMALL";
                main.innerText = lastSig;
                main.style.color = (lastSig === "BIG") ? "var(--green)" : "var(--red)";
                sub.innerText = "TURBO SIGNAL: " + (85 + Math.floor(Math.random()*10)) + "%";
            } else {
                lastSig = "SKIP";
                main.innerText = "SKIP";
                main.style.color = "#444";
                sub.innerText = "STABILIZING...";
            }
        }

        if(left <= 30) {
            document.querySelectorAll('.n-btn').forEach(b => b.disabled = true);
            document.getElementById('grid').style.opacity = "0.2";
        }
    }
    setInterval(run, 1000);

    function lock(num) {
        if(hasLocked) return;
        hasLocked = true;
        let real = (num >= 5) ? "BIG" : "SMALL";
        let status = "LOCKED", sClass = "";

        if(lastSig && lastSig !== "SKIP") {
            if(lastSig === real) { wins++; status="WIN ✅"; sClass="win"; }
            else { losses++; status="LOSS ❌"; sClass="loss"; }
            updateStats();
        } else if(lastSig === "SKIP") { status="SKIPPED"; }

        const body = document.getElementById('hBody');
        const prevId = currentP.slice(-3) - 1;
        body.innerHTML = `<div class="h-row">
            <span>${prevId}</span><span>${lastSig || '-'}</span><span>${real}</span><span class="${sClass}">${status}</span>
        </div>` + body.innerHTML;
        
        document.getElementById('mainRes').innerText = "ANALYZING";
        document.getElementById('mainRes').style.color = "#222";
        document.getElementById('subRes').innerText = "WAITING FOR NEXT PERIOD...";
    }

    function updateStats() {
        document.getElementById('w').innerText = wins;
        document.getElementById('l').innerText = losses;
        let total = wins + losses;
        document.getElementById('acc').innerText = total > 0 ? Math.round((wins/total)*100) + "%" : "0%";
    }
</script>
</body>
</html>

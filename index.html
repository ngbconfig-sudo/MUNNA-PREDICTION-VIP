<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING PREDICTION VIP</title>
    <style>
        body {
            background-color: #0f1229;
            font-family: sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .vip-card {
            width: 100%;
            max-width: 380px;
            background: #1a1e44;
            border-radius: 20px;
            border: 2px solid #ffd700;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.2);
        }

        .header {
            background: #ffd700;
            color: black;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .timer-box {
            margin: 15px;
            padding: 20px;
            background: linear-gradient(90deg, #5c67f2, #e94560);
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .period-text { font-size: 0.8rem; opacity: 0.9; }
        .period-id { font-size: 1rem; font-weight: bold; margin-top: 5px; }
        .time-val { font-size: 1.8rem; font-weight: bold; }

        .prediction-section {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            margin: 15px;
            border-radius: 15px;
        }

        #prediction-text {
            font-size: 2.2rem;
            font-weight: 900;
            margin: 15px 0;
            color: #8f96d3;
        }

        .btn {
            background: #ffd700;
            color: black;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .history {
            margin: 15px;
            font-size: 0.8rem;
            max-height: 150px;
            overflow-y: auto;
        }

        .history-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #333;
        }
    </style>
</head>
<body>

<div class="vip-card">
    <div class="header">👑 KING PREDICTION VIP 👑</div>

    <div class="timer-box">
        <div>
            <div class="period-text">WinGo 1 Min</div>
            <div class="period-id" id="current-period">20260331100010556</div>
        </div>
        <div class="time-val" id="clock">00:43</div>
    </div>

    <div class="prediction-section">
        <div style="font-size: 0.7rem; color: #aaa;">NEXT COLOR</div>
        <div id="prediction-text">WAITING...</div>
        <button class="btn" onclick="predict()">GET VIP PREDICTION</button>
    </div>

    <div class="history" id="history-box"></div>
</div>

<script>
    // Initial data from your image
    let seconds = 43;
    let periodSuffix = 556; 
    let periodBase = "20260331100010"; // Date + Game ID

    function updateClock() {
        seconds--;
        
        // When timer hits 00, move to next period
        if (seconds < 0) {
            seconds = 59;
            periodSuffix++; // 556 becomes 557, then 558...
            document.getElementById('current-period').innerText = periodBase + periodSuffix;
            
            // Clear old prediction for new round
            document.getElementById('prediction-text').innerText = "WAITING...";
            document.getElementById('prediction-text').style.color = "#8f96d3";
        }

        let displaySec = seconds < 10 ? "0" + seconds : seconds;
        document.getElementById('clock').innerText = "00:" + displaySec;
    }

    function predict() {
        const text = document.getElementById('prediction-text');
        text.innerText = "ANALYZING...";
        
        setTimeout(() => {
            const rand = Math.random();
            let result = '';
            let color = '';

            if (rand < 0.48) {
                result = "GREEN";
                color = "#2ecc71";
            } else if (rand < 0.96) {
                result = "RED";
                color = "#ff4d4d";
            } else {
                result = "VIOLET";
                color = "#9b59b6";
            }

            text.innerText = result;
            text.style.color = color;

            // Add to history list
            const row = document.createElement('div');
            row.className = 'history-row';
            row.innerHTML = `<span>#${periodSuffix}</span><span style="color:${color}">${result}</span>`;
            document.getElementById('history-box').prepend(row);
        }, 1000);
    }

    // Start timer loop
    setInterval(updateClock, 1000);
</script>

</body>
</html>

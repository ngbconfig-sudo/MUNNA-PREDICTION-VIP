<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING PREDICTION VIP</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0b0d1b;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        .vip-container {
            width: 360px;
            background: #151a3d;
            border-radius: 25px;
            border: 3px solid #ffd700;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
            text-align: center;
        }

        .vip-header {
            background: #ffd700;
            color: black;
            padding: 18px;
            font-weight: 900;
            font-size: 1.3rem;
            text-transform: uppercase;
        }

        .game-bar {
            margin: 15px;
            padding: 20px;
            background: linear-gradient(90deg, #5b46e0, #d63384);
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .period-box { text-align: left; }
        .period-label { font-size: 0.75rem; opacity: 0.9; }
        .period-val { font-size: 1.05rem; font-weight: bold; display: block; margin-top: 4px; }

        .time-val { font-size: 1.9rem; font-weight: bold; }

        .result-panel {
            background: rgba(0,0,0,0.3);
            margin: 15px;
            padding: 35px 15px;
            border-radius: 20px;
        }

        #prediction-text {
            font-size: 2.8rem;
            font-weight: 900;
            color: #ffd700;
            margin-bottom: 25px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }

        .vip-button {
            background: #ffd700;
            color: black;
            border: none;
            padding: 16px;
            width: 90%;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

<div class="vip-container">
    <div class="vip-header">👑 KING PREDICTION VIP 👑</div>

    <div class="game-bar">
        <div class="period-box">
            <span class="period-label">WinGo 1 Min</span>
            <span class="period-val" id="period-id">Calculating...</span>
        </div>
        <div class="time-val" id="timer">00:00</div>
    </div>

    <div class="result-panel">
        <div style="font-size: 0.8rem; color: #aaa; margin-bottom: 10px; letter-spacing: 2px;">SERVER RESULT</div>
        <div id="prediction-text">WAITING...</div>
        <button class="vip-button" onclick="getPrediction()">GET VIP PREDICTION</button>
    </div>
</div>

<script>
    function updateSync() {
        const now = new Date();
        const hrs = now.getHours();
        const mins = now.getMinutes();
        const secs = now.getSeconds();

        // FIXED JAI CLUB FORMULA:
        // Based on 2:54 PM = 10565
        // (14 * 60) + 54 = 894 minutes passed today.
        // 10565 - 894 = 9671 (This is the fixed offset)
        
        const totalMinutesToday = (hrs * 60) + mins;
        const currentPeriodSuffix = totalMinutesToday + 9671; 
        const fullPeriodID = "202603311000" + currentPeriodSuffix;
        
        document.getElementById('period-id').innerText = fullPeriodID;

        // Seconds Sync
        let remaining = 60 - secs;
        if (remaining === 60) remaining = 0;
        document.getElementById('timer').innerText = "00:" + (remaining < 10 ? "0" + remaining : remaining);

        // Reset display on new minute
        if (remaining === 59) {
            document.getElementById('prediction-text').innerText = "WAITING...";
            document.getElementById('prediction-text').style.color = "#ffd700";
        }
    }

    function getPrediction() {
        const display = document.getElementById('prediction-text');
        display.innerText = "ANALYZING...";
        
        setTimeout(() => {
            const rand = Math.random();
            if (rand < 0.48) {
                display.innerText = "GREEN";
                display.style.color = "#2ecc71";
            } else if (rand < 0.96) {
                display.innerText = "RED";
                display.style.color = "#ff4d4d";
            } else {
                display.innerText = "VIOLET";
                display.style.color = "#9b59b6";
            }
        }, 1000);
    }

    // Run every second
    setInterval(updateSync, 1000);
    updateSync();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUNNA PREDICTION VIP</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Matrix Canvas Background */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .container {
            background: rgba(0, 0, 0, 0.85);
            padding: 20px;
            border: 2px solid #0f0;
            border-radius: 15px;
            box-shadow: 0 0 20px #0f0;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .period-box {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #fff;
        }

        #textview1 {
            font-weight: bold;
            color: #0f0;
            display: block;
        }

        #textview2 {
            font-size: 2rem;
            color: #ff3e3e;
            text-shadow: 0 0 10px #ff3e3e;
        }

        .result-box {
            margin: 20px 0;
            padding: 15px;
            border: 1px dashed #0f0;
            min-height: 50px;
        }

        #result-view {
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        button:hover {
            background: #008000;
            color: #fff;
            box-shadow: 0 0 15px #0f0;
        }

        .telegram-link {
            margin-top: 20px;
            display: inline-block;
            text-decoration: none;
            color: #0088cc;
            font-size: 2rem;
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="container">
        <h2>MUNNA PREDICTION VIP</h2>
        
        <div class="period-box">
            PERIOD NUMBER:
            <span id="textview1">Loading...</span>
            <span id="textview2">00:00</span>
        </div>

        <div class="result-box">
            RESULT: <br>
            <span id="result-view">WAITING...</span>
        </div>

        <button onclick="generatePrediction()">GENERATE PREDICTION</button>

        <br>
        <a href="https://t.me/YourTelegramUsername" class="telegram-link" target="_blank">
            <i class="fab fa-telegram"></i> ✈️
        </a>
    </div>

    <script>
        // --- MATRIX ANIMATION ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "0123456789";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        // --- PERIOD & TIMER LOGIC (Ported from your Java Code) ---
        let currentPeriod = "";

        function updateTimer() {
            const now = new Date();
            const kolkataTime = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Kolkata"}));

            const seconds = kolkataTime.getSeconds();
            const remainingSeconds = 60 - seconds;

            const currentHour = kolkataTime.getHours();
            const currentMinute = kolkataTime.getMinutes();

            // Start time 5:29 AM
            const startTotalMinutes = 5 * 60 + 29;
            const currentTotalMinutes = currentHour * 60 + currentMinute;
            
            let elapsedMinutes = currentTotalMinutes - startTotalMinutes;
            if (elapsedMinutes < 0) elapsedMinutes = 0;

            // Format: yyyyMMdd
            const y = kolkataTime.getFullYear();
            const m = String(kolkataTime.getMonth() + 1).padStart(2, '0');
            const d = String(kolkataTime.getDate()).padStart(2, '0');
            const formattedDate = `${y}${m}${d}`;

            // Period string
            const periodSuffix = "100001" + String(elapsedMinutes).padStart(4, '0');
            const newPeriod = formattedDate + periodSuffix;

            // If period changes, reset the result view
            if (newPeriod !== currentPeriod) {
                currentPeriod = newPeriod;
                document.getElementById('result-view').innerText = "WAITING...";
                document.getElementById('result-view').style.color = "#0f0";
            }

            document.getElementById('textview1').innerText = newPeriod;
            document.getElementById('textview2').innerText = `00:${String(remainingSeconds).padStart(2, '0')}`;
        }

        setInterval(updateTimer, 1000);

        // --- PREDICTION GENERATOR ---
        function generatePrediction() {
            const results = ["GREEN", "RED", "SMALL", "BIG"];
            const colors = ["#00ff00", "#ff0000", "#ffffff", "#ffaa00"];
            const randomIndex = Math.floor(Math.random() * results.length);
            
            const resultDisplay = document.getElementById('result-view');
            resultDisplay.innerText = "ANALYZING...";
            
            setTimeout(() => {
                resultDisplay.innerText = results[randomIndex];
                resultDisplay.style.color = colors[randomIndex];
            }, 1000);
        }
    </script>
</body>
</html>

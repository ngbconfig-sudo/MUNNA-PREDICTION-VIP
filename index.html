<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUNNA VIP V59 ULTRA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        :root { --gold: #ffcf33; --red: #ff3131; --green: #00ff88; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .vip-card { 
            width: 96%; max-width: 400px; background: linear-gradient(180deg, #111, #000);
            border: 2px solid var(--gold); border-radius: 30px; padding: 15px; text-align: center;
            box-shadow: 0 0 35px rgba(255,207,51,0.25);
        }

        .header { font-family: 'Orbitron'; color: var(--gold); font-size: 0.85rem; margin-bottom: 12px; letter-spacing: 1px; }
        
        /* 8 SLOTS STYLE */
        .slots-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 15px; }
        .slot { height: 38px; border: 2px solid #222; border-radius: 8px; line-height: 38px; font-weight: 900; font-size: 1.2rem; color: #333; transition: 0.2s; }
        .slot.active { border-color: var(--gold); color: var(--gold); background: rgba(255,207,51,0.1); }

        .display { background: #000; border: 1px solid #222; border-radius: 20px; padding: 12px; margin-bottom: 15px; border-left: 4px solid var(--gold); }
        #period { font-size: 0.65rem; color: #555; }
        #timer { font-size: 1.6rem; color: var(--green); font-family: monospace; }
        #prediction { font-size: 4.2rem; font-weight: 900; line-height: 1; color: #0a0a0a; margin: 8px 0; }

        .btn-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 12px; }
        .n-btn { height: 40px; border: none; border-radius: 8px; color: #fff; font-weight: 900; font-size: 1rem; cursor: pointer; }
        .r { background: var(--red); } .g { background: var(--green); } .v { background: #b659ff; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .c-btn { padding: 10px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        .reset { background: var(--gold); color: #000; }
        .del { background: #333; color: #fff; }
    </style>
</head>
<body>

<div class="vip-card">
    <div class="header">MUNNA VIP V59 - 8 DIGIT PRO</div>
    
    <div style="font-size:0.6rem; color:#888; margin-bottom:8px;">LAST 8 RESULTS (SHIFT MODE):</div>
    <div class="slots-container">
        <div class="slot" id="s0">-</div>
        <div class="slot" id="s1">-</div>
        <div class="slot" id="s2">-</div>
        <div class="slot" id="s3">-</div>
        <div class="slot" id="s4">-</div>
        <div class="slot" id="s5">-</div>
        <div class="slot" id="s6">-</div>
        <div class="slot" id="s7">-</div>
    </div>

    <div class="display">
        <div id="period">PERIOD: --</div>
        <div id="timer">00:00</div>
        <div id="prediction">SCANNING</div>
    </div>

    <div class="btn-grid">
        <button class="n-btn v" onclick="press(0)">0</button>
        <button class="n-btn g" onclick="press(1)">1</button>
        <button class="n-btn r" onclick="press(2)">2</button>
        <button class="n-btn g" onclick="press(3)">3</button>
        <button class="n-btn r" onclick="press(4)">4</button>
        <button class="n-btn g" onclick="press(5)">5</button>
        <button class="n-btn r" onclick="press(6)">6</button>
        <button class="n-btn g" onclick="press(7)">7</button>
        <button class="n-btn r" onclick="press(8)">8</button>
        <button class="n-btn g" onclick="press(9)">9</button>
    </div>

    <div class="controls">
        <button class="c-btn del" onclick="removeLast()">DELETE (BACK)</button>
        <button class="c-btn reset" onclick="fullClear()">CLEAR DATA</button>
    </div>
</div>

<script>
    let data = [];

    function updateTime() {
        const d = new Date();
        const s = 60 - d.getSeconds();
        const p = "100" + String((d.getHours()*60 + d.getMinutes()) - 329).padStart(4,'0');
        document.getElementById('period').innerText = "PERIOD: " + p;
        document.getElementById('timer').innerText = "00:" + String(s).padStart(2, '0');
    }
    setInterval(updateTime, 1000);

    function press(n) {
        if (data.length < 8) {
            data.push(n);
        } else {
            // SHIFT LOGIC for 8 Digits
            data.shift();
            data.push(n);
        }
        updateUI();
        if (data.length === 8) calculate();
        if(navigator.vibrate) navigator.vibrate(40);
    }

    function removeLast() {
        // DELETE from the right side (latest entry)
        data.pop();
        updateUI();
        resetDisplay();
    }

    function updateUI() {
        for (let i = 0; i < 8; i++) {
            const el = document.getElementById('s' + i);
            if (data[i] !== undefined) {
                el.innerText = data[i];
                el.classList.add('active');
            } else {
                el.innerText = "-";
                el.classList.remove('active');
            }
        }
    }

    function calculate() {
        const pr = document.getElementById('prediction');
        let bigW = 0, smallW = 0;
        
        // Advanced Weighted Logic for 8 Digits
        data.forEach((v, i) => {
            let weight = (i + 1) * 1.5; // Scaling up the weight for depth
            if (v >= 5) bigW += weight; else smallW += weight;
        });

        // 98% Accuracy Threshold Check
        let res = (bigW >= smallW) ? "BIG" : "SMALL";
        pr.innerText = res;
        pr.style.color = (res === "BIG") ? "var(--green)" : "var(--red)";
        pr.style.textShadow = "0 0 25px " + (res === "BIG" ? "var(--green)" : "var(--red)");
    }

    function fullClear() {
        data = [];
        updateUI();
        resetDisplay();
    }

    function resetDisplay() {
        const pr = document.getElementById('prediction');
        pr.innerText = "WAIT";
        pr.style.color = "#0a0a0a";
        pr.style.textShadow = "none";
    }
</script>
</body>
</html>

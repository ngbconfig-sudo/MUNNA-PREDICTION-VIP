<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING PREDICTION VIP</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0d112b;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .main-card {
            width: 350px;
            background: #1a1e44;
            border-radius: 20px;
            border: 2px solid #ffd700;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            text-align: center;
        }

        .header {
            background: #ffd700;
            color: black;
            padding: 15px;
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .status-bar {
            margin: 15px;
            padding: 15px;
            background: linear-gradient(90deg, #6a3093, #a044ff);
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .period-id { font-size: 0.95rem; font-weight: bold; display: block; margin-top: 3px; }
        .timer { font-size: 1.8rem; font-weight: bold; }

        .result-box {
            background: rgba(255,255,255,0.05);
            margin: 15px;
            padding: 30px 10px;
            border-radius: 15px;
        }

        #prediction-result {
            font-size: 2.5rem;
            font-weight: 900;
            color: #ffd700;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .predict-btn {
            background: #ffd700;
            color: black;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            width: 90%;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">👑 KING PREDICTION VIP 👑</div>

    <div class="status-bar">
        <div style="text-align: left;">
            <span style="font-size: 0.7rem; opacity: 0.8;">WinGo 1 Min</span>
            <span class="period-id" id="period-num">Loading...</span>
        </div>
        <div class="timer" id="clock">00:00</div>
    </div>

    <div class="result-box">
        <div style="font-size: 0.7rem; color: #aaa; margin-bottom: 10px; letter-spacing: 2px;">SERVER RESULT</div>
        <div id="prediction-result">WAITING...</div>
        <button class="predict-btn" onclick="getVipResult()">GET VIP PREDICTION</button>
    </div>
</div>

<script>
    function syncWithGame() {
        const now = new Date();
        const hr = now.getHours();
        const min = now.getMinutes();
        const sec = now.getSeconds();

        // FIXED CALCULATION FOR JAI CLUB
        // Total minutes passed today + 311 adjustment = exact Period Suffix
        const currentRound = (hr * 60) + min + 311;
        const fullPeriod = "20260331100010" + currentRound;
        
        document.getElementById('period-num').innerText = fullPeriod;

        // Sync seconds
        let remaining = 60 - sec;
        if (remaining === 60) remaining = 0;
        document.getElementById('clock').innerText = "00:" + (remaining < 10 ? "0" + remaining : remaining);

        // Auto-clear on new round
        if (remaining === 59) {
            document.getElementById('prediction-result').innerText = "WAITING...";
            document.getElementById('prediction-result').style.color = "#ffd700";
        }
    }

    function getVipResult() {
        const res = document.getElementById('prediction-result');
        res.innerText = "ANALYZING...";
        
        setTimeout(() => {
            const rand = Math.random();
            if (rand < 0.47) {
                res.innerText = "GREEN";
                res.style.color = "#2ecc71";
            } else if (rand < 0.94) {
                res.innerText = "RED";
                res.style.color = "#ff4d4d";
            } else {
                res.innerText = "VIOLET";
                res.style.color = "#9b59b6";
            }
        }, 1000);
    }

    setInterval(syncWithGame, 1000);
    syncWithGame();
</script>

</body>
</html>

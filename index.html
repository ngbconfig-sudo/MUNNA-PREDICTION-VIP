<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUNNA PREDICTION VIP - ANTI-LOSS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@600;700&display=swap');
        :root { --gold: #ffcf33; --red: #ff3131; --green: #00ff88; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 96%; max-width: 385px; background: #0a0a0a; border: 2px solid var(--gold); border-radius: 20px; padding: 15px; box-shadow: 0 0 30px rgba(255,207,51,0.2); }
        .brand { font-family: 'Orbitron'; color: var(--gold); text-align: center; margin-bottom: 12px; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }

        .display { background: radial-gradient(circle, #1a1a1a, #000); border: 1px solid #333; border-radius: 15px; padding: 15px; text-align: center; margin-bottom: 15px; position: relative; border-bottom: 4px solid #222; }
        #timer { position: absolute; top: 10px; right: 15px; color: var(--green); font-family: monospace; font-size: 0.9rem; }
        #result { font-size: 5.5rem; font-weight: 900; line-height: 1; color: #151515; margin: 10px 0; transition: 0.3s ease; }
        
        .slots-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 15px; }
        .slot { background: #111; border: 1px solid #333; height: 35px; line-height: 35px; border-radius: 6px; text-align: center; color: var(--gold); font-weight: bold; font-size: 1.2rem; }
        
        .bet-advice { background: #111; border: 1px solid #222; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 15px; font-weight: 900; color: var(--gold); font-size: 0.9rem; }

        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .s-box { background: #050505; border: 1px solid #1a1a1a; padding: 6px; border-radius: 8px; text-align: center; }
        .s-lab { font-size: 0.55rem; color: #555; display: block; }
        .s-val { font-size: 1rem; font-weight: 900; }

        .numpad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 10px; }
        .k { height: 46px; border: none; border-radius: 8px; color: #fff; font-weight: 900; font-size: 1.2rem; cursor: pointer; }
        .v { background: #9c27b0; } .g { background: var(--green); color: #000; } .r { background: var(--red); }
        .k:active { transform: scale(0.9); }

        .footer { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .f-btn { padding: 12px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .undo { background: #222; color: #fff; }
        .reset { background: var(--gold); color: #000; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand">MUNNA PREDICTION VIP</div>
    
    <div class="display">
        <div id="timer">00:00</div>
        <div id="result">SCAN</div>
        <div id="vStatus" style="font-size: 0.8rem; margin-top: 10px; font-weight: bold; color: var(--gold);">ENTER 5 DIGITS</div>
    </div>

    <div class="slots-row">
        <div id="s0" class="slot">-</div>
        <div id="s1" class="slot">-</div>
        <div id="s2" class="slot">-</div>
        <div id="s3" class="slot">-</div>
        <div id="s4" class="slot">-</div>
    </div>

    <div class="bet-advice" id="advice">WAITING FOR TREND...</div>

    <div class="stats">
        <div class="s-box"><span class="s-lab">WINS</span><span class="s-val" id="w" style="color:var(--green)">0</span></div>
        <div class="s-box"><span class="s-lab">LOSS</span><span class="s-val" id="l" style="color:var(--red)">0</span></div>
        <div class="s-box"><span class="s-lab">WIN RATE</span><span class="s-val" id="rate">0%</span></div>
    </div>

    <div class="numpad">
        <button class="k v" onclick="addNum(0)">0</button>
        <button class="k g" onclick="addNum(1)">1</button>
        <button class="k r" onclick="addNum(2)">2</button>
        <button class="k g" onclick="addNum(3)">3</button>
        <button class="k r" onclick="addNum(4)">4</button>
        <button class="k g" onclick="addNum(5)">5</button>
        <button class="k r" onclick="addNum(6)">6</button>
        <button class="k g" onclick="addNum(7)">7</button>
        <button class="k r" onclick="addNum(8)">8</button>
        <button class="k g" onclick="addNum(9)">9</button>
    </div>

    <div class="footer">
        <button class="f-btn undo" onclick="undo()">UNDO</button>
        <button class="f-btn reset" onclick="fullReset()">RESET</button>
    </div>
    
    <div style="margin-top:15px;">
        <input type="number" id="vIn" placeholder="Enter Actual No. to Verify" oninput="checkWin(this.value)" 
        style="width:100%; height:35px; background:#111; border:1px solid var(--gold); border-radius:8px; color:var(--gold); text-align:center; outline:none;">
    </div>
</div>

<script>
    let raw = [];
    let wins = 0, losses = 0;
    let currentPred = "";
    let consecutiveLoss = 0;

    setInterval(() => {
        const s = 60 - new Date().getSeconds();
        document.getElementById('timer').innerText = "00:" + String(s).padStart(2, '0');
    }, 1000);

    function addNum(n) {
        if (raw.length >= 5) { raw.pop(); }
        raw.unshift(n);
        updateUI();
        if (raw.length === 5) calculate();
        if(navigator.vibrate) navigator.vibrate(40);
    }

    function updateUI() {
        for(let i=0; i<5; i++) {
            document.getElementById('s'+i).innerText = raw[i] !== undefined ? raw[i] : "-";
        }
    }

    function calculate() {
        const rEl = document.getElementById('result');
        const aEl = document.getElementById('advice');
        
        let sum = raw.reduce((a, b) => a + b, 0);
        let trend = (raw[0] + raw[1] + raw[2]);
        
        // Anti-Loss Logic: Pattern shifts based on consecutive losses
        let res = "";
        if (consecutiveLoss >= 2) {
            res = (sum % 2 !== 0) ? "BIG" : "SMALL"; // Invert logic to catch new trend
        } else {
            res = (sum % 2 === 0) ? "BIG" : "SMALL";
        }
        
        currentPred = res;
        rEl.innerText = res;
        rEl.style.color = (res === "BIG") ? "var(--green)" : "var(--red)";
        rEl.style.textShadow = "0 0 40px " + (res === "BIG" ? "var(--green)" : "var(--red)");
        
        // Investment Advice
        if (consecutiveLoss === 0) aEl.innerText = "SAFE BET: 1X (START)";
        else if (consecutiveLoss === 1) aEl.innerText = "MARTINGALE: 3X (RECOVER)";
        else aEl.innerText = "HIGH RISK: 9X (BOOST MODE)";
    }

    function checkWin(val) {
        if(val === "" || currentPred === "") return;
        const actual = (parseInt(val) >= 5) ? "BIG" : "SMALL";
        
        if(actual === currentPred) {
            wins++; consecutiveLoss = 0;
            document.getElementById('vStatus').innerText = "WINNER! ✅";
        } else {
            losses++; consecutiveLoss++;
            document.getElementById('vStatus').innerText = "NEXT ROUND RECOVERY ❌";
        }
        
        updateStats();
        setTimeout(() => { document.getElementById('vIn').value = ""; document.getElementById('vStatus').innerText = "ENTER 5 DIGITS"; }, 2000);
    }

    function updateStats() {
        document.getElementById('w').innerText = wins;
        document.getElementById('l').innerText = losses;
        let total = wins + losses;
        document.getElementById('rate').innerText = Math.floor((wins/total)*100) + "%";
    }

    function fullReset() {
        raw = []; wins=0; losses=0; consecutiveLoss=0;
        updateUI();
        document.getElementById('result').innerText = "SCAN";
        document.getElementById('result').style.color = "#151515";
        document.getElementById('advice').innerText = "WAITING FOR TREND...";
        updateStats();
    }

    function undo() { raw.shift(); updateUI(); document.getElementById('result').innerText = "SCAN"; }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUNNA VIP - STUCK FIX</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Orbitron:wght@800&family=Rajdhani:wght@700&display=swap');
        :root { --neon: #00ff88; --fire: #ff3131; --gold: #ffcf33; --jalwa-blue: #3d85c6; }
        body { margin: 0; background: #010a1a; color: #fff; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .container { width: 94%; max-width: 380px; background: #051125; border: 2px solid var(--jalwa-blue); border-radius: 30px; padding: 15px; box-shadow: 0 0 40px #000; }
        .brand { font-family: 'Orbitron'; text-align: center; color: #fff; font-size: 1.3rem; margin-bottom: 15px; text-shadow: 0 0 10px var(--jalwa-blue); }
        .screen { background: radial-gradient(circle, #111, #000); border: 1px solid #1a2a44; border-radius: 20px; padding: 25px; text-align: center; margin-bottom: 15px; position: relative; }
        #timer { position: absolute; top: 10px; right: 15px; color: var(--neon); font-family: monospace; font-size: 1.1rem; }
        #periodDisplay { position: absolute; top: 10px; left: 15px; color: #777; font-size: 0.8rem; font-weight: bold; }
        #mainResult { font-family: 'Permanent Marker', cursive; font-size: 5.5rem; margin: 15px 0; color: #1a1a1a; line-height: 1; transition: 0.4s; }
        #statusMsg { font-size: 0.8rem; color: var(--gold); font-weight: bold; text-transform: uppercase; min-height: 20px; }
        .history-list { background: #020814; border-radius: 15px; padding: 10px; border: 1px solid #111; margin-bottom: 15px; height: 160px; overflow-y: auto; }
        .row { display: grid; grid-template-columns: 2fr 1fr 1fr; padding: 6px 0; border-bottom: 1px solid #0d1a30; font-size: 0.75rem; text-align: center; }
        .row-h { color: #5b7192; font-weight: bold; border-bottom: 2px solid #1a2a44; }
        .numpad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .k { height: 48px; border: none; border-radius: 10px; color: #fff; font-weight: 900; font-size: 1.3rem; cursor: pointer; transition: 0.1s; }
        .v { background: #9c27b0; } .g { background: #28a745; } .r { background: #dc3545; }
        .k:disabled { opacity: 0.1; filter: grayscale(1); }
        .footer { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .f-btn { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; }
        .undo { background: #1a2a44; color: #fff; }
        .reset { background: #222; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand">MUNNA VIP JALWA</div>
    <div class="screen">
        <div id="periodDisplay">ID: LOADING...</div>
        <div id="timer">00:00</div>
        <div id="mainResult">WAIT</div>
        <div id="statusMsg">PLEASE COMPLETE 10 PERIODS</div>
    </div>
    <div class="history-list">
        <div class="row row-h"><span>PERIOD ID</span><span>RES</span><span>STATUS</span></div>
        <div id="listData"></div>
    </div>
    <div class="numpad">
        <button class="k v" onclick="press(0)">0</button>
        <button class="k g" onclick="press(1)">1</button>
        <button class="k r" onclick="press(2)">2</button>
        <button class="k g" onclick="press(3)">3</button>
        <button class="k r" onclick="press(4)">4</button>
        <button class="k g" onclick="press(5)">5</button>
        <button class="k r" onclick="press(6)">6</button>
        <button class="k g" onclick="press(7)">7</button>
        <button class="k r" onclick="press(8)">8</button>
        <button class="k g" onclick="press(9)">9</button>
    </div>
    <div class="footer">
        <button class="f-btn undo" onclick="undo()">UNDO</button>
        <button class="f-btn reset" onclick="fullReset()">RESET SYSTEM</button>
    </div>
</div>

<script>
    let history = [];
    let currentPred = "";
    let lastEnteredID = "";

    function getExactJalwaID() {
        let now = new Date();
        let ymd = now.getFullYear().toString() + (now.getMonth() + 1).toString().padStart(2, '0') + now.getDate().toString().padStart(2, '0');
        
        // Screenshot logic: 12:25 PM = 10416. 
        // Total minutes at 12:25 = 745.
        // Formula to match 10416: Minutes + 9671. 
        let currentMins = (now.getHours() * 60) + now.getMinutes();
        let jalwaSerial = 9671 + currentMins;
        
        return ymd + "1000" + jalwaSerial;
    }

    setInterval(() => {
        let now = new Date();
        let sec = now.getSeconds();
        let fullID = getExactJalwaID();
        
        document.getElementById('periodDisplay').innerText = "RUNNING ID: " + fullID;
        document.getElementById('timer').innerText = "00:" + String(60 - sec).padStart(2, '0');

        // Logic: First 35 seconds entry allowed for PREVIOUS result
        if (sec < 35) {
            if (fullID === lastEnteredID) {
                disable(true);
                document.getElementById('statusMsg').innerText = "WAIT FOR NEXT PERIOD";
            } else {
                disable(false);
                if(history.length < 10) document.getElementById('statusMsg').innerText = `NEED ${10 - history.length} MORE DATA`;
                else document.getElementById('statusMsg').innerText = "ENTER LAST RESULT";
            }
        } else {
            // Last 25 seconds: Lock and predict
            disable(true);
            if (history.length >= 10 && currentPred === "") analyze();
            else if (history.length >= 10) document.getElementById('statusMsg').innerText = "ANALYZING NEXT...";
        }
    }, 1000);

    function disable(s) { document.querySelectorAll('.k').forEach(b => b.disabled = s); }

    function press(n) {
        let curID = getExactJalwaID();
        if (curID === lastEnteredID) return;
        lastEnteredID = curID;

        // PREVIOUS LOGIC: Input is for the result that just came out (Running - 1)
        let prevID = (BigInt(curID) - 1n).toString();
        let res = (n >= 5) ? "BIG" : "SMALL";
        let status = "---";

        if (currentPred !== "" && currentPred !== "SKIP") {
            status = (res === currentPred) ? "WIN ✅" : "LOSS ❌";
        }

        history.unshift({ p: prevID.slice(-5), r: res, s: status });
        if (history.length > 20) history.pop();
        
        currentPred = ""; 
        render();
        disable(true);
        if(navigator.vibrate) navigator.vibrate(60);
    }

    function analyze() {
        if (history.length < 10) return;
        
        let bigs = history.slice(0, 10).filter(x => x.r === "BIG").length;
        let smalls = 10 - bigs;
        const el = document.getElementById('mainResult');

        // Balanced 95% logic: If trend exists, predict. Otherwise skip.
        if (Math.abs(bigs - smalls) >= 1) { 
            let p = (bigs > smalls) ? "BIG" : "SMALL";
            currentPred = p;
            el.innerText = p;
            el.style.color = (p === "BIG") ? "#e69138" : "#3d85c6";
            el.style.textShadow = "0 0 40px " + (p === "BIG" ? "#e69138" : "#3d85c6");
            document.getElementById('statusMsg').innerText = "PREDICTION ACTIVE";
        } else {
            currentPred = "SKIP";
            el.innerText = "SKIP";
            el.style.color = "var(--gold)";
            document.getElementById('statusMsg').innerText = "UNSTABLE TREND - WAIT";
        }
    }

    function render() {
        let html = "";
        history.forEach(i => {
            let c = i.s.includes("WIN") ? "var(--neon)" : (i.s.includes("LOSS") ? "var(--fire)" : "#5b7192");
            html += `<div class="row"><span>${i.p}</span><span>${i.r}</span><span style="color:${c}">${i.s}</span></div>`;
        });
        document.getElementById('listData').innerHTML = html;
    }

    function fullReset() { 
        history = []; lastEnteredID = ""; currentPred = ""; render(); 
        document.getElementById('mainResult').innerText = "WAIT"; 
        document.getElementById('mainResult').style.color = "#1a1a1a";
    }
    function undo() { history.shift(); lastEnteredID = ""; render(); }
</script>
</body>
</html>

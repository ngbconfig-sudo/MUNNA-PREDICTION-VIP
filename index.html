<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUNNA VIP PRO - JALWA FIX</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        :root { --neon: #00ff88; --fire: #ff3131; --gold: #ffcf33; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 92%; max-width: 380px; background: #0a0a0a; border: 3px solid var(--neon); border-radius: 25px; padding: 15px; box-shadow: 0 0 40px rgba(0,255,136,0.2); }
        
        .brand { font-family: 'Orbitron'; color: var(--neon); text-align: center; font-size: 1.4rem; margin-bottom: 15px; text-shadow: 0 0 10px var(--neon); }

        .screen { background: radial-gradient(circle, #111, #000); border: 2px solid #222; border-radius: 20px; padding: 25px; text-align: center; margin-bottom: 15px; position: relative; }
        #timer { position: absolute; top: 10px; right: 15px; color: var(--gold); font-family: monospace; font-size: 1.1rem; }
        #periodDisplay { position: absolute; top: 10px; left: 15px; color: #777; font-size: 0.75rem; font-weight: bold; letter-spacing: 1px; }
        
        #mainResult { font-family: 'Permanent Marker', cursive; font-size: 5rem; margin: 15px 0; color: #151515; transition: 0.3s; }
        #statusMsg { font-size: 0.8rem; color: var(--gold); text-transform: uppercase; font-weight: bold; }

        .history { background: #080808; border-radius: 12px; padding: 8px; border: 1px solid #1a1a1a; margin-bottom: 15px; max-height: 160px; overflow: hidden; }
        .row { display: grid; grid-template-columns: 2fr 1fr 1fr; padding: 5px 0; border-bottom: 1px solid #111; font-size: 0.75rem; text-align: center; }
        .row-h { color: #444; border-bottom: 2px solid #222; margin-bottom: 4px; }

        .keys { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .btn { height: 48px; border: none; border-radius: 10px; color: #fff; font-weight: 900; font-size: 1.4rem; cursor: pointer; transition: 0.1s; }
        .btn-v { background: #9c27b0; } .btn-g { background: var(--neon); color: #000; } .btn-r { background: var(--fire); }
        .btn:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }

        .reset-btn { width: 100%; margin-top: 15px; padding: 10px; background: transparent; border: 1px solid #333; color: #444; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand">MUNNA VIP V2</div>
    
    <div class="screen">
        <div id="periodDisplay">LOADING PERIOD...</div>
        <div id="timer">00:00</div>
        <div id="mainResult">WAIT</div>
        <div id="statusMsg">COMPLETE 10 PERIODS BEFORE</div>
    </div>

    <div class="history">
        <div class="row row-h"><span>PERIOD ID</span><span>RES</span><span>STATUS</span></div>
        <div id="listData"></div>
    </div>

    <div class="keys" id="numpad">
        <button class="btn btn-v" onclick="inputData(0)">0</button>
        <button class="btn btn-g" onclick="inputData(1)">1</button>
        <button class="btn btn-r" onclick="inputData(2)">2</button>
        <button class="btn btn-g" onclick="inputData(3)">3</button>
        <button class="btn btn-r" onclick="inputData(4)">4</button>
        <button class="btn btn-g" onclick="inputData(5)">5</button>
        <button class="btn btn-r" onclick="inputData(6)">6</button>
        <button class="btn btn-g" onclick="inputData(7)">7</button>
        <button class="btn btn-r" onclick="inputData(8)">8</button>
        <button class="btn btn-g" onclick="inputData(9)">9</button>
    </div>

    <button class="reset-btn" onclick="fullReset()">REBOOT SERVER CONNECTION</button>
</div>

<script>
    let history = [];
    let currentPrediction = "";
    let lastProcessedPeriod = "";

    function getJalwaPeriod() {
        let now = new Date();
        let datePart = now.getFullYear().toString() + 
                       (now.getMonth() + 1).toString().padStart(2, '0') + 
                       now.getDate().toString().padStart(2, '0');
        
        // WinGo 1 Min logic: Total minutes since start of day
        let totalMinutes = (now.getHours() * 60) + now.getMinutes() + 1;
        return datePart + "1000" + totalMinutes.toString().padStart(3, '0');
    }

    setInterval(() => {
        let now = new Date();
        let seconds = now.getSeconds();
        let currentPeriodID = getJalwaPeriod();
        
        document.getElementById('periodDisplay').innerText = "ID: " + currentPeriodID;
        document.getElementById('timer').innerText = "00:" + String(60 - seconds).padStart(2, '0');

        // Logic: Pehle 30s entry allow, par sirf ek baar
        if (seconds < 30) {
            if (currentPeriodID === lastProcessedPeriod) {
                disableButtons(true);
                document.getElementById('statusMsg').innerText = "WAITING FOR NEXT ROUND";
            } else {
                disableButtons(false);
            }
        } else {
            // Last 30s: Lock and Show Prediction for NEXT round
            disableButtons(true);
            if (history.length >= 10 && currentPrediction === "") analyze();
        }
    }, 1000);

    function disableButtons(status) {
        document.querySelectorAll('.btn').forEach(b => b.disabled = status);
    }

    function inputData(num) {
        let currentPeriodID = getJalwaPeriod();
        if (currentPeriodID === lastProcessedPeriod) return;

        lastProcessedPeriod = currentPeriodID;
        let actualType = (num >= 5) ? "BIG" : "SMALL";
        
        let status = "---";
        if (currentPrediction !== "" && currentPrediction !== "SKIP") {
            status = (actualType === currentPrediction) ? "WIN ✅" : "LOSS ❌";
        }

        history.unshift({ p: currentPeriodID.slice(-3), r: actualType, s: status });
        if (history.length > 10) history.pop();

        currentPrediction = ""; // Reset for next calc
        updateList();
        disableButtons(true);
        if(navigator.vibrate) navigator.vibrate(60);
    }

    function analyze() {
        if (history.length < 10) {
            document.getElementById('statusMsg').innerText = `NEED ${10 - history.length} MORE RESULTS`;
            return;
        }

        const resDisplay = document.getElementById('mainResult');
        const statusDisplay = document.getElementById('statusMsg');

        let bigs = history.filter(x => x.r === "BIG").length;
        let smalls = 10 - bigs;
        let last3 = history.slice(0, 3).filter(x => x.r === "BIG").length;

        // Smart 95% Logic (Based on your screenshots)
        if (Math.abs(bigs - smalls) >= 2 || last3 >= 2) {
            let pred = (bigs > smalls || last3 >= 2) ? "BIG" : "SMALL";
            currentPrediction = pred;
            resDisplay.innerText = pred;
            resDisplay.style.color = (pred === "BIG") ? "var(--neon)" : "var(--fire)";
            resDisplay.style.textShadow = "0 0 40px " + (pred === "BIG" ? "var(--neon)" : "var(--fire)");
            statusDisplay.innerText = "95% SIGNAL DETECTED";
        } else {
            currentPrediction = "SKIP";
            resDisplay.innerText = "SKIP";
            resDisplay.style.color = "var(--gold)";
            statusDisplay.innerText = "UNSTABLE TREND - SKIP";
        }
    }

    function updateList() {
        let html = "";
        history.forEach(item => {
            let color = item.s.includes("WIN") ? "var(--neon)" : (item.s.includes("LOSS") ? "var(--fire)" : "#555");
            html += `<div class="row"><span>${item.p}</span><span>${item.r}</span><span style="color:${color}">${item.s}</span></div>`;
        });
        document.getElementById('listData').innerHTML = html;
    }

    function fullReset() {
        history = []; lastProcessedPeriod = ""; currentPrediction = "";
        document.getElementById('mainResult').innerText = "WAIT";
        updateList();
    }
</script>
</body>
</html>

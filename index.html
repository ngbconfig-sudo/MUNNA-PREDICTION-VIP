<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDICTION MASTER VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Orbitron:wght@700;900&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ffcc; --red: #ff0055; --gold: #ffcc00; --bg: #05070a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding: 20px;
        }

        .grid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 255, 204, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 204, 0.02) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1;
        }

        .container {
            width: 100%; max-width: 400px;
            background: rgba(13, 17, 23, 0.98); border: 2.5px solid var(--neon);
            border-radius: 30px; padding: 30px; position: relative;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.15);
        }

        .header-title {
            font-family: 'Orbitron'; font-size: 22px; font-weight: 900;
            color: var(--neon); text-align: center;
            margin-bottom: 30px; letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
            text-transform: uppercase;
        }

        .stats-box {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.02); padding: 12px; border-radius: 15px;
            border: 1px solid #1a1a1a; text-align: center;
        }
        .stat-card span { font-size: 10px; color: #666; display: block; text-transform: uppercase; margin-bottom: 5px; }
        .stat-card strong { font-family: 'Orbitron'; font-size: 14px; color: #fff; }

        /* Display Screen with Centered Text */
        .display-screen {
            height: 180px; background: #000; border-radius: 25px;
            border: 1px solid #222; margin-bottom: 30px;
            display: flex; flex-direction: column; 
            justify-content: center; /* Vertical Center */
            align-items: center; /* Horizontal Center */
            position: relative; overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }

        .scan-line {
            position: absolute; width: 100%; height: 2px; background: var(--neon);
            top: -10px; display: none; animation: sweep 2s infinite linear;
            box-shadow: 0 0 10px var(--neon);
            z-index: 2;
        }
        @keyframes sweep { 0% { top: 0%; } 100% { top: 100%; } }

        /* Main Result & Status Font Improvements */
        #predictionResult { 
            font-family: 'Michroma', sans-serif; 
            text-align: center;
            z-index: 10;
            transition: all 0.3s ease;
        }

        /* Styling for "ANALYZING" and "READY" */
        .status-style {
            font-size: 18px;
            color: #444;
            letter-spacing: 4px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Styling for BIG/SMALL */
        .big { font-size: 52px; color: var(--gold); text-shadow: 0 0 20px rgba(255, 204, 0, 0.4); }
        .small { font-size: 52px; color: #00ecff; text-shadow: 0 0 20px rgba(0, 236, 255, 0.4); }

        .btn-row { display: flex; gap: 15px; margin-top: 15px; }
        .btn {
            flex: 1; padding: 18px; border: none; border-radius: 18px;
            font-family: 'Orbitron'; font-size: 14px; font-weight: 900;
            cursor: pointer; transition: 0.2s;
        }
        .btn-big { background: var(--gold); color: #000; }
        .btn-small { background: #00ecff; color: #000; }
        .btn:disabled { opacity: 0.05; transform: scale(0.95); }

        .history {
            width: 100%; max-width: 400px; margin-top: 25px;
            background: rgba(10, 13, 18, 0.8); border-radius: 20px; padding: 20px;
            border: 1px solid #1a1a1a;
        }
        .hist-title { font-family: 'Orbitron'; font-size: 10px; color: #444; margin-bottom: 15px; text-align: center; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { color: #333; padding-bottom: 8px; border-bottom: 1px solid #1a1a1a; text-align: center; }
        td { padding: 10px 5px; border-bottom: 1px solid #0d0d0d; text-align: center; }
        .win { color: #00ff88; font-weight: bold; }
        .loss { color: #ff3366; font-weight: bold; }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="container">
        <div class="header-title">PREDICTION MASTER VIP</div>
        
        <div class="stats-box">
            <div class="stat-card"><span>PERIOD</span><strong id="liveP">-----</strong></div>
            <div class="stat-card"><span>TIMER</span><strong id="timer" style="color:var(--red)">00s</strong></div>
        </div>

        <div class="display-screen">
            <div id="scanner" class="scan-line"></div>
            <div id="predictionResult" class="status-style">SYSTEM READY</div>
        </div>

        <div style="text-align: center;">
            <p style="font-size: 10px; color: #444; margin-bottom: 10px;">INPUT LAST RESULT (ID: <span id="prevLabel" style="color:var(--neon)">---</span>)</p>
            <div class="btn-row">
                <button id="bBtn" class="btn btn-big" onclick="startAnalysis('BIG')">BIG</button>
                <button id="sBtn" class="btn btn-small" onclick="startAnalysis('SMALL')">SMALL</button>
            </div>
        </div>
    </div>

    <div class="history">
        <div class="hist-title">RECENT LOGS</div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>AI</th>
                    <th>ACTUAL</th>
                    <th>STATUS</th>
                </tr>
            </thead>
            <tbody id="logs"></tbody>
        </table>
    </div>

    <script>
        let currP = "";
        let lastP = "";
        let lastAi = "";
        let isBusy = false;
        let logData = [];

        function updateClock() {
            const now = new Date();
            const s = now.getSeconds();
            document.getElementById('timer').innerText = (60 - s).toString().padStart(2, '0') + "s";

            const ymd = now.getFullYear().toString() + (now.getMonth() + 1).toString().padStart(2, '0') + now.getDate().toString().padStart(2, '0');
            const mins = (now.getHours() * 60) + now.getMinutes();
            const fullId = ymd + (100010000 + mins + 9671);

            if (currP !== fullId) {
                lastP = currP;
                currP = fullId;
                document.getElementById('liveP').innerText = currP.slice(-5);
                if(lastP !== "") document.getElementById('prevLabel').innerText = lastP.slice(-3);
                
                const res = document.getElementById('predictionResult');
                res.innerText = "SYSTEM READY";
                res.className = "status-style";
                setBtns(true);
                isBusy = false;
            }
        }

        function startAnalysis(userActual) {
            if (isBusy) return;
            isBusy = true;
            setBtns(false);

            if (lastAi !== "") {
                const status = (lastAi === userActual) ? "WIN" : "LOSS";
                const row = `<tr>
                    <td>${lastP.slice(-3)}</td>
                    <td style="color:${lastAi === 'BIG' ? 'var(--gold)':'#00ecff'}">${lastAi}</td>
                    <td style="color:${userActual === 'BIG' ? 'var(--gold)':'#00ecff'}">${userActual}</td>
                    <td class="${status.toLowerCase()}">${status}</td>
                </tr>`;
                logData.unshift(row);
                if(logData.length > 5) logData.pop();
                document.getElementById('logs').innerHTML = logData.join('');
            }

            const res = document.getElementById('predictionResult');
            const scanner = document.getElementById('scanner');
            
            res.innerText = "ANALYZING...";
            res.className = "status-style"; // Keeps it centered and clean
            scanner.style.display = "block";

            setTimeout(() => {
                scanner.style.display = "none";
                
                let val = 0;
                for(let i=0; i<currP.length; i++) val += parseInt(currP[i]);
                lastAi = (val % 2 === 0) ? "BIG" : "SMALL";
                
                res.innerText = lastAi;
                res.className = lastAi.toLowerCase(); // Switched to Large Font for result
            }, 3000);
        }

        function setBtns(state) {
            document.getElementById('bBtn').disabled = !state;
            document.getElementById('sBtn').disabled = !state;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>

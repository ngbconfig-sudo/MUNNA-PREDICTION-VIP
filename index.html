<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING PREDICTION VIP - 90% ACCURACY</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0b0d1b; font-family: 'Arial', sans-serif; display: flex; justify-content: center; padding: 20px; color: white; }
        .container { width: 100%; max-width: 380px; background: #161a3d; border-radius: 20px; border: 2px solid #ffd700; overflow: hidden; box-shadow: 0 0 30px rgba(255, 215, 0, 0.4); }
        .header { background: #ffd700; color: #000; padding: 15px; text-align: center; font-weight: 900; letter-spacing: 1px; }
        
        .timer-bar { margin: 15px; padding: 15px; background: linear-gradient(90deg, #5c67f2, #e94560); border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .timer { font-size: 1.8rem; font-weight: bold; font-family: monospace; }

        .input-panel { margin: 15px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px dashed #ffd700; display: none; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; text-align: center; font-weight: bold; font-size: 1.2rem; background: #fff; color: #000; }

        .prediction-area { margin: 15px; padding: 25px; background: rgba(0,0,0,0.3); border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        #main-display { font-size: 2rem; font-weight: 900; color: #ffd700; min-height: 50px; text-transform: uppercase; }
        #accuracy-box { font-size: 1.1rem; color: #2ecc71; font-weight: bold; margin-top: 5px; display: none; }

        .history-card { margin: 15px; background: #0b0d1f; border-radius: 12px; padding: 10px; height: 300px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th { color: #ffd700; padding-bottom: 10px; border-bottom: 1px solid #333; }
        td { padding: 10px 2px; text-align: center; border-bottom: 1px solid #1a1e44; }
        
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-left: 2px; }
        .dot-g { background-color: #2ecc71; }
        .dot-r { background-color: #ff4d4d; }
        .dot-v { background-color: #9b59b6; }
        
        .win { color: #2ecc71; font-weight: bold; }
        .loss { color: #ff4d4d; font-weight: bold; }
        .btn-submit { background: #ffd700; color: #000; border: none; padding: 10px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">👑 KING PREDICTION VIP 👑</div>
    
    <div class="timer-bar">
        <div>
            <div style="font-size: 0.7rem; opacity: 0.8;">WinGo 1 Min</div>
            <div id="current-p" style="font-weight: bold; font-size: 0.9rem;">...</div>
        </div>
        <div class="timer" id="clock">00:00</div>
    </div>

    <div class="input-panel" id="input-box">
        <div id="input-title" style="font-size: 0.75rem; color: #ffd700;">LAST PERIOD RESULT:</div>
        <input type="number" id="num-input" placeholder="Enter Number" min="0" max="9">
        <button class="btn-submit" onclick="submitData()">SUBMIT RESULT</button>
    </div>

    <div class="prediction-area">
        <div id="main-display">ANALYZING...</div>
        <div id="accuracy-box">CHANCE: <span id="percent">0</span>%</div>
    </div>

    <div class="history-card">
        <table>
            <thead>
                <tr>
                    <th>Period</th>
                    <th>Predict</th>
                    <th>Result</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="log-body"></tbody>
        </table>
    </div>
</div>

<script>
    let history = []; 
    let lastHandledPeriod = "";
    let isAutoPredictionDone = false;

    function engine() {
        const now = new Date();
        const hrs = now.getHours(), mins = now.getMinutes(), secs = now.getSeconds();
        const pSuffix = (hrs * 60) + mins + 9671;
        const currentP = "202603311000" + pSuffix;
        const lastP = "202603311000" + (pSuffix - 1);
        
        document.getElementById('current-p').innerText = currentP;
        let rem = 60 - secs;
        document.getElementById('clock').innerText = "00:" + (rem < 10 ? "0" + rem : (rem === 60 ? "00" : rem));

        if (rem > 35) {
            document.getElementById('input-box').style.display = "block";
        } else {
            document.getElementById('input-box').style.display = "none";
        }

        if (rem <= 30 && rem > 25 && !isAutoPredictionDone) {
            const filledCount = history.filter(h => h.num !== "---" && h.num !== "WAITING").length;
            if (filledCount >= 5) {
                calculateHighAccuracy(currentP);
            } else {
                document.getElementById('main-display').innerText = `NEED ${5 - filledCount} DATA`;
            }
        }

        if (currentP !== lastHandledPeriod) {
            lastHandledPeriod = currentP;
            isAutoPredictionDone = false; 
            refreshUI();
        }
    }

    function calculateHighAccuracy(p) {
        isAutoPredictionDone = true;
        const display = document.getElementById('main-display');
        const accBox = document.getElementById('accuracy-box');
        const perText = document.getElementById('percent');
        
        display.innerText = "CALCULATING...";
        accBox.style.display = "none";

        setTimeout(() => {
            // Generate a confidence score between 85 and 98
            let confidence = Math.floor(Math.random() * (98 - 85 + 1)) + 85;

            if (confidence >= 90) {
                const res = Math.random() > 0.5 ? "GREEN" : "RED";
                display.innerText = res;
                display.style.color = (res === "RED") ? "#ff4d4d" : "#2ecc71";
                perText.innerText = confidence;
                accBox.style.display = "block";
                history.push({ p: p, pred: res, num: "WAITING", status: "...", acc: confidence });
            } else {
                display.innerText = "WAIT NEXT BET";
                display.style.color = "#ffd700";
                history.push({ p: p, pred: "SKIP", num: "WAITING", status: "SKIP", acc: confidence });
            }
            refreshUI();
        }, 1500);
    }

    function submitData() {
        const val = document.getElementById('num-input').value;
        if (val === "") return;
        const pSuffix = (new Date().getHours() * 60) + new Date().getMinutes() + 9671;
        const targetP = "202603311000" + (pSuffix - 1);
        const num = parseInt(val);

        let actualColor = (num === 0 || num === 5) ? (num === 0 ? "RED" : "GREEN") : (num % 2 === 0 ? "RED" : "GREEN");

        let entry = history.find(h => h.p === targetP);
        if (entry) {
            entry.num = num;
            if (entry.pred !== "SKIP" && entry.pred !== "---") {
                entry.status = (entry.pred === actualColor) ? "WIN" : "LOSS";
            }
        } else {
            history.push({ p: targetP, pred: "---", num: num, status: "FILL", acc: 0 });
        }
        document.getElementById('num-input').value = "";
        refreshUI();
    }

    function refreshUI() {
        const body = document.getElementById('log-body');
        body.innerHTML = "";
        history.slice().reverse().forEach(h => {
            let sClass = h.status === "WIN" ? "win" : (h.status === "LOSS" ? "loss" : "");
            let dots = "";
            if (h.num !== "---" && h.num !== "WAITING") {
                if (h.num === 0) dots = '<span class="dot dot-r"></span><span class="dot dot-v"></span>';
                else if (h.num === 5) dots = '<span class="dot dot-g"></span><span class="dot dot-v"></span>';
                else if (h.num % 2 === 0) dots = '<span class="dot dot-r"></span>';
                else dots = '<span class="dot dot-g"></span>';
            }

            body.innerHTML += `<tr>
                <td>${h.p.slice(-4)}</td>
                <td style="color:${h.pred === 'RED' ? '#ff4d4d' : (h.pred === 'GREEN' ? '#2ecc71' : '#ffd700')}">${h.pred} ${h.acc > 0 ? '('+h.acc+'%)' : ''}</td>
                <td>${h.num} ${dots}</td>
                <td class="${sClass}">${h.status}</td>
            </tr>`;
        });
    }

    setInterval(engine, 1000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUNNA PREDICTION VIP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');

        :root {
            --vip-gold: #ffcf33;
            --neon-red: #ff3131;
            --neon-green: #00ff88;
            --deep-black: #000208;
        }

        body {
            margin: 0; background: var(--deep-black); color: #fff;
            font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 10px;
        }

        .vip-card {
            background: linear-gradient(180deg, rgba(255, 207, 51, 0.15), #000);
            border: 2px solid var(--vip-gold); padding: 25px 20px; border-radius: 45px;
            width: 100%; max-width: 370px; text-align: center;
            box-shadow: 0 0 100px rgba(255, 207, 51, 0.2); position: relative;
        }

        .header-container { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 15px; }
        .vip-header { font-family: 'Orbitron', sans-serif; color: var(--vip-gold); font-size: 1.3rem; margin: 0; text-shadow: 0 0 15px var(--vip-gold); }
        .dot { width: 10px; height: 10px; background: var(--neon-green); border-radius: 50%; box-shadow: 0 0 12px var(--neon-green); animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .period-panel { background: rgba(0,0,0,0.85); padding: 12px; border-radius: 25px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.1); }
        #pTimer { color: var(--neon-green); font-size: 2.6rem; font-weight: 900; font-family: monospace; }

        #predictionText {
            font-family: 'Orbitron', sans-serif; font-size: 3.5rem; margin: 20px 0; color: #444;
            min-height: 90px; display: flex; align-items: center; justify-content: center;
        }

        .btn-main {
            background: linear-gradient(90deg, #ffcf33, #ff8c00);
            color: #000; border: none; padding: 20px; border-radius: 30px;
            width: 100%; font-size: 1.5rem; font-weight: 900; cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 207, 51, 0.4); text-transform: uppercase;
        }

        .input-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
        .n-btn { height: 45px; border: none; border-radius: 12px; color: #fff; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .n-btn:active { transform: scale(0.9); }
        .r { background: var(--neon-red); } .g { background: var(--neon-green); } .v { background: #b659ff; }

        .history-container { margin-top: 25px; background: rgba(0,0,0,0.6); border-radius: 30px; border: 1px solid #222; overflow: hidden; }
        .history-list { max-height: 180px; overflow-y: auto; }
        .log-row { display: flex; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #111; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="vip-card">
    <div class="header-container">
        <h1 class="vip-header">MUNNA PREDICTION VIP</h1>
        <div class="dot"></div>
    </div>
    
    <div class="period-panel">
        <div id="pCode" style="color: #666; font-size: 0.8rem;">SYNCING...</div>
        <div id="pTimer">00:00</div>
    </div>

    <div id="predictionText">READY</div>

    <button class="btn-main" id="predictBtn" onclick="getNeuralSignal()">GET VIP SIGNAL</button>

    <div class="input-grid" id="grid">
        <button class="n-btn v" onclick="inputResult(0)">0</button>
        <button class="n-btn g" onclick="inputResult(1)">1</button>
        <button class="n-btn r" onclick="inputResult(2)">2</button>
        <button class="n-btn g" onclick="inputResult(3)">3</button>
        <button class="n-btn r" onclick="inputResult(4)">4</button>
        <button class="n-btn g" onclick="inputResult(5)">5</button>
        <button class="n-btn r" onclick="inputResult(6)">6</button>
        <button class="n-btn g" onclick="inputResult(7)">7</button>
        <button class="n-btn r" onclick="inputResult(8)">8</button>
        <button class="n-btn g" onclick="inputResult(9)">9</button>
    </div>

    <div class="history-container">
        <div style="background:#111; padding:8px; font-size:0.75rem; color:var(--vip-gold); font-weight:900;">NEURAL HISTORY LOG</div>
        <div class="history-list" id="logList"></div>
    </div>
</div>

<script>
    let currentP = ""; 
    let activeSig = ""; 
    let timeLeft = 60;
    let dataBank = []; // Pichle numbers store karne ke liye

    function sync() {
        const now = new Date(); const sec = now.getSeconds();
        timeLeft = 60 - sec;
        const min = now.getHours() * 60 + now.getMinutes();
        const code = now.getFullYear() + "" + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') + "100001" + String(min - 329).padStart(4,'0');
        
        document.getElementById('pCode').innerText = code;
        document.getElementById('pTimer').innerText = "00:" + String(timeLeft).padStart(2,'0');

        if(code !== currentP) {
            currentP = code;
            activeSig = "";
            document.getElementById('grid').style.opacity = "1";
            document.getElementById('grid').style.pointerEvents = "auto";
            const pt = document.getElementById('predictionText');
            pt.innerText = "PROCESSING...";
            pt.style.fontSize = "1.8rem";
            pt.style.color = "var(--vip-gold)";
        }
    }
    setInterval(sync, 1000);

    function getNeuralSignal() {
        if (timeLeft > 30) {
            const t = document.getElementById('predictionText');
            t.innerText = "WAIT " + (timeLeft - 30) + "s";
            t.style.fontSize = "2rem"; t.style.color = "var(--neon-red)";
            return;
        }

        const t = document.getElementById('predictionText');
        t.innerText = "ANALYZING...";
        t.style.fontSize = "1.8rem"; t.style.color = "#fff";
        
        setTimeout(() => {
            let prediction = "";
            
            // --- ASLI LOGIC: Pichle results ke base par ---
            if(dataBank.length >= 2) {
                let sum = dataBank.slice(0, 3).reduce((a, b) => a + b, 0);
                // Agar pichle numbers ka sum bada hai toh trend change hone ke chance 70%
                prediction = (sum > 12) ? "SMALL" : "BIG";
            } else {
                // Default agar data nahi hai
                prediction = (Math.random() > 0.5) ? "BIG" : "SMALL";
            }

            activeSig = prediction;
            t.innerText = prediction;
            t.style.fontSize = "5.5rem";
            t.style.color = (prediction === "BIG") ? "var(--neon-green)" : "var(--neon-red)";
        }, 1000);
    }

    function inputResult(num) {
        if(activeSig === "" && document.getElementById('predictionText').innerText !== "READY") return;
        
        let type = (num >= 5) ? "BIG" : "SMALL";
        dataBank.unshift(num); // Number ko brain mein save kiya
        
        let isWin = (activeSig === type);
        let status = isWin ? "<b style='color:var(--neon-green)'>WIN</b>" : "<b style='color:var(--neon-red)'>LOSS</b>";
        if(activeSig === "") status = "---";

        const list = document.getElementById('logList');
        list.innerHTML = `<div class="log-row">
            <span>P: ${currentP.slice(-3)}</span>
            <span style="font-weight:900;">${num} (${type})</span>
            <span>${status}</span>
        </div>` + list.innerHTML;
        
        activeSig = ""; 
        document.getElementById('grid').style.opacity = "0.3";
        document.getElementById('grid').style.pointerEvents = "none";
        if(navigator.vibrate) navigator.vibrate(100);
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUNNA PREDICTION VIP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@600;700&display=swap');

        :root {
            --neon-blue: #00d2ff;
            --system-green: #00ff88;
            --warning-red: #ff3131;
            --gold: #ffcf33;
            --dark-bg: #00050a;
        }

        body {
            margin: 0; background: var(--dark-bg); color: #fff;
            font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 10px; overflow: hidden;
        }

        .system-card {
            background: rgba(255,255,255,0.02); backdrop-filter: blur(35px);
            border: 2px solid rgba(0, 210, 255, 0.5); padding: 22px; border-radius: 45px;
            width: 100%; max-width: 380px; text-align: center;
            box-shadow: 0 0 60px rgba(0, 210, 255, 0.25);
        }

        .header-title {
            font-family: 'Orbitron', sans-serif; font-size: 1.3rem; color: var(--gold); 
            margin-bottom: 5px; letter-spacing: 1px; text-shadow: 0 0 15px rgba(255, 207, 51, 0.6);
        }

        .accuracy-badge {
            display: inline-block; background: rgba(0, 255, 136, 0.15);
            color: var(--system-green); border: 1px solid var(--system-green);
            padding: 3px 12px; border-radius: 20px; font-size: 0.75rem;
            font-weight: 800; margin-bottom: 12px;
        }

        .data-panel {
            background: rgba(0,0,0,0.9); padding: 12px; border-radius: 20px;
            margin-bottom: 15px; border-left: 4px solid var(--neon-blue);
        }

        .val { font-size: 0.95rem; font-weight: bold; color: var(--neon-blue); font-family: monospace; }

        .pred-box {
            margin: 15px 0; padding: 25px 5px; border-radius: 35px;
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            min-height: 110px; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        
        #predictionText { 
            font-family: 'Orbitron', sans-serif; font-size: 4.8rem; font-weight: 900; 
            margin: 0; letter-spacing: -2px; text-shadow: 0 0 40px currentColor;
            color: #333; line-height: 1; transition: all 0.3s ease;
        }

        .probability-bar {
            width: 80%; height: 4px; background: #222; border-radius: 2px; margin-top: 10px; overflow: hidden;
        }
        #probFill { width: 0%; height: 100%; background: var(--system-green); transition: 1s; }

        .stats-row {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;
            background: rgba(255,255,255,0.03); padding: 10px; border-radius: 15px;
        }
        .stat-val { font-size: 1.1rem; color: #fff; font-weight: 700; display: block; }

        .btn-main {
            background: linear-gradient(135deg, #00d2ff, #0077ff);
            color: white; border: none; padding: 18px; border-radius: 22px;
            width: 100%; font-size: 1.3rem; font-weight: 900; cursor: pointer;
            text-transform: uppercase; box-shadow: 0 8px 25px rgba(0, 119, 255, 0.4);
        }

        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; }
        .n-btn {
            aspect-ratio: 1; border: none; border-radius: 12px; color: #fff;
            font-weight: 900; font-size: 1.2rem; cursor: pointer;
        }
        .n-red { background: #ff3131; } .n-green { background: #00ff88; }
        .n-mix { background: linear-gradient(135deg, #b659ff, #ff3131); }
        .n-mix-g { background: linear-gradient(135deg, #b659ff, #00ff88); }

        #windowMsg { display: none; font-size: 0.8rem; color: var(--gold); margin-bottom: 10px; font-weight: 800; }

        .history-list { margin-top: 20px; text-align: left; max-height: 140px; overflow-y: auto; font-size: 0.8rem; border-top: 1px solid #222; }
        .h-item { display: flex; justify-content: space-between; padding: 8px 5px; border-bottom: 1px solid #111; }
    </style>
</head>
<body>

<div class="system-card">
    <div class="header-title">MUNNA PREDICTION VIP</div>
    <div class="accuracy-badge" id="accDisplay">SYSTEM STABILITY: 97.2%</div>
    
    <div class="data-panel">
        <div id="periodTxt" class="val">SYNCING...</div>
        <div id="timerTxt" style="color: var(--system-green); font-size: 1.6rem; font-family: monospace;">00:00</div>
    </div>

    <div class="pred-box">
        <div id="predictionText">READY</div>
        <div class="probability-bar"><div id="probFill"></div></div>
        <div id="probText" style="font-size: 0.6rem; color: #666; margin-top: 5px;">CONFIDENCE: 0%</div>
    </div>

    <div class="stats-row">
        <div><span style="font-size:0.6rem; color:#aaa;">SESSION WINS</span><span id="winCount" class="stat-val">0</span></div>
        <div><span style="font-size:0.6rem; color:#aaa;">WIN RATE</span><span id="winRate" class="stat-val">0%</span></div>
    </div>

    <div id="windowMsg">WAITING FOR PREVIOUS RESULT...</div>

    <button class="btn-main" id="predictBtn" onclick="analyzeQuantum()">GET VIP SIGNAL</button>

    <div style="background: rgba(0,0,0,0.2); padding: 12px; border-radius: 20px; margin-top: 15px;">
        <div class="num-grid" id="numGrid" style="opacity: 0.3; pointer-events: none;">
            <button class="n-btn n-mix" onclick="pushData(0)">0</button>
            <button class="n-btn n-green" onclick="pushData(1)">1</button>
            <button class="n-btn n-red" onclick="pushData(2)">2</button>
            <button class="n-btn n-green" onclick="pushData(3)">3</button>
            <button class="n-btn n-red" onclick="pushData(4)">4</button>
            <button class="n-btn n-mix-g" onclick="pushData(5)">5</button>
            <button class="n-btn n-red" onclick="pushData(6)">6</button>
            <button class="n-btn n-green" onclick="pushData(7)">7</button>
            <button class="n-btn n-red" onclick="pushData(8)">8</button>
            <button class="n-btn n-green" onclick="pushData(9)">9</button>
        </div>
    </div>

    <div class="history-list" id="hLog"></div>
</div>

<script>
    let currentP = ""; let prevP = ""; let activePred = null;
    let history = []; let isWindow = false;
    let wins = 0; let total = 0;

    function timerSync() {
        const now = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Kolkata"}));
        const sec = now.getSeconds();
        const rem = 60 - sec;
        let elapsed = (now.getHours() * 60 + now.getMinutes()) - (5 * 60 + 29);
        const pStr = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + 
                     String(now.getDate()).padStart(2, '0') + "100001" + String(elapsed).padStart(4, '0');
        
        document.getElementById('periodTxt').innerText = pStr;
        document.getElementById('timerTxt').innerText = "00:" + String(rem).padStart(2, '0');

        if (pStr !== currentP) {
            prevP = currentP; currentP = pStr;
            if(prevP !== "") openEntry();
        }
    }
    setInterval(timerSync, 1000);

    function openEntry() {
        isWindow = true;
        const msg = document.getElementById('windowMsg');
        const grid = document.getElementById('numGrid');
        msg.style.display = "block"; grid.style.opacity = "1"; grid.style.pointerEvents = "auto";
        msg.innerText = "WINDOW OPEN: ENTER LAST RESULT";
    }

    function closeEntry() {
        isWindow = false;
        document.getElementById('windowMsg').style.display = "none";
        document.getElementById('numGrid').style.opacity = "0.3";
        document.getElementById('numGrid').style.pointerEvents = "none";
        updateDisplay("READY", "#333", 0);
        document.getElementById('predictBtn').disabled = false;
    }

    function analyzeQuantum() {
        updateDisplay("SCAN", "#fff", 30);
        setTimeout(() => {
            let pred = "";
            let confidence = 0;

            // --- DEEP PATTERN RECOGNITION ---
            if(history.length >= 3) {
                const h1 = history[0].type;
                const h2 = history[1].type;
                const h3 = history[2].type;

                if(h1 === h2 && h2 === h3) { // Dragon Series
                    pred = (Math.random() > 0.1) ? h1 : (h1 === "BIG" ? "SMALL" : "BIG");
                    confidence = 98;
                } else if(h1 !== h2 && h2 !== h3) { // Alternating Series
                    pred = h1;
                    confidence = 95;
                } else {
                    // Logic based on last number and period seed
                    pred = (history[0].num + parseInt(currentP.slice(-1))) % 2 === 0 ? "BIG" : "SMALL";
                    confidence = 92;
                }
            } else {
                pred = (parseInt(currentP.slice(-1)) % 2 === 0) ? "BIG" : "SMALL";
                confidence = 89;
            }

            updateDisplay(pred, (pred === "BIG" ? "var(--system-green)" : "var(--warning-red)"), confidence);
            activePred = { period: currentP, type: pred };
            document.getElementById('predictBtn').disabled = true;
        }, 1200);
    }

    function updateDisplay(txt, color, prob) {
        const el = document.getElementById('predictionText');
        el.innerText = txt; el.style.color = color;
        el.style.fontSize = txt.length > 5 ? "3.5rem" : "4.8rem";
        
        document.getElementById('probFill').style.width = prob + "%";
        document.getElementById('probText').innerText = "CONFIDENCE: " + prob + "%";
    }

    function pushData(n) {
        if(!isWindow) return;
        let type = (n >= 5) ? "BIG" : "SMALL";
        let status = "---"; let sCol = "#fff";

        if(activePred && activePred.period === prevP) {
            total++;
            if(activePred.type === type) { wins++; status = "WIN ✅"; sCol = "var(--system-green)"; }
            else { status = "LOSS ❌"; sColor = "var(--warning-red)"; }
            
            document.getElementById('winCount').innerText = wins;
            document.getElementById('winRate').innerText = Math.round((wins/total)*100) + "%";
        }

        history.unshift({type: type, num: n});
        if(history.length > 20) history.pop();

        const log = document.getElementById('hLog');
        log.innerHTML = `<div class="h-item">
            <span>P: ${prevP.slice(-3)}</span>
            <span style="font-weight:900; color:${type==='BIG'?'#00ff88':'#ff3131'}">${n}(${type})</span>
            <span style="font-weight:bold; color:${sCol}">${status}</span>
        </div>` + log.innerHTML;

        activePred = null; closeEntry();
        if (navigator.vibrate) navigator.vibrate(80);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUNNA PREDICTION VIP</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #ff3131;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .container {
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #ff3131;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 49, 49, 0.7);
            width: 85%;
            max-width: 380px;
            border-style: double;
        }

        h2 { 
            font-size: 1.6rem; 
            margin-bottom: 15px; 
            color: #ff3131;
            text-shadow: 0 0 20px #ff3131;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 900;
        }

        .label { font-size: 0.7rem; color: #888; text-transform: uppercase; margin-top: 10px; letter-spacing: 2px;}

        .display-box {
            background: #050505;
            border: 1px solid #ff3131;
            padding: 12px;
            margin: 5px 0 15px 0;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 10px;
            color: #ff3131;
            box-shadow: inset 0 0 15px rgba(255, 49, 49, 0.2);
        }

        #resultView {
            font-size: 1.8rem;
            margin: 20px 0;
            min-height: 60px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
        }

        button {
            background: #ff3131;
            color: #fff;
            border: none;
            padding: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.3rem;
            box-shadow: 0 0 25px rgba(255, 49, 49, 0.5);
            transition: 0.3s;
            width: 100%;
            letter-spacing: 1px;
        }

        button:disabled {
            background: #1a1a1a;
            color: #444;
            box-shadow: none;
            cursor: not-allowed;
            border: 1px solid #333;
        }

        .tg-link { margin-top: 25px; }
        .tg-link img { width: 45px; filter: drop-shadow(0 0 10px #ff3131); }

    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <div class="container">
        <h2>MUNNA VIP</h2>

        <div class="label">Server Period</div>
        <div id="periodNumber" class="display-box">----------</div>

        <div class="label">Next Update In</div>
        <div id="timerView" class="display-box">00:00</div>

        <div id="resultView" style="color: #ff3131;">READY FOR NEXT</div>

        <button id="genBtn" onclick="generateWinPrediction()">GET VIP RESULT</button>

        <div class="tg-link">
            <a href="https://t.me/YOUR_TELEGRAM_CHANNEL" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="Telegram">
            </a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const nums = "0123456789";
        const fontSize = 16;
        const drops = Array(Math.floor(canvas.width / fontSize)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff0000";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                ctx.fillText(nums[Math.floor(Math.random()*10)], i*fontSize, drops[i]*fontSize);
                if (drops[i]*fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);

        let currentActivePeriod = "";
        let isLocked = false;

        function updateSystem() {
            const ist = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Kolkata"}));
            const remain = 60 - ist.getSeconds();
            let elapsed = (ist.getHours() * 60 + ist.getMinutes()) - (5 * 60 + 29);
            if (elapsed < 0) elapsed = 0;

            const yyyy = ist.getFullYear();
            const mm = String(ist.getMonth() + 1).padStart(2, '0');
            const dd = String(ist.getDate()).padStart(2, '0');
            const periodString = yyyy + mm + dd + "100001" + String(elapsed).padStart(4, '0');
            
            document.getElementById('periodNumber').innerText = periodString;
            document.getElementById('timerView').innerText = "00:" + String(remain).padStart(2, '0');

            if (periodString !== currentActivePeriod) {
                currentActivePeriod = periodString;
                isLocked = false;
                document.getElementById('resultView').innerText = "READY FOR NEXT";
                document.getElementById('resultView').style.color = "#ff3131";
                document.getElementById('genBtn').disabled = false;
                document.getElementById('genBtn').innerText = "GET VIP RESULT";
            }
        }
        setInterval(updateSystem, 1000);

        function generateWinPrediction() {
            if(isLocked) return;

            const res = document.getElementById('resultView');
            const btn = document.getElementById('genBtn');
            const period = document.getElementById('periodNumber').innerText;

            btn.disabled = true;
            btn.innerText = "BYPASSING SERVER...";
            res.innerText = "WAIT...";

            setTimeout(() => {
                // WIN LOGIC: Period ke aakhri number se result fix kar diya
                // Isse har baar same period par same result aayega (Trust badhega)
                const lastDigit = parseInt(period.slice(-1));
                let prediction = "";
                let color = "";

                if (lastDigit % 2 === 0) {
                    prediction = "BIG (GREEN)";
                    color = "#00ff41";
                } else {
                    prediction = "SMALL (RED)";
                    color = "#ff3131";
                }

                res.innerText = prediction;
                res.style.color = color;
                res.style.textShadow = "0 0 15px " + color;
                btn.innerText = "VERIFIED";
                isLocked = true;
            }, 1500);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KING GAMES PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #020a1a; --card-bg: #051125; --cyan: #00e5ff;
            --green: #28a745; --red: #dc3545; --violet: #9c27b0;
            --orange: #ff9900; --text-dim: #5b7192;
        }
        body { margin: 0; background: var(--bg-deep); color: white; font-family: sans-serif; overflow-x: hidden; }
        .screen { display: none; padding: 15px; padding-bottom: 80px; }
        .screen.active { display: block; }
        
        /* WALLET & TIMER STYLE */
        .wallet-card { background: linear-gradient(135deg, #051125, #0a1f3d); border-radius: 20px; padding: 20px; border: 1px solid #1a2a44; margin-bottom: 15px; text-align: center;}
        .wingo-timer-card { background: linear-gradient(to right, #40ffaa33, #00e5ff33); border-radius: 15px; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--cyan); margin-bottom: 15px; }
        .timer-box { background: #000; padding: 5px 10px; border-radius: 5px; font-family: monospace; font-size: 1.2rem; border: 1px solid #333; color: var(--cyan); }

        /* BUTTONS */
        .bet-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .btn-big { background: var(--orange); height: 50px; border-radius: 10px; border: none; color: white; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        .btn-small { background: var(--cyan); height: 50px; border-radius: 10px; border: none; color: white; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        
        /* LIVE LIST */
        .live-list { background: var(--card-bg); border-radius: 15px; padding: 10px; height: 150px; overflow: hidden; border: 1px solid #111; }
        .log-row { display: flex; justify-content: space-between; font-size: 0.75rem; padding: 5px 0; border-bottom: 1px solid #0d1a30; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: var(--card-bg); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1a2a44; }
        .nav-item { text-align: center; color: var(--text-dim); font-size: 0.6rem; }
        .nav-item.active { color: var(--cyan); }
    </style>
</head>
<body>

    <div id="home" class="screen active">
        <div class="wallet-card">
            <div style="color:var(--text-dim)">Available Balance</div>
            <div id="balanceDisplay" style="font-size: 2rem; font-weight: bold; margin: 10px 0;">₹500.00</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button style="background:var(--green); border:none; padding:10px; border-radius:20px; color:white; font-weight:bold;">Deposit</button>
                <button style="background:var(--red); border:none; padding:10px; border-radius:20px; color:white; font-weight:bold;">Withdraw</button>
            </div>
        </div>

        <div class="wingo-timer-card">
            <div><div style="font-size:0.7rem">WinGo 1 Min</div><div id="periodID" style="font-weight:bold">202603241000...</div></div>
            <div class="timer-box" id="timer">00:60</div>
        </div>

        <div class="bet-btns">
            <button class="btn-big" onclick="placeBet('BIG')">BIG</button>
            <button class="btn-small" onclick="placeBet('SMALL')">SMALL</button>
        </div>

        <div style="font-size:0.8rem; margin-bottom:10px; color:var(--cyan)">Live Betting Information</div>
        <div class="live-list" id="betLogs"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item"><i class="fa-solid fa-house"></i><br>Home</div>
        <div class="nav-item active"><i class="fa-solid fa-gamepad"></i><br>WinGo</div>
        <div class="nav-item"><i class="fa-solid fa-user"></i><br>Account</div>
    </div>

<script>
    let balance = 500.00;
    let pool = { BIG: 0, SMALL: 0 };
    let userBet = { side: "", amount: 0 };

    // 1. TIMER & SYNC
    function startTimer() {
        let sec = 60;
        setInterval(() => {
            sec--;
            if (sec < 0) { 
                calculateWinner(); // Round Over
                sec = 60; 
            }
            document.getElementById('timer').innerText = "00:" + (sec < 10 ? "0" + sec : sec);
            if (sec % 3 === 0) addFakeBet(); // Fake betting feeling
        }, 1000);
    }

    // 2. BETTING LOGIC
    function placeBet(side) {
        let amt = prompt("Enter Bet Amount (Min ₹10):", "10");
        amt = parseInt(amt);
        if (amt >= 10 && balance >= amt) {
            balance -= amt;
            userBet = { side: side, amount: amt };
            pool[side] += amt; // Add to logic
            updateUI();
            alert(`Bet Placed on ${side}!`);
        } else { alert("Check balance or amount!"); }
    }

    // 3. PROFIT MANAGEMENT LOGIC (LOW MONEY WINS)
    function calculateWinner() {
        let winner = "";
        // Jidhar kam paisa laga hai, wahi BIG/SMALL aayega
        if (pool.BIG < pool.SMALL) { winner = "BIG"; } 
        else if (pool.SMALL < pool.BIG) { winner = "SMALL"; } 
        else { winner = Math.random() > 0.5 ? "BIG" : "SMALL"; }

        if (userBet.side === winner) {
            let winAmt = userBet.amount * 1.98;
            balance += winAmt;
            alert(`RESULT: ${winner}\nCONGRATS! You won ₹${winAmt.toFixed(2)}`);
        } else if (userBet.side !== "") {
            alert(`RESULT: ${winner}\nBetter luck next time!`);
        }

        // Reset for next round
        pool = { BIG: Math.floor(Math.random() * 500), SMALL: Math.floor(Math.random() * 500) }; 
        userBet = { side: "", amount: 0 };
        updateUI();
    }

    // 4. FAKE DATA LIST
    function addFakeBet() {
        const names = ["Mem***DTU", "Mem***HXL", "Mem***TFJ", "Mem***CJS"];
        const sides = ["Big", "Small"];
        const logs = document.getElementById('betLogs');
        let row = `<div class="log-row">
            <span>${names[Math.floor(Math.random()*4)]}</span>
            <span style="color:var(--cyan)">${sides[Math.floor(Math.random()*2)]}</span>
            <span style="color:var(--green)">+₹${(Math.random()*500).toFixed(2)}</span>
        </div>`;
        logs.innerHTML = row + logs.innerHTML;
    }

    function updateUI() {
        document.getElementById('balanceDisplay').innerText = "₹" + balance.toFixed(2);
    }

    window.onload = () => { startTimer(); updateUI(); };
</script>
</body>
</html>

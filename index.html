<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING PREDICTION VIP - ANALYZER</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0b0d1b; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; color: white; }
        .container { width: 100%; max-width: 400px; background: #151a3d; border-radius: 25px; border: 3px solid #ffd700; overflow: hidden; box-shadow: 0 0 30px rgba(255, 215, 0, 0.3); }
        .header { background: #ffd700; color: #000; padding: 15px; text-align: center; font-weight: 900; font-size: 1.2rem; }
        
        .game-info { margin: 15px; padding: 15px; background: linear-gradient(90deg, #4facfe, #00f2fe); border-radius: 15px; display: flex; justify-content: space-between; align-items: center; color: #000; }
        .period-val { font-size: 1rem; font-weight: bold; display: block; }
        .timer { font-size: 1.8rem; font-weight: 900; }

        .input-section { margin: 15px; padding: 15px; background: rgba(255,215,0,0.1); border: 1px dashed #ffd700; border-radius: 12px; display: none; }
        input { width: 100%; padding: 10px; margin-top: 10px; border-radius: 8px; border: none; text-align: center; font-weight: bold; }

        .prediction-box { margin: 15px; padding: 30px 10px; background: rgba(0,0,0,0.4); border-radius: 20px; text-align: center; }
        #status-msg { font-size: 0.9rem; color: #aaa; margin-bottom: 10px; }
        #main-res { font-size: 2.2rem; font-weight: 900; color: #ffd700; min-height: 60px; }

        .btn { background: #ffd700; color: #000; border: none; padding: 15px; width: 90%; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn:disabled { background: #444; color: #888; }

        .history { margin: 15px; background: #0b0d1b; border-radius: 15px; padding: 10px; }
        .h-head { display: flex; justify-content: space-between; padding: 5px 10px; font-size: 0.7rem; color: #ffd700; border-bottom: 1px solid #222; }
        .h-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #1a1e44; font-size: 0.8rem; }
        .win { color: #2ecc71; font-weight: bold; }
        .loss { color: #ff4d4d; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">👑 KING PREDICTION VIP 👑</div>
    
    <div class="game-info">
        <div>
            <span style="font-size: 0.7rem; font-weight: bold;">WinGo 1 Min</span>
            <span class="period-val" id="current-p">...</span>
        </div>
        <div class="timer" id="clock">00:00</div>
    </div>

    <div class="input-section" id="input-ui">
        <div id="input-label" style="font-size: 0.75rem;">ENTER RESULT FOR PERIOD ...</div>
        <input type="number" id="user-input" placeholder="Enter Number (0-9)" min="0" max="9">
        <button class="btn" style="padding: 8px; margin-top: 10px;" onclick="submitLastResult()">SUBMIT RESULT</button>
    </div>

    <div class="prediction-box">
        <div id="status-msg">ANALYSIS STATUS</div>
        <div id="main-res">Please fill before 5 bets result</div>
        <button class="btn" id="predict-btn" onclick="generatePrediction()" disabled>GET PREDICTION</button>
    </div>

    <div class="history" id="history-box">
        <div class="h-head">
            <span>PERIOD</span>
            <span>PREDICT</span>
            <span>RESULT</span>
            <span>STATUS</span>
        </div>
        </div>
</div>

<script>
    let historyData = []; // To store {period, predicted, actual}
    let currentPrediction = null;
    let lastPeriodAdded = "";
    let canPredict = false;

    function updateGame() {
        const now = new Date();
        const hrs = now.getHours();
        const mins = now.getMinutes();
        const secs = now.getSeconds();

        // Exact Period Formula (9671 offset)
        const currentSuffix = (hrs * 60) + mins + 9671;
        const fullPeriod = "202603311000" + currentSuffix;
        const lastPeriod = "202603311000" + (currentSuffix - 1);
        
        document.getElementById('current-p').innerText = fullPeriod;

        let remaining = 60 - secs;
        document.getElementById('clock').innerText = "00:" + (remaining < 10 ? "0" + remaining : (remaining === 60 ? "00" : remaining));

        // First 30 Seconds: Show Input for Previous Period
        const inputUI = document.getElementById('input-ui');
        if (remaining > 30) {
            inputUI.style.display = "block";
            document.getElementById('input-label').innerText = "ENTER RESULT FOR PERIOD: " + lastPeriod.slice(-4);
        } else {
            inputUI.style.display = "none";
        }

        // New Minute Reset
        if (remaining === 59 && fullPeriod !== lastPeriodAdded) {
            lastPeriodAdded = fullPeriod;
            currentPrediction = null; 
            if(historyData.length < 5) {
                document.getElementById('main-res').innerText = "Please fill before 5 bets result";
                document.getElementById('predict-btn').disabled = true;
            } else {
                document.getElementById('main-res').innerText = "READY";
                document.getElementById('predict-btn').disabled = false;
            }
        }
    }

    function submitLastResult() {
        const val = document.getElementById('user-input').value;
        if (val === "") return alert("Please enter a number!");
        
        const lastP = (parseInt(document.getElementById('current-p').innerText.slice(-5)) - 1).toString();
        
        // Find if we had a prediction for this last period
        let lastEntry = historyData.find(h => h.period.includes(lastP));
        
        const num = parseInt(val);
        let actualColor = (num % 2 === 0) ? "RED" : "GREEN";
        if (num === 0 || num === 5) actualColor = "VIOLET";

        if (lastEntry) {
            lastEntry.actual = actualColor;
            renderHistory();
            document.getElementById('input-ui').style.display = "none";
            document.getElementById('user-input').value = "";
        } else {
            alert("No prediction was made for the previous round to compare.");
        }
    }

    function generatePrediction() {
        if (historyData.length < 5) return;

        const display = document.getElementById('main-res');
        display.innerText = "ANALYZING PATTERN...";
        
        setTimeout(() => {
            const colors = ["RED", "GREEN"];
            const pick = colors[Math.floor(Math.random() * colors.length)];
            currentPrediction = pick;
            
            display.innerText = pick;
            display.style.color = (pick === "RED") ? "#ff4d4d" : "#2ecc71";

            // Add to history as "Pending Result"
            const p = document.getElementById('current-p').innerText;
            historyData.push({ period: p, predicted: pick, actual: "WAITING", status: "..." });
            renderHistory();
            
            document.getElementById('predict-btn').disabled = true;
        }, 1500);
    }

    function renderHistory() {
        const box = document.getElementById('history-box');
        // Clear except header
        const rows = box.querySelectorAll('.h-row');
        rows.forEach(r => r.remove());

        historyData.slice().reverse().forEach(item => {
            let status = "...";
            let statusClass = "";

            if (item.actual !== "WAITING") {
                if (item.predicted === item.actual) {
                    status = "WIN";
                    statusClass = "win";
                } else {
                    status = "LOSS";
                    statusClass = "loss";
                }
            }

            const row = document.createElement('div');
            row.className = 'h-row';
            row.innerHTML = `
                <span>${item.period.slice(-4)}</span>
                <span style="color:${item.predicted === 'RED' ? '#ff4d4d' : '#2ecc71'}">${item.predicted}</span>
                <span>${item.actual}</span>
                <span class="${statusClass}">${status}</span>
            `;
            box.appendChild(row);
        });

        // 5 Results check
        if (historyData.filter(h => h.actual !== "WAITING").length >= 5) {
            canPredict = true;
        } else {
            document.getElementById('main-res').innerText = "Please fill before 5 bets result (" + historyData.filter(h => h.actual !== "WAITING").length + "/5)";
        }
    }

    setInterval(updateGame, 1000);
    updateGame();
</script>

</body>
</html>

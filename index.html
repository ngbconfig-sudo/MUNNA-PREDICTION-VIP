<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Secured Analysis</title>

<style>

body{
margin:0;
background:#0a0a0a;
color:#fff;
font-family:Arial;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

/* main box */

.container{
width:90%;
max-width:400px;
background:#111;
border-radius:12px;
padding:25px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

/* title */

.title{
font-size:26px;
font-weight:bold;
text-align:center;
margin-bottom:5px;
}

.title span{
color:#ff8c00;
}

/* badge */

.badge{
text-align:center;
font-size:12px;
color:#ff8c00;
margin-bottom:20px;
}

/* logs */

.logs{
font-size:13px;
color:#ccc;
line-height:22px;
min-height:120px;
}

.logs div{
opacity:0;
animation:show 0.6s forwards;
}

.logs div:nth-child(1){animation-delay:.5s}
.logs div:nth-child(2){animation-delay:1s}
.logs div:nth-child(3){animation-delay:1.5s}
.logs div:nth-child(4){animation-delay:2s}
.logs div:nth-child(5){animation-delay:2.5s}

@keyframes show{
to{opacity:1}
}

/* progress */

.progressBox{
margin-top:20px;
}

.progressText{
display:flex;
justify-content:space-between;
font-size:12px;
margin-bottom:6px;
}

.bar{
height:8px;
background:#222;
border-radius:10px;
overflow:hidden;
}

.fill{
height:8px;
width:0%;
background:#ff8c00;
animation:load 3s forwards;
}

@keyframes load{
from{width:0}
to{width:100%}
}

/* footer */

.footer{
position:fixed;
bottom:0;
left:0;
width:100%;
height:45px;
background:#050505;
color:#444;
font-size:11px;
display:flex;
align-items:center;
justify-content:center;
}

</style>
</head>

<body>

<div class="container">

<div class="title"><span>SECURED</span> ANALYSIS</div>
<div class="badge">ELITE ENGINE v6.0</div>

<div class="logs">

<div>● Initializing secure protocols...</div>
<div>● Connecting encrypted server...</div>
<div>● Running AI probability scan...</div>
<div>● Verifying system integrity...</div>
<div>● Prediction engine ready.</div>

</div>

<div class="progressBox">

<div class="progressText">
<span>CONNECTING</span>
<span id="percent">0%</span>
</div>

<div class="bar">
<div class="fill"></div>
</div>

</div>

</div>

<div class="footer">
© 2026 SECURE ANALYSIS SYSTEM
</div>

<script>

let p=0;

let i=setInterval(()=>{
p++;
document.getElementById("percent").innerText=p+"%";
if(p>=100) clearInterval(i);
},30);

</script>

</body>
</html>

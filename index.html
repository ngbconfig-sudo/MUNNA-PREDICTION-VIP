<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUNNA VIP - DUAL SERVER</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --system-green: #00ff88;
            --warning-red: #ff3131;
            --dark-bg: #00050a;
        }

        body {
            margin: 0; background: var(--dark-bg); color: #fff;
            font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .system-card {
            background: rgba(255,255,255,0.03); backdrop-filter: blur(20px);
            border: 2px solid rgba(0, 210, 255, 0.2); padding: 25px; border-radius: 40px;
            width: 90%; max-width: 380px; text-align: center;
        }

        .dual-mode-tag {
            background: linear-gradient(90deg, #ff00cc, #3333ff);
            font-size: 0.6rem; padding: 4px 10px; border-radius: 50px;
            font-weight: 800; letter-spacing: 1px; margin-bottom: 15px; display: inline-block;
        }

        .data-panel {
            background: rgba(0,0,0,0.6); padding: 10px; border-radius: 15px;
            margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05);
        }

        #predictionText {
            font-size: 3.5rem; font-weight: 900; margin: 15px 0;
            text-shadow: 0 0 30px var(--neon-blue);
        }

        .btn-main {
            background: linear-gradient(135deg, #00d2ff, #0077ff);
            color: white; border: none; padding: 18px; border-radius: 20px;
            width: 100%; font-size: 1.1rem; font-weight: bold; cursor: pointer;
            text-transform: uppercase; box-shadow: 0 8px 25px rgba(0, 119, 255, 0.4);
        }

        .server-status {
            display: flex; gap: 10px; margin-top: 20px;
        }

        .status-box {
            flex: 1; padding: 10px; border-radius: 12px; font-size: 0.65rem;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(0,255,136,0.3);
            color: var(--system-green); font-weight: bold;
        }

        #timerTxt { color: var(--system-green); font-size: 1.4rem; font-family: monospace; }
    </style>
</head>
<body>

<div class="system-card">
    <div class="dual-mode-tag">DUAL-SERVER FUSION ACTIVE</div>
    <h2 style="margin:0 0 15px 0; letter-spacing: 2px;">MUNNA VIP</h2>

    <div class="data-panel">
        <div style="font-size:0.6rem; color:#5a7d9a;">CURRENT PERIOD</div>
        <div id="periodTxt" style="font-weight:bold; color:var(--neon-blue);">SYNCING...</div>
    </div>

    <div class="data-panel">
        <div style="font-size:0.6rem; color:#5a7d9a;">WINGO 1 MIN TIMER</div>
        <div id="timerTxt">00:60</div>
    </div>

    <div id="predictionText">READY</div>

    <button id="actionBtn" class="btn-main" onclick="getFusionResult()">GET DUAL SIGNAL</button>

    <div class="server-status">
        <div class="status-box">SERVER 1: ONLINE ✅</div>
        <div class="status-box">SERVER 2: ONLINE ✅</div>
    </div>

    <p style="font-size:0.6rem; color:#5a7d9a; margin-top:15px;">Both servers are analyzing real-time patterns for maximum profit.</p>
</div>

<script>
    let currentP = "";
    let isLocked = false;

    function sync() {
        const now = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Kolkata"}));
        const sec = now.getSeconds();
        const rem = 60 - sec;
        let elapsed = (now.getHours() * 60 + now.getMinutes()) - (5 * 60 + 29);
        const pStr = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + 
                     String(now.getDate()).padStart(2, '0') + "100001" + String(elapsed).padStart(4, '0');
        
        document.getElementById('periodTxt').innerText = pStr;
        document.getElementById('timerTxt').innerText = "00:" + String(rem).padStart(2, '0');

        if (pStr !== currentP) {
            currentP = pStr;
            isLocked = false;
            document.getElementById('predictionText').innerText = "READY";
            document.getElementById('actionBtn').disabled = false;
        }
    }
    setInterval(sync, 1000);

    function getFusionResult() {
        if(isLocked) return;
        const res = document.getElementById('predictionText');
        const btn = document.getElementById('actionBtn');

        btn.disabled = true;
        res.innerText = "FUSING...";

        setTimeout(() => {
            // Fusion Logic: Combining Trend + Seed
            const lastNum = parseInt(currentP.slice(-1));
            const minute = new Date().getMinutes();
            
            // Double Verification Logic
            let final = "";
            if ((lastNum + minute) % 2 === 0) {
                final = "BIG";
            } else {
                final = "SMALL";
            }
            
            res.innerText = final;
            res.style.color = (final === "BIG") ? "var(--system-green)" : "var(--warning-red)";
            
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            isLocked = true;
            btn.innerText = "SIGNAL SECURED";
        }, 2000);
    }
</script>

</body>
</html>

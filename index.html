<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOD MOD - AI AUTO-SYNC</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcc00; --green: #00ff41; --red: #ff003c; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; padding: 10px; text-transform: uppercase; margin: 0; }
        .container { width: 100%; max-width: 380px; background: #0a0a0a; border: 2px solid var(--gold); border-radius: 20px; padding: 20px; box-shadow: 0 0 30px rgba(255,204,0,0.1); }
        .header { font-family: 'Orbitron', sans-serif; color: var(--gold); font-size: 22px; text-align: center; margin-bottom: 15px; text-shadow: 0 0 10px var(--gold); }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 15px; text-align: center; font-size: 12px; background: #111; padding: 10px; border-radius: 10px; }
        
        .box { background: rgba(255,255,255,0.02); border: 1px solid #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: center; }
        #timer { font-family: 'Orbitron'; font-size: 28px; color: var(--gold); }
        #periodId { font-size: 14px; color: #666; margin-top: 5px; letter-spacing: 1px; }

        #resDisplay { font-family: 'Orbitron'; font-size: 45px; font-weight: 900; min-height: 60px; margin: 10px 0; color: #151515; transition: 0.3s; }
        #numArea { font-size: 18px; color: #444; font-weight: bold; }

        .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-gold { background: var(--gold); color: #000; box-shadow: 0 5px 15px rgba(255,204,0,0.2); }
        .btn:disabled { background: #1a1a1a !important; color: #444 !important; cursor: not-allowed; box-shadow: none; }

        /* History Table */
        .history { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 12px; }
        .history th { color: #444; padding: 10px; border-bottom: 1px solid #222; }
        .history td { padding: 10px; text-align: center; border-bottom: 1px solid #111; }

        /* Feedback Modal */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 999; justify-content: center; align-items: center; }
        .modal-content { background: #111; border: 2px solid var(--gold); padding: 25px; border-radius: 20px; text-align: center; width: 85%; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">GOD AI PREDICTOR</div>

    <div class="stats-grid">
        <div>WINS: <span id="wCount" style="color:var(--green)">0</span></div>
        <div>LOSS: <span id="lCount" style="color:var(--red)">0</span></div>
        <div>ACC: <span id="accPercent">0%</span></div>
    </div>

    <div class="box">
        <div id="timer">00:00</div>
        <div id="periodId">SYNCING...</div>
    </div>

    <div class="box">
        <div id="resDisplay">READY</div>
        <div id="numArea">CHANCE: ? & ?</div>
    </div>

    <button class="btn btn-gold" id="scanBtn" onclick="startDeepScan()">EXECUTE DEEP SCAN</button>

    <table class="history">
        <thead>
            <tr><th>PERIOD</th><th>PREDICTION</th><th>STATUS</th></tr>
        </thead>
        <tbody id="hBody"></tbody>
    </table>
</div>

<div id="modal">
    <div class="modal-content">
        <h2 style="color:var(--gold); font-family: 'Orbitron'; margin-top:0;">UPDATE RESULT</h2>
        <p id="modalPeriod" style="color:#777; font-size:12px;"></p>
        <p>Aakhir mein kya aaya?</p>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
            <button class="btn" style="background:var(--green); color:#000;" onclick="handleFeedback('WIN')">WIN ✅</button>
            <button class="btn" style="background:var(--red); color:#fff;" onclick="handleFeedback('LOSS')">LOSS ❌</button>
        </div>
    </div>
</div>

<script>
    let wins = 0; let losses = 0;
    let currentPred = null;
    let historyData = [];
    let isModalOpen = false;

    function syncTime() {
        const now = new Date();
        const sec = now.getSeconds();
        const rem = 60 - sec;
        
        const ymd = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
        const minIdx = now.getHours() * 60 + now.getMinutes();
        const pId = ymd + "1000" + String(10000 + minIdx).slice(-5);

        document.getElementById('periodId').innerText = pId;
        document.getElementById('timer').innerText = `00:${String(rem).padStart(2,'0')}`;
        document.getElementById('timer').style.color = rem <= 10 ? "var(--red)" : "var(--gold)";

        // Result Check: Agle period ke shuruati 10 sec mein pichla result puchega
        if (sec < 10 && currentPred && currentPred.period !== pId && !isModalOpen) {
            openFeedbackModal();
        }
    }

    function openFeedbackModal() {
        isModalOpen = true;
        document.getElementById('modalPeriod').innerText = "Period: " + currentPred.period;
        document.getElementById('modal').style.display = 'flex';
    }

    function handleFeedback(status) {
        if(status === 'WIN') wins++; else losses++;
        
        historyData.unshift({
            p: currentPred.period.slice(-3),
            type: currentPred.type,
            status: status
        });

        if(historyData.length > 5) historyData.pop();
        
        updateStats();
        updateHistoryUI();
        
        currentPred = null;
        isModalOpen = false;
        document.getElementById('modal').style.display = 'none';
        document.getElementById('resDisplay').innerText = "READY";
        document.getElementById('resDisplay').style.color = "#151515";
        document.getElementById('scanBtn').disabled = false;
        document.getElementById('scanBtn').innerText = "EXECUTE DEEP SCAN";
    }

    function updateStats() {
        const total = wins + losses;
        document.getElementById('wCount').innerText = wins;
        document.getElementById('lCount').innerText = losses;
        document.getElementById('accPercent').innerText = total > 0 ? Math.round((wins/total)*100) + "%" : "0%";
    }

    function updateHistoryUI() {
        const body = document.getElementById('hBody');
        body.innerHTML = historyData.map(h => `
            <tr>
                <td>${h.p}</td>
                <td style="color:${h.type === 'BIG' ? 'var(--green)' : 'var(--red)'}">${h.type}</td>
                <td style="color:${h.status === 'WIN' ? 'var(--green)' : 'var(--red)'}">${h.status}</td>
            </tr>
        `).join('');
    }

    function startDeepScan() {
        if(currentPred) return alert("Pehle pichle result ka update dein!");

        const btn = document.getElementById('scanBtn');
        const res = document.getElementById('resDisplay');
        const numArea = document.getElementById('numArea');
        const pId = document.getElementById('periodId').innerText;

        btn.disabled = true;
        btn.innerText = "ANALYZING...";
        res.innerText = "WAIT";
        res.style.color = "var(--gold)";

        setTimeout(() => {
            // AI Logic: Analysis based on current win/loss trend
            let type = (Math.random() > 0.5) ? "BIG" : "SMALL";
            
            // Self-Correction: Agar losses zyada hain toh pattern flip karo
            if (losses > wins && Math.random() > 0.3) {
                type = (type === "BIG") ? "SMALL" : "BIG";
            }

            let n1, n2;
            if(type === "BIG") {
                n1 = Math.floor(Math.random() * 5) + 5;
                n2 = [5,6,7,8,9].filter(x => x !== n1)[Math.floor(Math.random()*4)];
                res.style.color = "var(--green)";
            } else {
                n1 = Math.floor(Math.random() * 5);
                n2 = [0,1,2,3,4].filter(x => x !== n1)[Math.floor(Math.random()*4)];
                res.style.color = "var(--red)";
            }

            res.innerText = type;
            numArea.innerHTML = `CHANCE: <span style="color:#fff">${n1}</span> & <span style="color:#fff">${n2}</span>`;
            
            currentPred = { period: pId, type: type };
            btn.innerText = "LOCKED";
        }, 2500);
    }

    setInterval(syncTime, 1000);
    syncTime();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING PREDICTOR PRO - CLEAN & STEADY</title>
    <style>
        /* Modern, Clean & Professional Font (Verdana preferred) */
        body { margin: 0; background: #010101; font-family: 'Verdana', sans-serif; color: #fff; overflow-x: hidden; }
        .container { display: flex; flex-direction: column; align-items: center; padding: 15px; }
        .card { 
            background: #000; border: 1px solid #00f2fe; border-radius: 20px; 
            padding: 20px; width: 90%; max-width: 380px; text-align: center;
            box-shadow: 0 0 35px rgba(0, 242, 254, 0.4);
        }
        h1 { color: #ffcc00; font-size: 24px; margin: 0; text-shadow: 0 0 10px #ffcc00; text-transform: uppercase; letter-spacing: 2px; }
        .timer-box { background: #0a0a0a; margin: 15px 0; padding: 12px; border-radius: 12px; border: 1px solid #1a1a1a; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin: 15px 0; }
        .n-btn { height: 42px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: #fff; font-size: 16px; }
        .r { background: #ff4757; } .g { background: #2ed573; }
        .vr { background: linear-gradient(135deg, #a55eea 50%, #ff4757 50%); }
        .vg { background: linear-gradient(135deg, #a55eea 50%, #2ed573 50%); }
        
        .res-area { 
            background: #080808; padding: 20px; border-radius: 15px; margin: 15px 0; 
            border: 2px dashed #ffcc00; min-height: 100px; transition: 0.3s;
        }
        /* --- Clean & Non-Glowing BIG/SMALL Font --- */
        #p-val { font-size: 36px; font-weight: 900; color: #00f2fe; letter-spacing: 3px; }
        .accuracy-tag { font-size: 14px; color: #fff; font-weight: bold; }
        
        .main-btn { 
            background: linear-gradient(to right, #ffcc00, #ff9900); color: #000; 
            border: none; padding: 18px; width: 100%; font-weight: 900; border-radius: 12px; cursor: pointer; font-size: 18px;
        }
        .main-btn:disabled { background: #222; color: #555; cursor: not-allowed; }
        .reset-btn { background: transparent; color: #ff4757; border: 1px solid #ff4757; padding: 8px 15px; border-radius: 8px; font-size: 11px; margin-top: 10px; cursor: pointer; }

        .history-wrap { width: 100%; max-width: 400px; margin-top: 20px; max-height: 250px; overflow-y: auto; background: #000; border-radius: 10px; border: 1px solid #222; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { padding: 10px; color: #00f2fe; border-bottom: 2px solid #222; position: sticky; top: 0; background: #000; }
        td { padding: 8px; text-align: center; border-bottom: 1px solid #111; }
        .win { color: #2ed573; font-weight: bold; }
        .loss { color: #ff4757; font-weight: bold; }
        .skip { color: #888; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>KING PREDICTOR</h1>
        <div class="timer-box">
            <div id="p-id" style="font-size: 12px; color: #555;">PERIOD: ----</div>
            <div id="p-timer" style="font-size: 26px; color: #ff4757; font-weight: bold;">00:00</div>
        </div>

        <p id="data-count" style="font-size: 11px; color: #00f2fe;">REQUIRED: 5 RESULTS (0/5)</p>
        <div class="grid">
            <button class="n-btn vr" onclick="addHistory(0)">0</button>
            <button class="n-btn g" onclick="addHistory(1)">1</button>
            <button class="n-btn r" onclick="addHistory(2)">2</button>
            <button class="n-btn g" onclick="addHistory(3)">3</button>
            <button class="n-btn r" onclick="addHistory(4)">4</button>
            <button class="n-btn vg" onclick="addHistory(5)">5</button>
            <button class="n-btn r" onclick="addHistory(6)">6</button>
            <button class="n-btn g" onclick="addHistory(7)">7</button>
            <button class="n-btn r" onclick="addHistory(8)">8</button>
            <button class="n-btn g" onclick="addHistory(9)">9</button>
        </div>

        <div id="box-bg" class="res-area">
            <div id="p-status" style="font-size: 10px; color: #ffcc00; text-transform: uppercase;">SCANNING MODE</div>
            <div id="p-val">WAITING</div>
            <div id="p-acc" class="accuracy-tag">ACCURACY: --%</div>
        </div>

        <button id="predict-btn" class="main-btn" onclick="deepScanAndPredict()" disabled>GET PREDICTION</button>
        <button class="reset-btn" onclick="clearAllData()">RESET ALL DATA</button>
    </div>

    <div class="history-wrap">
        <table>
            <thead><tr><th>Period</th><th>Num</th><th>Size</th><th>Result</th></tr></thead>
            <tbody id="h-body"></tbody>
        </table>
    </div>
</div>

<script>
    let history = JSON.parse(localStorage.getItem('jalwa_history')) || [];
    let lockedPredictions = JSON.parse(localStorage.getItem('jalwa_locks')) || {};
    let lastEnteredPeriod = "";

    function updateTime() {
        const now = new Date();
        const ist = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Kolkata"}));
        const sec = ist.getSeconds();
        const rem = 60 - sec;
        const elapsed = (ist.getHours() * 60 + ist.getMinutes()) - (5 * 60 + 29);
        const dateStr = ist.getFullYear() + String(ist.getMonth()+1).padStart(2,'0') + String(ist.getDate()).padStart(2,'0');
        
        const currentPeriod = dateStr + "100001" + String(elapsed < 0 ? 0 : elapsed).padStart(4,'0');
        document.getElementById('p-id').innerText = "PERIOD: " + currentPeriod;
        document.getElementById('p-timer').innerText = "00:" + String(rem).padStart(2,'0');

        updateButtonStatus();
        if(rem === 59) {
            if(!lockedPredictions[currentPeriod]) {
                document.getElementById('p-val').innerText = "WAITING";
                document.getElementById('p-val').style.color = "#00f2fe";
                document.getElementById('p-acc').innerText = "ACCURACY: --%";
                document.getElementById('box-bg').style.boxShadow = "none";
            }
        }
    }
    setInterval(updateTime, 1000);

    function addHistory(n) {
        const curP = document.getElementById('p-id').innerText.split(": ")[1];
        if (lastEnteredPeriod === curP) return;

        const pastP = (BigInt(curP) - 1n).toString();
        const size = n >= 5 ? "BIG" : "SMALL";
        
        let outcome = "---";
        if (lockedPredictions[pastP]) {
            if(lockedPredictions[pastP].size === "SKIP") {
                outcome = "SKIP";
            } else {
                outcome = (size === lockedPredictions[pastP].size) ? "WIN" : "LOSS";
            }
        }

        history.unshift({ p: pastP, n: n, s: size, res: outcome });
        if(history.length > 50) history.pop();
        
        lastEnteredPeriod = curP;
        localStorage.setItem('jalwa_history', JSON.stringify(history));
        renderTable();
        updateButtonStatus();
    }

    function updateButtonStatus() {
        const count = history.length;
        const btn = document.getElementById('predict-btn');
        const countTxt = document.getElementById('data-count');
        if(count < 5) {
            countTxt.innerText = `REQUIRED: 5 RESULTS (${count}/5)`;
            btn.disabled = true;
        } else {
            countTxt.innerText = `READY TO SCAN (${count} PERIODs)`;
            btn.disabled = false;
        }
    }

    function renderTable() {
        const body = document.getElementById('h-body');
        body.innerHTML = history.map(d => `
            <tr>
                <td>...${d.p.slice(-4)}</td>
                <td style="color:#ffcc00; font-weight:bold">${d.n}</td>
                <td>${d.s}</td>
                <td class="${d.res.toLowerCase()}">${d.res}</td>
            </tr>
        `).join('');
    }

    function deepScanAndPredict() {
        const curP = document.getElementById('p-id').innerText.split(": ")[1];
        const out = document.getElementById('p-val');
        const accDisp = document.getElementById('p-acc');
        const status = document.getElementById('p-status');
        const box = document.getElementById('box-bg');

        if (lockedPredictions[curP]) {
            displayLock(lockedPredictions[curP]);
            return;
        }

        status.innerText = "CHECKING JALWA PATTERNS...";
        out.innerText = "● ● ●";

        setTimeout(() => {
            const h = history;
            let pSize = "";
            let acc = 0;

            const isStreak = h[0].s === h[1].s && h[1].s === h[2].s;
            const isAlternate = h[0].s !== h[1].s && h[1].s !== h[2].s;

            if (h[0].n === 0 || h[0].n === 5) {
                pSize = "BIG"; acc = 97;
            } else if (isStreak) {
                pSize = h[0].s; acc = 96;
            } else if (isAlternate) {
                pSize = h[0].s === "BIG" ? "SMALL" : "BIG"; acc = 95;
            } else {
                acc = Math.floor(Math.random() * (92 - 70) + 70);
            }

            // Accuracy check: SKIP or DISPLAY
            if (acc < 95) {
                pSize = "SKIP";
                out.innerText = "SKIPROUND";
                out.style.color = "#888";
                accDisp.innerText = "ACCURACY: " + acc + "% (UNSTABLE TREND)";
                status.innerText = "NO SURE SHOT DETECTED";
            } else {
                out.innerText = pSize;
                out.style.color = pSize === "BIG" ? "#ffcc00" : "#2ed573";
                accDisp.innerText = "ACCURACY: " + acc + "% (CONFIRMED 🔒)";
                status.innerText = "SURE SHOT PATTERN";
            }

            lockedPredictions[curP] = { size: pSize, acc: acc };
            localStorage.setItem('jalwa_locks', JSON.stringify(lockedPredictions));
        }, 1200);
    }

    function displayLock(data) {
        const out = document.getElementById('p-val');
        if(data.size === "SKIP") {
            out.innerText = "SKIPROUND";
            out.style.color = "#888";
        } else {
            out.innerText = data.size;
            out.style.color = data.size === "BIG" ? "#ffcc00" : "#2ed573";
        }
        document.getElementById('p-acc').innerText = "ACCURACY: " + data.acc + "% (SCAN LOCKED)";
    }

    function clearAllData() {
        if(confirm("FULL RESET JALWA DATA?")) {
            localStorage.clear(); history = []; lockedPredictions = {};
            renderTable(); updateButtonStatus();
            document.getElementById('p-val').innerText = "WAITING";
        }
    }
    renderTable();
</script>

</body>
</html>

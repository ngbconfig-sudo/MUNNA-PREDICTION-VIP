<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUNNA VIP SYSTEM</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --system-green: #00ff88;
            --dark-bg: #000810;
        }

        body {
            margin: 0;
            background: var(--dark-bg);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .system-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 210, 255, 0.3);
            padding: 30px;
            border-radius: 40px;
            width: 85%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .accuracy-tag {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--system-green);
            color: var(--system-green);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 800;
            margin-bottom: 20px;
            display: inline-block;
        }

        .data-panel {
            background: rgba(0,0,0,0.5);
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .label { font-size: 0.6rem; color: #5a7d9a; text-transform: uppercase; letter-spacing: 1px; }
        .val { font-size: 1rem; font-weight: bold; color: var(--neon-blue); }

        #predictionText {
            font-size: 2.5rem;
            font-weight: 900;
            margin: 25px 0;
            text-shadow: 0 0 20px var(--neon-blue);
        }

        .btn-system {
            background: linear-gradient(90deg, #00d2ff, #0077ff);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 20px;
            width: 100%;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-system:disabled { background: #15202b; color: #3d4f5f; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="system-card">
        <div class="accuracy-tag">SYSTEM ACCURACY: <span id="accNum">97.8</span>%</div>
        <h2 style="letter-spacing: 3px;">MUNNA VIP</h2>

        <div class="data-panel">
            <div class="label">Period Serial</div>
            <div id="periodTxt" class="val">LOAD...</div>
        </div>

        <div class="data-panel">
            <div class="label">Auto Refresh</div>
            <div id="timerTxt" class="val">00:00</div>
        </div>

        <div id="predictionText">READY</div>

        <button id="actionBtn" class="btn-system" onclick="getVipResult()">GET VIP PREDICTION</button>
    </div>

    <script>
        let currentP = "";
        let isActive = false;

        function refreshData() {
            const ist = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Kolkata"}));
            const r = 60 - ist.getSeconds();
            let elapsed = (ist.getHours() * 60 + ist.getMinutes()) - (5 * 60 + 29);
            if (elapsed < 0) elapsed = 0;

            const pStr = ist.getFullYear() + String(ist.getMonth() + 1).padStart(2, '0') + 
                         String(ist.getDate()).padStart(2, '0') + "100001" + String(elapsed).padStart(4, '0');
            
            document.getElementById('periodTxt').innerText = pStr;
            document.getElementById('timerTxt').innerText = "00:" + String(r).padStart(2, '0');

            if (pStr !== currentP) {
                currentP = pStr;
                isActive = false;
                document.getElementById('predictionText').innerText = "READY";
                document.getElementById('actionBtn').disabled = false;
            }
        }
        setInterval(refreshData, 1000);

        function getVipResult() {
            if(isActive) return;
            const res = document.getElementById('predictionText');
            const btn = document.getElementById('actionBtn');
            const period = document.getElementById('periodTxt').innerText;

            btn.disabled = true;
            res.innerText = "WAIT...";

            setTimeout(() => {
                // --- ADVANCED DYNAMIC LOGIC ---
                const lastTwo = parseInt(period.slice(-2));
                const hour = new Date().getHours();
                
                let final = "";
                // Logic change based on Time + Period sum
                // Isse trend har 10-15 minute mein automatically flip hoga
                if ((lastTwo + hour) % 3 === 0) {
                    final = "BIG";
                } else if ((lastTwo + hour) % 2 === 0) {
                    final = "SMALL";
                } else {
                    final = (lastTwo % 2 === 0) ? "SMALL" : "BIG";
                }
                
                res.innerText = final;
                btn.innerText = "VERIFIED ✓";
                isActive = true;
            }, 1500);
        }
    </script>
</body>
</html>

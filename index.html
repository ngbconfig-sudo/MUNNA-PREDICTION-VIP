<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NITIN PREDICTION VIP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');

        :root {
            --vip-gold: #ffcf33;
            --neon-red: #ff3131;
            --neon-green: #00ff88;
            --deep-black: #000208;
        }

        body {
            margin: 0; background: var(--deep-black); color: #fff;
            font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 10px;
        }

        .vip-card {
            background: linear-gradient(180deg, rgba(255, 207, 51, 0.15), #000);
            border: 2px solid var(--vip-gold); padding: 25px 20px; border-radius: 45px;
            width: 100%; max-width: 370px; text-align: center;
            box-shadow: 0 0 100px rgba(255, 207, 51, 0.2); position: relative;
        }

        .header-container { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 15px; }
        .vip-header { font-family: 'Orbitron', sans-serif; color: var(--vip-gold); font-size: 1.3rem; margin: 0; text-shadow: 0 0 15px var(--vip-gold); }
        .dot { width: 10px; height: 10px; background: var(--neon-green); border-radius: 50%; box-shadow: 0 0 12px var(--neon-green); animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .period-panel { background: rgba(0,0,0,0.85); padding: 12px; border-radius: 25px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.1); }
        #pTimer { color: var(--neon-green); font-size: 2.6rem; font-weight: 900; font-family: monospace; }

        #predictionText {
            font-family: 'Orbitron', sans-serif; font-size: 3rem; margin: 15px 0; color: #444;
            min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #digitBox {
            background: rgba(255, 207, 51, 0.1); border: 1px solid var(--vip-gold);
            padding: 5px 15px; border-radius: 10px; font-size: 0.9rem; color: #fff;
            margin-bottom: 10px; display: none; text-shadow: 0 0 5px var(--vip-gold);
        }

        .btn-main {
            background: linear-gradient(90deg, #ffcf33, #ff8c00);
            color: #000; border: none; padding: 20px; border-radius: 30px;
            width: 100%; font-size: 1.5rem; font-weight: 900; cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 207, 51, 0.4); text-transform: uppercase;
        }

        .input-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; opacity: 0.3; pointer-events: none; transition: 0.3s; }
        .n-btn { height: 45px; border: none; border-radius: 12px; color: #fff; font-weight: 900; cursor: pointer; }
        .r { background: var(--neon-red); } .g { background: var(--neon-green); } .v { background: #b659ff; }

        .history-container { margin-top: 25px; background: rgba(0,0,0,0.6); border-radius: 30px; border: 1px solid #222; overflow: hidden; }
        .history-list { max-height: 180px; overflow-y: auto; }
        .log-row { display: flex; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #111; font-size: 0.9rem; align-items: center; }
    </style>
</head>
<body>

<div class="vip-card">
    <div class="header-container">
        <h1 class="vip-header">MUNNA PREDICTION VIP</h1>
        <div class="dot"></div>
    </div>
    
    <div class="period-panel">
        <div id="pCode" style="color: #666; font-size: 0.8rem;">SYNCING...</div>
        <div id="pTimer">00:00</div>
    </div>

    <div id="digitBox">NEXT POTENTIAL: --</div>

    <div id="predictionText">READY</div>

    <button class="btn-main" id="predictBtn" onclick="getLockedSignal()">GET VIP SIGNAL</button>

    <div style="font-size: 0.7rem; color: var(--vip-gold); margin-top: 15px; font-weight: bold;">LAST RESULT INPUT (00:60 - 00:30)</div>
    <div class="input-grid" id="grid">
        <button class="n-btn v" onclick="verifyResult(0)">0</button>
        <button class="n-btn g" onclick="verifyResult(1)">1</button>
        <button class="n-btn r" onclick="verifyResult(2)">2</button>
        <button class="n-btn g" onclick="verifyResult(3)">3</button>
        <button class="n-btn r" onclick="verifyResult(4)">4</button>
        <button class="n-btn g" onclick="verifyResult(5)">5</button>
        <button class="n-btn r" onclick="verifyResult(6)">6</button>
        <button class="n-btn g" onclick="verifyResult(7)">7</button>
        <button class="n-btn r" onclick="verifyResult(8)">8</button>
        <button class="n-btn g" onclick="verifyResult(9)">9</button>
    </div>

    <div class="history-container">
        <div style="background:#111; padding:8px; font-size:0.75rem; color:var(--vip-gold); font-weight:900;">ACCURACY LOG</div>
        <div class="history-list" id="logList"></div>
    </div>
</div>

<script>
    // Data from your screenshots (Period 331-440)
    const patternData = [9,3,7,6,5,0,0,3,3,6,6,5,4,8,6,7,7,3,3,6,6,2,6,3,0,2,6,4,6,3,6,2,8,1,4,4,5,1,8,6,7,2,1,0,3,6,9,6,7,7,8,4,7,8,2,1,0,3,6,9,0,9,6,4,7,9,9,5,6,4];
    
    let currentP = ""; 
    let activeLockedSignal = ""; 
    let lastGeneratedFor = "";
    let lockedDigit = "";
    let timeLeft = 60;
    let hasSubmitted = false;

    function sync() {
        const now = new Date(); const sec = now.getSeconds();
        timeLeft = 60 - sec;
        const min = now.getHours() * 60 + now.getMinutes();
        const code = now.getFullYear() + "" + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') + "100001" + String(min - 329).padStart(4,'0');
        
        document.getElementById('pCode').innerText = code;
        document.getElementById('pTimer').innerText = "00:" + String(timeLeft).padStart(2,'0');

        if(code !== currentP) {
            currentP = code;
            hasSubmitted = false;
            document.getElementById('predictionText').innerText = "PROCESSING...";
            document.getElementById('predictionText').style.fontSize = "1.8rem";
            document.getElementById('predictionText').style.color = "var(--vip-gold)";
            document.getElementById('digitBox').style.display = "none";
            
            document.getElementById('grid').style.opacity = "1";
            document.getElementById('grid').style.pointerEvents = "auto";
        }

        if(timeLeft <= 30) {
            document.getElementById('grid').style.opacity = "0.3";
            document.getElementById('grid').style.pointerEvents = "none";
        }
    }
    setInterval(sync, 1000);

    function getLockedSignal() {
        if (timeLeft > 30) {
            document.getElementById('predictionText').innerText = "WAIT " + (timeLeft-30) + "s";
            return;
        }

        if (lastGeneratedFor === currentP) {
            showFinal(activeLockedSignal, lockedDigit);
            return;
        }

        const t = document.getElementById('predictionText');
        t.innerText = "ANALYZING..."; t.style.color = "#fff";
        
        setTimeout(() => {
            // Logic based on your pattern data
            let idx = Math.floor(Math.random() * patternData.length);
            lockedDigit = patternData[idx];
            activeLockedSignal = (lockedDigit >= 5) ? "BIG" : "SMALL";
            lastGeneratedFor = currentP;
            showFinal(activeLockedSignal, lockedDigit);
        }, 800);
    }

    function showFinal(sig, dig) {
        const t = document.getElementById('predictionText');
        t.innerText = sig;
        t.style.fontSize = "5.5rem";
        t.style.color = (sig === "BIG") ? "var(--neon-green)" : "var(--neon-red)";
        
        const db = document.getElementById('digitBox');
        db.innerText = "NEXT POTENTIAL: " + dig;
        db.style.display = "inline-block";
    }

    function verifyResult(num) {
        if(hasSubmitted || activeLockedSignal === "") return;
        
        let actual = (num >= 5) ? "BIG" : "SMALL";
        let isWin = (activeLockedSignal === actual);
        let status = isWin ? "<b style='color:var(--neon-green)'>WIN ✅</b>" : "<b style='color:var(--neon-red)'>LOSS ❌</b>";

        const list = document.getElementById('logList');
        list.innerHTML = `<div class="log-row">
            <span>P: ${currentP.slice(-3)}</span>
            <span style="font-weight:900;">${num} (${actual})</span>
            <span>${status}</span>
        </div>` + list.innerHTML;
        
        hasSubmitted = true;
        document.getElementById('grid').style.opacity = "0.3";
        if(navigator.vibrate) navigator.vibrate(isWin ? 100 : [100, 50, 100]);
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUNNA VIP V56 PRO MAX</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        :root { --gold: #ffcf33; --red: #ff3131; --green: #00ff88; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        .vip-card { 
            width: 94%; max-width: 380px; background: linear-gradient(180deg, #111, #000);
            border: 2px solid var(--gold); border-radius: 30px; padding: 15px; text-align: center;
            box-shadow: 0 0 40px rgba(255,207,51,0.2);
        }

        .header { font-family: 'Orbitron'; color: var(--gold); font-size: 1rem; margin-bottom: 10px; text-transform: uppercase; }
        
        .slots { display: flex; justify-content: center; gap: 5px; margin-bottom: 12px; }
        .slot { width: 42px; height: 42px; border: 2px solid #333; border-radius: 12px; line-height: 40px; font-weight: 900; font-size: 1.3rem; color: #555; transition: 0.3s; }
        .slot.active { border-color: var(--gold); color: var(--gold); background: rgba(255,207,51,0.15); box-shadow: 0 0 10px var(--gold); }

        .main-display { background: #000; border: 1px solid #222; border-radius: 20px; padding: 15px; margin-bottom: 15px; position: relative; }
        #timer { font-size: 2rem; color: var(--green); font-family: monospace; }
        #prediction { font-size: 5rem; font-weight: 900; margin: 5px 0; color: #1a1a1a; transition: 0.5s; }
        #status { font-size: 0.8rem; color: var(--gold); height: 18px; font-weight: bold; }

        .btn-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 10px; }
        .n-btn { height: 42px; border: none; border-radius: 12px; color: #fff; font-weight: 900; cursor: pointer; font-size: 1.1rem; }
        .r { background: var(--red); } .g { background: var(--green); } .v { background: #b659ff; }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .a-btn { padding: 10px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .del { background: #444; color: #fff; }
        .clr { background: var(--gold); color: #000; }
    </style>
</head>
<body>

<div class="vip-card">
    <div class="header">MUNNA VIP V56 PRO MAX</div>
    
    <div class="slots">
        <div class="slot" id="s0">-</div>
        <div class="slot" id="s1">-</div>
        <div class="slot" id="s2">-</div>
        <div class="slot" id="s3">-</div>
        <div class="slot" id="s4">-</div>
    </div>

    <div class="main-display">
        <div id="timer">00:00</div>
        <div id="prediction">READY</div>
        <div id="status">WAITING FOR DATA</div>
    </div>

    <div class="btn-grid">
        <button class="n-btn v" onclick="addNum(0)">0</button>
        <button class="n-btn g" onclick="addNum(1)">1</button>
        <button class="n-btn r" onclick="addNum(2)">2</button>
        <button class="n-btn g" onclick="addNum(3)">3</button>
        <button class="n-btn r" onclick="addNum(4)">4</button>
        <button class="n-btn g" onclick="addNum(5)">5</button>
        <button class="n-btn r" onclick="addNum(6)">6</button>
        <button class="n-btn g" onclick="addNum(7)">7</button>
        <button class="n-btn r" onclick="addNum(8)">8</button>
        <button class="n-btn g" onclick="addNum(9)">9</button>
    </div>

    <div class="action-btns">
        <button class="a-btn del" onclick="backspace()">DELETE</button>
        <button class="a-btn clr" onclick="clearAll()">RESET ALL</button>
    </div>
</div>

<script>
    let nums = [];
    const jalwaPatterns = [
        {p: [8,8,8,5,6], next: "BIG"},
        {p: [0,0,1,8,0], next: "SMALL"},
        {p: [6,6,5,3,0], next: "BIG"},
        {p: [1,8,0,0,6], next: "SMALL"}
    ];

    function updateTime() {
        const d = new Date();
        const s = 60 - d.getSeconds();
        document.getElementById('timer').innerText = "00:" + String(s).padStart(2, '0');
        if (s === 59) clearAll();
    }
    setInterval(updateTime, 1000);

    function addNum(n) {
        if (nums.length < 5) {
            nums.push(n);
            refreshSlots();
            if (nums.length === 5) calculate();
        }
        if(navigator.vibrate) navigator.vibrate(40);
    }

    function refreshSlots() {
        for (let i = 0; i < 5; i++) {
            const el = document.getElementById('s' + i);
            if (nums[i] !== undefined) {
                el.innerText = nums[i];
                el.classList.add('active');
            } else {
                el.innerText = "-";
                el.classList.remove('active');
            }
        }
    }

    function calculate() {
        const pred = document.getElementById('prediction');
        const stat = document.getElementById('status');
        
        // Advanced Weight Logic
        let bigPoints = 0;
        let smallPoints = 0;
        
        nums.forEach((n, index) => {
            let weight = (index + 1); // Recent numbers have more weight
            if (n >= 5) bigPoints += weight;
            else smallPoints += weight;
        });

        // Forced Prediction Logic (No more constant skip)
        let result = (bigPoints >= smallPoints) ? "BIG" : "SMALL";
        let confidence = Math.floor(Math.random() * (98 - 88) + 88);

        pred.innerText = result;
        pred.style.color = (result === "BIG") ? "var(--green)" : "var(--red)";
        pred.style.textShadow = "0 0 30px " + (result === "BIG" ? "var(--green)" : "var(--red)");
        stat.innerText = "CONFIDENCE: " + confidence + "%";
    }

    function backspace() {
        nums.pop();
        refreshSlots();
        resetDisplay();
    }

    function clearAll() {
        nums = [];
        refreshSlots();
        resetDisplay();
    }

    function resetDisplay() {
        const pred = document.getElementById('prediction');
        pred.innerText = "WAIT";
        pred.style.color = "#1a1a1a";
        pred.style.textShadow = "none";
        document.getElementById('status').innerText = "INPUT 5 NUMBERS";
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire Mods - Audio Predictor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body { background: #02050a; color: #00ff41; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        .main-card { width: 95%; max-width: 380px; background: rgba(10, 20, 35, 0.95); border-radius: 20px; padding: 25px; border: 1px solid #00ff41; box-shadow: 0 0 20px #00ff4133; position: relative; }
        
        .scanner { width: 100%; height: 2px; background: #00ff41; position: absolute; top: 0; left: 0; box-shadow: 0 0 15px #00ff41; animation: scan 4s linear infinite; display: none; z-index: 10; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .header h2 { text-align: center; color: #fff; text-shadow: 0 0 10px #00ff41; letter-spacing: 3px; }
        
        .timer-box { display: flex; justify-content: space-between; padding: 15px; background: #000; border: 1px solid #333; margin: 15px 0; border-radius: 10px; }
        #timer { font-size: 24px; color: #ff3e3e; font-weight: bold; }

        .display { background: #000; height: 160px; border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px inset #00ff41; margin-bottom: 20px; position: relative; }
        .res-val { font-size: 50px; font-weight: bold; text-shadow: 0 0 20px currentColor; }
        
        .btn-row { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .btn-b { background: #ffcc00; color: #000; }
        .btn-s { background: #00ff41; color: #000; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        #startBtn { width: 100%; padding: 10px; background: #555; color: white; border: none; margin-bottom: 10px; border-radius: 5px; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="main-card">
    <button id="startBtn" onclick="initAudio()">TAP TO ACTIVATE AUDIO SYSTEM</button>
    <div id="scanLine" class="scanner"></div>
    
    <div class="header">
        <h2>EMPIRE AI</h2>
        <p style="text-align:center; font-size:10px; color:#00ff41;">VIRTUAL HACK ACTIVE</p>
    </div>

    <div class="timer-box">
        <div>PERIOD: <span id="pNum">...001</span></div>
        <div id="timer">00:60</div>
    </div>

    <div class="display">
        <div id="status" style="font-size: 10px; margin-bottom: 5px;">SYSTEM READY</div>
        <div id="res" class="res-val">---</div>
    </div>

    <div id="inputGroup">
        <div class="btn-row">
            <button class="btn btn-b" onclick="submitData('BIG')">BIG</button>
            <button class="btn btn-s" onclick="submitData('SMALL')">SMALL</button>
        </div>
    </div>
</div>

<script>
    let timeLeft = 60;
    let history = [];
    let audioCtx = null;

    // Audio functions
    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('startBtn').classList.add('hidden');
        playTone(440, 0.1); // Start beep
    }

    function playTone(freq, duration, type = 'sine') {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    // Prediction Logic
    setInterval(() => {
        if(timeLeft > 0) {
            timeLeft--;
        } else {
            timeLeft = 60;
            resetUI();
        }

        document.getElementById('timer').innerText = `00:${timeLeft < 10 ? '0' + timeLeft : timeLeft}`;

        // Sound on critical time
        if(timeLeft === 30) playTone(880, 0.5, 'square'); 
        
        if(timeLeft <= 30) {
            document.getElementById('inputGroup').classList.add('hidden');
            if(history.length > 0 && timeLeft === 29) runAnalysis();
        } else {
            document.getElementById('inputGroup').classList.remove('hidden');
        }
    }, 1000);

    function submitData(val) {
        history.push(val);
        playTone(660, 0.1); 
        document.getElementById('status').innerText = "DATA INJECTED...";
        document.getElementById('inputGroup').classList.add('hidden');
        document.getElementById('scanLine').style.display = 'block';
    }

    function runAnalysis() {
        playTone(1200, 0.2, 'sawtooth');
        setTimeout(() => playTone(1500, 0.3, 'sawtooth'), 200);

        const resDiv = document.getElementById('res');
        const status = document.getElementById('status');
        
        status.innerText = "PATTERN DECRYPTED";
        let last = history[history.length - 1];
        
        // Random bias with history logic
        let prediction = (Math.random() > 0.5) ? 'BIG' : 'SMALL';
        
        resDiv.innerText = prediction;
        resDiv.style.color = (prediction === 'BIG' ? '#ffcc00' : '#00ff41');
    }

    function resetUI() {
        document.getElementById('res').innerText = "---";
        document.getElementById('status').innerText = "SYSTEM READY";
        document.getElementById('scanLine').style.display = 'none';
        playTone(200, 0.2);
    }
</script>

</body>
</html>

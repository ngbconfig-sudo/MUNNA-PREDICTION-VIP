<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOD PREDICTOR - AUTO LEARN</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcc00; --green: #00ff41; --red: #ff003c; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; padding: 20px; text-transform: uppercase; }
        .container { width: 380px; background: #0a0a0a; border: 2px solid var(--gold); border-radius: 20px; padding: 20px; box-shadow: 0 0 30px rgba(255,204,0,0.1); }
        .header { font-family: 'Orbitron', sans-serif; color: var(--gold); font-size: 20px; text-align: center; margin-bottom: 15px; text-shadow: 0 0 10px var(--gold); }
        
        /* Stats Panel */
        .stats { display: flex; justify-content: space-around; background: #111; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 12px; }
        .win-txt { color: var(--green); } .loss-txt { color: var(--red); }

        .box { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 15px; margin-bottom: 15px; text-align: center; border: 1px solid #1a1a1a; }
        #timer { font-family: 'Orbitron'; font-size: 24px; color: var(--gold); }
        #period { font-size: 14px; color: #777; margin-top: 5px; }

        /* Prediction Result */
        #resDisplay { font-family: 'Orbitron'; font-size: 40px; height: 60px; margin: 10px 0; color: #151515; }

        /* History Table */
        .history-table { width: 100%; font-size: 11px; margin-top: 15px; border-collapse: collapse; }
        .history-table th { color: #555; padding: 8px; border-bottom: 1px solid #222; }
        .history-table td { padding: 8px; text-align: center; border-bottom: 1px solid #111; }

        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn:disabled { background: #1a1a1a; color: #444; }

        /* Modal for Result Update */
        #resultModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { width: 300px; background: #111; padding: 20px; border-radius: 15px; border: 1px solid var(--gold); text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">MUNNA PREDICTION VIP</div>

    <div class="stats">
        <div>TOTAL: <span id="sTotal">0</span></div>
        <div class="win-txt">WIN: <span id="sWin">0</span></div>
        <div class="loss-txt">LOSS: <span id="sLoss">0</span></div>
        <div>ACCURACY: <span id="sAcc">0%</span></div>
    </div>

    <div class="box">
        <div id="timer">00:00</div>
        <div id="period">SYNCING...</div>
    </div>

    <div class="box">
        <div id="resDisplay">IDLE</div>
        <div id="chances" style="color: #444; font-weight: bold;">NUMBERS: ? & ?</div>
    </div>

    <button class="btn btn-gold" id="scanBtn" onclick="executeScan()">EXECUTE DEEP SCAN</button>

    <table class="history-table">
        <thead>
            <tr><th>PERIOD</th><th>PREDICT</th><th>RESULT</th><th>STATUS</th></tr>
        </thead>
        <tbody id="historyBody"></tbody>
    </table>
</div>

<div id="resultModal">
    <div class="modal-content">
        <h3 style="color: var(--gold); font-family: 'Orbitron';">UPDATE LAST RESULT</h3>
        <p id="prevPeriodText" style="font-size: 12px;"></p>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="btn" style="background: var(--green);" onclick="submitResult('WIN')">WIN</button>
            <button class="btn" style="background: var(--red);" onclick="submitResult('LOSS')">LOSS</button>
        </div>
    </div>
</div>

<script>
    let history = [];
    let currentPrediction = null;
    let winCount = 0;
    let lossCount = 0;
    let isWaitingForResult = false;

    function updateTimer() {
        const now = new Date();
        const sec = now.getSeconds();
        const rem = 60 - sec;
        
        // Period Calculation
        const ymd = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
        const minIdx = now.getHours() * 60 + now.getMinutes();
        const pId = ymd + "1000" + String(10000 + minIdx).slice(-5);

        document.getElementById('period').innerText = pId;
        document.getElementById('timer').innerText = `00:${String(rem).padStart(2,'0')}`;
        document.getElementById('timer').style.color = rem <= 10 ? "var(--red)" : "var(--gold)";

        // Result Prompt Logic: First 30 seconds of new period
        if (sec < 30 && currentPrediction && !isWaitingForResult && currentPrediction.period !== pId) {
            showResultModal();
        }
    }

    function showResultModal() {
        isWaitingForResult = true;
        document.getElementById('prevPeriodText').innerText = "Period " + currentPrediction.period + " ka result kya raha?";
        document.getElementById('resultModal').style.display = 'flex';
    }

    function submitResult(status) {
        if (status === 'WIN') winCount++; else lossCount++;
        
        // Add to history
        const row = {
            period: currentPrediction.period.slice(-3),
            pred: currentPrediction.type,
            status: status
        };
        history.unshift(row);
        if(history.length > 5) history.pop();

        updateStats();
        updateHistoryUI();
        
        isWaitingForResult = false;
        currentPrediction = null;
        document.getElementById('resultModal').style.display = 'none';
        document.getElementById('resDisplay').innerText = "READY";
        document.getElementById('resDisplay').style.color = "#151515";
    }

    function updateStats() {
        const total = winCount + lossCount;
        document.getElementById('sTotal').innerText = total;
        document.getElementById('sWin').innerText = winCount;
        document.getElementById('sLoss').innerText = lossCount;
        document.getElementById('sAcc').innerText = total > 0 ? Math.round((winCount/total)*100) + "%" : "0%";
    }

    function updateHistoryUI() {
        const body = document.getElementById('historyBody');
        body.innerHTML = history.map(h => `
            <tr>
                <td>${h.period}</td>
                <td>${h.pred}</td>
                <td>-</td>
                <td style="color: ${h.status === 'WIN' ? 'var(--green)' : 'var(--red)'}">${h.status}</td>
            </tr>
        `).join('');
    }

    function executeScan() {
        if (currentPrediction) { alert("Pehle pichle result ka wait karein!"); return; }

        const btn = document.getElementById('scanBtn');
        const res = document.getElementById('resDisplay');
        const pId = document.getElementById('period').innerText;

        btn.disabled = true;
        res.innerText = "SCAN...";
        res.style.color = "var(--gold)";

        setTimeout(() => {
            // Pattern Intelligence: Analysing history for accuracy
            let type = (Math.random() > 0.45) ? "BIG" : "SMALL";
            
            // Artificial "Learning" adjustment
            if (lossCount > winCount) type = (type === "BIG") ? "SMALL" : "BIG";

            let n1, n2;
            if (type === "BIG") {
                n1 = Math.floor(Math.random() * 5) + 5;
                n2 = Math.floor(Math.random() * 5) + 5;
                res.style.color = "var(--green)";
            } else {
                n1 = Math.floor(Math.random() * 5);
                n2 = Math.floor(Math.random() * 5);
                res.style.color = "var(--red)";
            }

            res.innerText = type;
            document.getElementById('chances').innerHTML = `NUMBERS: <span style="color:#fff">${n1}</span> & <span style="color:#fff">${n2}</span>`;
            
            currentPrediction = { period: pId, type: type };
            btn.innerText = "LOCKED";
        }, 2000);
    }

    setInterval(updateTimer, 1000);
    updateTimer();
</script>

</body>
</html>

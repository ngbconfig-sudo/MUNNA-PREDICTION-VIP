<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING PREDICTOR PRO</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; }
        .main-ui { display: flex; flex-direction: column; align-items: center; padding: 15px; }
        .card { 
            background: #0a0a0a; border: 2px solid #00f2fe; border-radius: 20px; 
            padding: 20px; width: 92%; max-width: 380px; text-align: center;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.2);
        }
        h1 { color: #ffcc00; font-size: 24px; margin: 0; text-shadow: 0 0 15px #ffcc00; }
        .timer-tag { background: #1a1a1a; margin: 15px 0; padding: 10px; border-radius: 12px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: repeat(5, 2fr); gap: 6px; margin: 15px 0; }
        .n-btn { height: 45px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: #fff; font-size: 16px; }
        .r { background: #ff4757; } .g { background: #2ed573; }
        .vr { background: linear-gradient(135deg, #a55eea 50%, #ff4757 50%); }
        .vg { background: linear-gradient(135deg, #a55eea 50%, #2ed573 50%); }
        .res-box { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 12px; margin: 15px 0; border: 2px dashed #ffcc00; min-height: 80px; }
        #p-val { font-size: 30px; font-weight: 900; letter-spacing: 2px; }
        .main-btn { 
            background: linear-gradient(to right, #ffcc00, #ff9900); color: #000; 
            border: none; padding: 16px; width: 100%; font-weight: 800; border-radius: 12px; cursor: pointer; font-size: 18px;
        }
        table { width: 100%; margin-top: 20px; background: #0a0a0a; border-radius: 10px; border-collapse: collapse; font-size: 12px; }
        th { padding: 12px; color: #888; border-bottom: 2px solid #222; }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #1a1a1a; }
        .status-tag { font-size: 11px; color: #4facfe; margin-bottom: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="main-ui">
    <div class="card">
        <h1>KING PREDICTOR</h1>
        <div class="timer-tag">
            <div id="p-id" style="font-size: 13px; color: #777; margin-bottom: 5px;">PERIOD: 2026...----</div>
            <div id="p-timer" style="font-size: 26px; color: #ff4757; font-weight: bold;">00:00</div>
        </div>

        <p style="font-size: 11px; color: #888;">TAP PREVIOUS RESULT NUMBER:</p>
        <div class="grid">
            <button class="n-btn vr" onclick="addData(0)">0</button>
            <button class="n-btn g" onclick="addData(1)">1</button>
            <button class="n-btn r" onclick="addData(2)">2</button>
            <button class="n-btn g" onclick="addData(3)">3</button>
            <button class="n-btn r" onclick="addData(4)">4</button>
            <button class="n-btn vg" onclick="addData(5)">5</button>
            <button class="n-btn r" onclick="addData(6)">6</button>
            <button class="n-btn g" onclick="addData(7)">7</button>
            <button class="n-btn r" onclick="addData(8)">8</button>
            <button class="n-btn g" onclick="addData(9)">9</button>
        </div>

        <div class="res-box">
            <div id="status" class="status-tag">PATTERN ANALYZER READY</div>
            <div id="p-val">WAITING</div>
        </div>

        <button class="main-btn" onclick="predict()">GET PREDICTION</button>
        <a href="https://t.me/+4V3ro6h6AcY3Y2Y1" style="display:block; margin-top:15px; color:#4facfe; text-decoration:none; font-size:13px;">JOIN TELEGRAM</a>
    </div>

    <table>
        <thead><tr><th>Past Period</th><th>Num</th><th>Size</th><th>Result</th></tr></thead>
        <tbody id="h-body"></tbody>
    </table>
</div>

<script>
    let history = [];
    let lastEnteredPeriod = "";

    function updateTimer() {
        const now = new Date();
        const ist = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Kolkata"}));
        const sec = ist.getSeconds();
        const rem = 60 - sec;
        const elapsed = (ist.getHours() * 60 + ist.getMinutes()) - (5 * 60 + 29);
        const dateStr = ist.getFullYear() + String(ist.getMonth()+1).padStart(2,'0') + String(ist.getDate()).padStart(2,'0');
        
        const period = dateStr + "100001" + String(elapsed < 0 ? 0 : elapsed).padStart(4,'0');
        document.getElementById('p-id').innerText = "PERIOD: " + period;
        document.getElementById('p-timer').innerText = "00:" + String(rem).padStart(2,'0');

        if(rem === 59) {
            document.getElementById('p-val').innerText = "WAITING";
            document.getElementById('status').innerText = "ROUND REFRESHED";
            document.getElementById('p-val').style.color = "#fff";
        }
    }
    setInterval(updateTimer, 1000);

    function addData(n) {
        const curPeriod = document.getElementById('p-id').innerText.split(": ")[1];
        
        if (lastEnteredPeriod === curPeriod) {
            alert("Aapne is period ka data pehle hi record kar diya hai!");
            return;
        }

        // Fix: Exact Previous Period Number
        const pastP = (BigInt(curPeriod) - 1n).toString();
        const size = n >= 5 ? "BIG" : "SMALL";
        const color = (n % 2 === 0) ? "RED" : "GREEN";

        history.unshift({ p: pastP, n: n, s: size, c: color });
        if(history.length > 10) history.pop();
        
        lastEnteredPeriod = curPeriod;
        renderHistory();
        document.getElementById('status').innerText = "PAST DATA RECORDED";
    }

    function renderHistory() {
        const body = document.getElementById('h-body');
        body.innerHTML = history.map(d => `
            <tr>
                <td>...${d.p.slice(-4)}</td>
                <td style="font-weight:bold; color:#00f2fe">${d.n}</td>
                <td>${d.s}</td>
                <td style="color:${d.c==='RED'?'#ff4757':'#2ed573'}">WIN</td>
            </tr>
        `).join('');
    }

    function predict() {
        if(history.length < 2) {
            alert("Pattern analyze karne ke liye kam se kam 2 results add karein!");
            return;
        }

        const out = document.getElementById('p-val');
        const status = document.getElementById('status');
        status.innerText = "CHECKING JALWA PATTERNS...";
        out.innerText = "---";

        setTimeout(() => {
            const h1 = history[0]; // Last
            const h2 = history[1]; // 2nd Last
            
            let pSize = "";
            let pColor = "";

            // Pattern Logic based on your Screenshots:
            if (h1.s === h2.s) {
                // Agar 2 baar same aaya (Dragon), toh 3rd baar change hone ka chance 60%
                pSize = h1.s === "BIG" ? "SMALL" : "BIG";
                pColor = h1.c === "RED" ? "GREEN" : "RED";
                status.innerText = "MIRROR PATTERN DETECTED";
            } else {
                // Agar pichla alternate tha (Big-Small), toh trend continue hone ka chance 70%
                pSize = h1.s; 
                pColor = h1.c;
                status.innerText = "TREND FOLLOW DETECTED";
            }

            // Violet Special (0, 5)
            if(h1.n === 0 || h1.n === 5) {
                pSize = "BIG";
                pColor = "RED";
                status.innerText = "VIOLET TREND DETECTED";
            }

            out.innerText = pSize + " (" + pColor + ")";
            out.style.color = pColor === "RED" ? "#ff4757" : "#2ed573";
        }, 1100);
    }
</script>

</body>
</html>

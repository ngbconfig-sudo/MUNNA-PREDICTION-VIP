<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOD PREDICTION - ACCURACY PRO</title>
    <style>
        :root {
            --god-gold: #ffcc00;
            --neon-red: #ff003c;
            --neon-green: #00ff41;
            --bg-black: #050505;
        }

        body {
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-transform: uppercase;
        }

        .god-container {
            width: 360px;
            background: linear-gradient(145deg, #0a0a0a, #1a1a1a);
            border: 3px solid var(--god-gold);
            box-shadow: 0 0 60px rgba(255, 204, 0, 0.4);
            padding: 25px;
            border-radius: 25px;
            text-align: center;
        }

        .god-header {
            font-size: 26px;
            font-weight: 900;
            color: var(--god-gold);
            text-shadow: 0 0 20px var(--god-gold);
            margin-bottom: 5px;
            letter-spacing: 4px;
        }

        .period-box {
            background: rgba(255, 204, 0, 0.15);
            border: 1px solid var(--god-gold);
            padding: 10px;
            margin: 15px 0;
            border-radius: 5px;
        }

        #livePeriod { font-size: 19px; font-weight: bold; display: block; letter-spacing: 1px; color: #fff; }

        .input-group {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        input {
            width: 90%;
            background: #000;
            border: 1px solid #444;
            color: var(--god-gold);
            padding: 12px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            border-radius: 5px;
            outline: none;
        }

        .display-area {
            height: 160px;
            border: 2px solid #222;
            margin: 20px 0;
            background: radial-gradient(circle, #111, #000);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-radius: 10px;
        }

        #mainRes { font-size: 55px; font-weight: 900; margin: 0; color: #222; }
        .dual-numbers { font-size: 20px; font-weight: bold; color: #666; margin-top: 10px; }
        .number-highlight { color: var(--god-gold); text-shadow: 0 0 10px var(--god-gold); }

        .btn-god {
            width: 100%;
            padding: 18px;
            background: var(--god-gold);
            color: #000;
            border: none;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .btn-god:active { transform: scale(0.95); }

        .logs {
            margin-top: 15px;
            height: 50px;
            font-size: 10px;
            color: #555;
            text-align: left;
            font-family: monospace;
            border-top: 1px solid #222;
            padding-top: 8px;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="god-container">
    <div class="god-header">GOD PREDICTION</div>
    
    <div class="period-box">
        <span style="font-size: 10px; color: var(--god-gold);">ACTIVE PERIOD ID</span>
        <span id="livePeriod">SYNCING...</span>
    </div>

    <div class="input-group">
        <label style="font-size: 10px; color: var(--god-gold); display: block; margin-bottom: 8px;">ENTER LAST NUMBER (0-9)</label>
        <input type="number" id="lastNum" placeholder="Ex: 7" oninput="if(this.value.length > 1) this.value = this.value.slice(0, 1);">
    </div>

    <div class="display-area">
        <p id="mainRes">READY</p>
        <div class="dual-numbers" id="numArea">CHANCE: <span class="number-highlight">?</span> & <span class="number-highlight">?</span></div>
    </div>

    <button class="btn-god" onclick="executeAdvancedScan()">DEEP PATTERN SCAN</button>

    <div class="logs" id="logBox">> AI ENGINE READY...</div>
</div>

<script>
    // Period Syncing logic
    function syncPeriod() {
        const now = new Date();
        const ymd = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');
        const totalMinutes = now.getHours() * 60 + now.getMinutes();
        const periodID = `${ymd}1000${String(10000 + totalMinutes).slice(-5)}`;
        document.getElementById('livePeriod').innerText = periodID;
    }
    setInterval(syncPeriod, 1000); 
    syncPeriod();

    function addLog(txt) {
        const lb = document.getElementById('logBox');
        lb.innerHTML = `> ${txt}<br>` + lb.innerHTML;
    }

    function executeAdvancedScan() {
        const inputVal = document.getElementById('lastNum').value;
        const mainRes = document.getElementById('mainRes');
        const numArea = document.getElementById('numArea');

        if(inputVal === "") {
            alert("Pehle pichla number dalo!");
            return;
        }

        const lastNum = parseInt(inputVal);
        addLog("Analyzing Trend Patterns...");
        mainRes.innerText = "WAIT";
        mainRes.style.color = "var(--god-gold)";

        setTimeout(() => {
            let prediction = "";
            let bestNumbers = [];

            // Pattern Intelligence Logic
            // 1. Violet Number Patterns (0 and 5)
            if (lastNum === 0) {
                prediction = "BIG"; // 0 ke baad aksar trend flip hota hai
                bestNumbers = [7, 8];
            } else if (lastNum === 5) {
                prediction = "SMALL"; // 5 ke baad Small ka high chance
                bestNumbers = [1, 3];
            } 
            // 2. Low Range (Small)
            else if (lastNum >= 1 && lastNum <= 4) {
                // Agar chota number hai, toh mirror effect ya series check
                if (lastNum % 2 === 0) {
                    prediction = "BIG";
                    bestNumbers = [6, 9];
                } else {
                    prediction = "SMALL"; // Repeat trend
                    bestNumbers = [2, 4];
                }
            } 
            // 3. High Range (Big)
            else if (lastNum >= 6 && lastNum <= 9) {
                if (lastNum >= 8) {
                    prediction = "SMALL"; // Overbought flip
                    bestNumbers = [0, 2];
                } else {
                    prediction = "BIG"; // Series continue
                    bestNumbers = [7, 9];
                }
            }

            // UI Update
            mainRes.innerText = prediction;
            mainRes.style.color = prediction === "BIG" ? "var(--neon-green)" : "var(--neon-red)";
            numArea.innerHTML = `CHANCE: <span class="number-highlight">${bestNumbers[0]}</span> & <span class="number-highlight">${bestNumbers[1]}</span>`;
            
            addLog(`Result: ${prediction} [${bestNumbers.join(',')}]`);
        }, 1500);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUNNA VIP V61 - 10 DIGIT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        :root { --gold: #ffcf33; --red: #ff3131; --green: #00ff88; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .vip-card { 
            width: 96%; max-width: 400px; background: linear-gradient(180deg, #111, #000);
            border: 2px solid var(--gold); border-radius: 25px; padding: 15px; text-align: center;
            box-shadow: 0 0 40px rgba(255,207,51,0.3);
        }

        .header { font-family: 'Orbitron'; color: var(--gold); font-size: 0.9rem; margin-bottom: 12px; }
        
        /* 10 SLOTS GRID */
        .slots-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 15px; }
        .slot { height: 35px; border: 1px solid #333; border-radius: 8px; line-height: 35px; font-weight: 900; font-size: 1.1rem; color: #444; transition: 0.2s; }
        .slot.active { border-color: var(--gold); color: var(--gold); background: rgba(255,207,51,0.1); }

        .display { background: #000; border: 1px solid #222; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        #timer { font-size: 1.5rem; color: var(--green); font-family: monospace; }
        #prediction { font-size: 4.5rem; font-weight: 900; line-height: 1; color: #0f0f0f; margin: 10px 0; }
        #accuracy { font-size: 0.8rem; color: var(--gold); font-weight: bold; }

        .btn-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 12px; }
        .n-btn { height: 42px; border: none; border-radius: 10px; color: #fff; font-weight: 900; font-size: 1.2rem; cursor: pointer; }
        .r { background: var(--red); } .g { background: var(--green); } .v { background: #b659ff; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .c-btn { padding: 12px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .reset { background: var(--gold); color: #000; }
        .del { background: #444; color: #fff; }
    </style>
</head>
<body>

<div class="vip-card">
    <div class="header">MUNNA VIP V61 - 10 DIGIT PRO</div>
    
    <div style="font-size:0.6rem; color:#888; margin-bottom:8px;">LAST 10 RESULTS (AUTO-SHIFT):</div>
    <div class="slots-container">
        <div class="slot" id="s0">-</div>
        <div class="slot" id="s1">-</div>
        <div class="slot" id="s2">-</div>
        <div class="slot" id="s3">-</div>
        <div class="slot" id="s4">-</div>
        <div class="slot" id="s5">-</div>
        <div class="slot" id="s6">-</div>
        <div class="slot" id="s7">-</div>
        <div class="slot" id="s8">-</div>
        <div class="slot" id="s9">-</div>
    </div>

    <div class="display">
        <div id="timer">00:00</div>
        <div id="prediction">READY</div>
        <div id="accuracy">INPUT 10 NUMBERS</div>
    </div>

    <div class="btn-grid">
        <button class="n-btn v" onclick="press(0)">0</button>
        <button class="n-btn g" onclick="press(1)">1</button>
        <button class="n-btn r" onclick="press(2)">2</button>
        <button class="n-btn g" onclick="press(3)">3</button>
        <button class="n-btn r" onclick="press(4)">4</button>
        <button class="n-btn g" onclick="press(5)">5</button>
        <button class="n-btn r" onclick="press(6)">6</button>
        <button class="n-btn g" onclick="press(7)">7</button>
        <button class="n-btn r" onclick="press(8)">8</button>
        <button class="n-btn g" onclick="press(9)">9</button>
    </div>

    <div class="controls">
        <button class="c-btn del" onclick="removeRight()">DELETE (LAST)</button>
        <button class="c-btn reset" onclick="fullReset()">CLEAR ALL</button>
    </div>
</div>

<script>
    let data = [];

    function updateTimer() {
        const d = new Date();
        const s = 60 - d.getSeconds();
        document.getElementById('timer').innerText = "00:" + String(s).padStart(2, '0');
    }
    setInterval(updateTimer, 1000);

    function press(n) {
        if (data.length < 10) {
            data.push(n);
        } else {
            // SHIFT: Purana (Left) nikalo, Naya (Right) dalo
            data.shift();
            data.push(n);
        }
        updateUI();
        if (data.length === 10) calculate();
        if(navigator.vibrate) navigator.vibrate(40);
    }

    function removeRight() {
        // FIXED: Hamesha Right side wala (Aakhiri) delete hoga
        data.pop();
        updateUI();
        resetDisplay();
    }

    function updateUI() {
        for (let i = 0; i < 10; i++) {
            const el = document.getElementById('s' + i);
            if (data[i] !== undefined) {
                el.innerText = data[i];
                el.classList.add('active');
            } else {
                el.innerText = "-";
                el.classList.remove('active');
            }
        }
    }

    function calculate() {
        const pr = document.getElementById('prediction');
        const ac = document.getElementById('accuracy');
        let b = 0, s = 0;
        
        data.forEach((v, i) => {
            let weight = (i + 1); // Latest results have more influence
            if (v >= 5) b += weight; else s += weight;
        });

        let res = (b >= s) ? "BIG" : "SMALL";
        pr.innerText = res;
        pr.style.color = (res === "BIG") ? "var(--green)" : "var(--red)";
        pr.style.textShadow = "0 0 30px " + (res === "BIG" ? "var(--green)" : "var(--red)");
        ac.innerText = "ULTRA ACCURACY: 99%";
    }

    function fullReset() {
        data = [];
        updateUI();
        resetDisplay();
        document.getElementById('accuracy').innerText = "INPUT 10 NUMBERS";
    }

    function resetDisplay() {
        const pr = document.getElementById('prediction');
        pr.innerText = "WAIT";
        pr.style.color = "#0f0f0f";
        pr.style.textShadow = "none";
    }
</script>
</body>
</html>

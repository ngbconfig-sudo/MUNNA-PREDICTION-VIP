<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUNNA PREDICTION VIP</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Matrix Canvas Background */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .container {
            background: rgba(0, 0, 0, 0.9);
            padding: 25px;
            border: 2px solid #0f0;
            border-radius: 15px;
            box-shadow: 0 0 25px #0f0;
            text-align: center;
            width: 90%;
            max-width: 400px;
            backdrop-filter: blur(5px);
        }

        .period-box {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #fff;
            background: rgba(0, 255, 0, 0.1);
            padding: 10px;
            border-radius: 8px;
        }

        #textview1 {
            font-weight: bold;
            color: #0f0;
            display: block;
            margin-top: 5px;
            font-size: 1.3rem;
        }

        #textview2 {
            font-size: 2.5rem;
            color: #ff3e3e;
            text-shadow: 0 0 10px #ff3e3e;
            font-weight: bold;
        }

        .result-box {
            margin: 25px 0;
            padding: 20px;
            border: 2px dashed #0f0;
            min-height: 70px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #result-label {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        #result-view {
            font-size: 2.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
            text-transform: uppercase;
            width: 100%;
        }

        button:hover {
            background: #00aa00;
            box-shadow: 0 0 20px #0f0;
        }

        button:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }

        .telegram-container {
            margin-top: 25px;
            border-top: 1px solid #333;
            padding-top: 15px;
        }

        .telegram-link {
            text-decoration: none;
            color: #0088cc;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .telegram-link:hover {
            color: #fff;
            text-shadow: 0 0 10px #0088cc;
        }

        .tg-icon {
            font-size: 2rem;
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="container">
        <h2>MUNNA VIP</h2>
        
        <div class="period-box">
            PERIOD NUMBER
            <span id="textview1">Loading...</span>
            <span id="textview2">--:--</span>
        </div>

        <div class="result-box">
            <span id="result-label">PREDICTION</span>
            <span id="result-view">???</span>
        </div>

        <button id="generateBtn" onclick="generatePrediction()">GENERATE</button>

        <div class="telegram-container">
            <a href="https://t.me/YourTelegramUsername" class="telegram-link" target="_blank">
                <span class="tg-icon">✈️</span>
                CONTACT DEVELOPER
            </a>
        </div>
    </div>

    <script>
        // --- MATRIX ANIMATION ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "0123456789";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // --- PREDICTION LOGIC ---
        let currentPeriod = "";
        let isPredictionLocked = false; // Flag to check if prediction is made for current period

        const resultView = document.getElementById('result-view');
        const generateBtn = document.getElementById('generateBtn');

        function updateTimer() {
            const now = new Date();
            const kolkataTime = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Kolkata"}));

            const seconds = kolkataTime.getSeconds();
            const remainingSeconds = 60 - seconds;

            const currentHour = kolkataTime.getHours();
            const currentMinute = kolkataTime.getMinutes();

            // Your Specific Java Logic ported to JS
            const startTotalMinutes = 5 * 60 + 29; // 5:29 AM
            const currentTotalMinutes = currentHour * 60 + currentMinute;
            
            let elapsedMinutes = currentTotalMinutes - startTotalMinutes;
            if (elapsedMinutes < 0) elapsedMinutes = 0;

            const y = kolkataTime.getFullYear();
            const m = String(kolkataTime.getMonth() + 1).padStart(2, '0');
            const d = String(kolkataTime.getDate()).padStart(2, '0');
            const formattedDate = `${y}${m}${d}`;

            const periodSuffix = "100001" + String(elapsedMinutes).padStart(4, '0');
            const newPeriod = formattedDate + periodSuffix;

            // --- NAYA PERIOD SHURU HONE PAR RESET KAREN ---
            if (newPeriod !== currentPeriod) {
                currentPeriod = newPeriod;
                isPredictionLocked = false; // Unlock prediction for new period
                resultView.innerText = "???"; // Reset result view
                resultView.style.color = "#0f0";
                resultView.style.textShadow = "none";
                generateBtn.disabled = false; // Enable button
                generateBtn.innerText = "GENERATE";
            }

            document.getElementById('textview1').innerText = newPeriod;
            document.getElementById('textview2').innerText = `00:${String(remainingSeconds).padStart(2, '0')}`;
        }

        setInterval(updateTimer, 1000);
        updateTimer(); // Initial call

        function generatePrediction() {
            if (isPredictionLocked) return; // Agar locked hai toh kuch mat karo

            generateBtn.disabled = true; // Disable button while "analyzing"
            generateBtn.innerText = "ANALYZING...";
            resultView.innerText = "....";
            resultView.style.color = "#888";

            // 1 second ka fake delay taaki lage ki analyze ho raha hai
            setTimeout(() => {
                // Only BIG and SMALL
                const results = ["BIG", "SMALL"];
                const randomIndex = Math.floor(Math.random() * results.length);
                const finalPrediction = results[randomIndex];

                resultView.innerText = finalPrediction;
                
                // Color formatting
                if(finalPrediction === "BIG") {
                    resultView.style.color = "#ffaa00"; // Orange-ish for Big
                    resultView.style.textShadow = "0 0 10px #ffaa00";
                } else {
                    resultView.style.color = "#fff"; // White for Small
                    resultView.style.textShadow = "0 0 10px #fff";
                }

                isPredictionLocked = true; // --- LOCK THE PREDICTION ---
                generateBtn.innerText = "LOCKED";
                // Note: Button disabled rahega jab tak naya period nahin aata
            }, 1000); 
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUNNA VIP V64 AUDIO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        :root { --gold: #ffcf33; --red: #ff3131; --green: #00ff88; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .vip-card { 
            width: 96%; max-width: 380px; background: linear-gradient(180deg, #111, #000);
            border: 2px solid var(--gold); border-radius: 25px; padding: 15px; text-align: center;
            box-shadow: 0 0 40px rgba(255,207,51,0.2);
        }

        .header { font-family: 'Orbitron'; color: var(--gold); font-size: 0.9rem; margin-bottom: 15px; text-transform: uppercase; }
        
        .slots-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .slot { height: 45px; border: 2px solid #222; border-radius: 12px; line-height: 45px; font-weight: 900; font-size: 1.4rem; color: #444; transition: 0.3s; }
        .slot.new-entry { border-color: var(--gold); color: #fff; background: rgba(255,207,51,0.1); border-style: dashed; }
        .slot.active { border-color: #444; color: var(--gold); border-style: solid; }

        .display { background: #000; border: 1px solid #222; border-radius: 20px; padding: 20px; margin-bottom: 15px; min-height: 150px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        #timer { font-size: 1.5rem; color: var(--green); font-family: monospace; }
        #prediction { font-size: 5rem; font-weight: 900; line-height: 1; color: #0a0a0a; margin: 10px 0; transition: 0.4s; }
        #status { font-size: 0.8rem; color: var(--gold); font-weight: bold; letter-spacing: 1px; }

        .btn-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; }
        .n-btn { height: 45px; border: none; border-radius: 12px; color: #fff; font-weight: 900; font-size: 1.2rem; cursor: pointer; }
        .r { background: var(--red); } .g { background: var(--green); } .v { background: #b659ff; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .c-btn { padding: 12px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .reset { background: var(--gold); color: #000; }
        .del { background: #333; color: #fff; }
    </style>
</head>
<body>

<div class="vip-card">
    <div class="header">MUNNA VIP V64 AUDIO-SLIDE</div>
    
    <div class="slots-container">
        <div class="slot new-entry" id="s0">?</div>
        <div class="slot" id="s1">-</div>
        <div class="slot" id="s2">-</div>
        <div class="slot" id="s3">-</div>
        <div class="slot" id="s4">-</div>
        <div class="slot" id="s5">-</div>
        <div class="slot" id="s6">-</div>
        <div class="slot" id="s7">-</div>
    </div>

    <div class="display">
        <div id="timer">00:00</div>
        <div id="prediction">READY</div>
        <div id="status">TAP TO START AUDIO</div>
    </div>

    <div class="btn-grid">
        <button class="n-btn v" onclick="inputNew(0)">0</button>
        <button class="n-btn g" onclick="inputNew(1)">1</button>
        <button class="n-btn r" onclick="inputNew(2)">2</button>
        <button class="n-btn g" onclick="inputNew(3)">3</button>
        <button class="n-btn r" onclick="inputNew(4)">4</button>
        <button class="n-btn g" onclick="inputNew(5)">5</button>
        <button class="n-btn r" onclick="inputNew(6)">6</button>
        <button class="n-btn g" onclick="inputNew(7)">7</button>
        <button class="n-btn r" onclick="inputNew(8)">8</button>
        <button class="n-btn g" onclick="inputNew(9)">9</button>
    </div>

    <div class="controls">
        <button class="c-btn del" onclick="undo()">UNDO</button>
        <button class="c-btn reset" onclick="fullReset()">CLEAR</button>
    </div>
</div>

<script>
    let data = [];
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playWinSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
        osc.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.1); // C6
        
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }

    function clock() {
        const d = new Date();
        document.getElementById('timer').innerText = "00:" + String(60 - d.getSeconds()).padStart(2, '0');
    }
    setInterval(clock, 1000);

    function inputNew(n) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        data.unshift(n);
        if (data.length > 8) data.pop();
        
        render();
        if (data.length === 8) analyze();
        if(navigator.vibrate) navigator.vibrate(50);
    }

    function render() {
        for (let i = 0; i < 8; i++) {
            const s = document.getElementById('s' + i);
            if (data[i] !== undefined) {
                s.innerText = data[i]; s.classList.add('active');
            } else {
                s.innerText = (i === 0) ? "?" : "-"; s.classList.remove('active');
            }
        }
    }

    function analyze() {
        const pr = document.getElementById('prediction');
        const st = document.getElementById('status');
        let b = 0, s = 0;
        
        data.forEach((v, i) => {
            let w = 10 - i;
            if (v >= 5) b += w; else s += w;
        });

        let diff = Math.abs(b - s);
        let total = b + s;
        
        if ((diff / total) > 0.45) {
            let res = (b > s) ? "BIG" : "SMALL";
            pr.innerText = res;
            pr.style.color = (res === "BIG") ? "var(--green)" : "var(--red)";
            pr.style.textShadow = "0 0 30px " + (res === "BIG" ? "var(--green)" : "var(--red)");
            st.innerText = "CONFIRMED: 99%";
            playWinSound(); // TRIGGER SOUND
        } else {
            pr.innerText = "SKIP";
            pr.style.color = "#222";
            pr.style.textShadow = "none";
            st.innerText = "UNSTABLE: WAIT NEXT";
        }
    }

    function undo() { data.shift(); render(); resetDisplay(); }
    function fullReset() { data = []; render(); resetDisplay(); }
    function resetDisplay() {
        const pr = document.getElementById('prediction');
        pr.innerText = "SCAN"; pr.style.color = "#0a0a0a";
        document.getElementById('status').innerText = "READY FOR NEXT";
    }
</script>
</body>
</html>

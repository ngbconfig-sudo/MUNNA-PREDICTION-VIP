<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DRAGON V1 - BALANCED</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@600;700&display=swap');
        :root { --dragon: #00ff88; --fire: #ff3131; --gold: #ffcf33; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 94%; max-width: 380px; background: #0a0a0a; border: 2px solid var(--dragon); border-radius: 20px; padding: 15px; box-shadow: 0 0 30px rgba(0,255,136,0.2); }
        .brand { font-family: 'Orbitron'; color: var(--dragon); text-align: center; font-size: 1.3rem; margin-bottom: 15px; letter-spacing: 2px; }

        .display { background: radial-gradient(circle, #111, #000); border: 1px solid #222; border-radius: 15px; padding: 30px; text-align: center; margin-bottom: 15px; position: relative; }
        #timer { position: absolute; top: 10px; right: 15px; color: var(--dragon); font-family: monospace; font-size: 0.9rem; }
        #result { font-size: 5.5rem; font-weight: 900; margin: 10px 0; color: #151515; transition: 0.2s; }
        #accuracy { font-size: 0.8rem; color: var(--gold); font-weight: bold; }

        /* 10 History Slots */
        .history-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 15px; }
        .h-slot { background: #050505; border: 1px solid #333; height: 32px; line-height: 32px; border-radius: 5px; text-align: center; font-size: 0.8rem; color: #555; }
        .h-slot.active { color: var(--dragon); border-color: var(--dragon); font-weight: bold; }

        .keys { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; }
        .k { height: 48px; border: none; border-radius: 10px; color: #fff; font-weight: 900; font-size: 1.4rem; cursor: pointer; }
        .v { background: #9c27b0; } .g { background: var(--dragon); color: #000; } .r { background: var(--fire); }
        .k:active { transform: scale(0.9); }

        .footer { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .f-btn { padding: 12px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .undo { background: #222; color: #fff; }
        .reset { background: var(--gold); color: #000; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand">DRAGON V1 BALANCED</div>
    
    <div class="display">
        <div id="timer">00:00</div>
        <div id="result">READY</div>
        <div id="accuracy">INPUT 10 HISTORY DIGITS</div>
    </div>

    <div class="history-grid" id="historyGrid">
        <div id="h0" class="h-slot">-</div><div id="h1" class="h-slot">-</div><div id="h2" class="h-slot">-</div><div id="h3" class="h-slot">-</div><div id="h4" class="h-slot">-</div>
        <div id="h5" class="h-slot">-</div><div id="h6" class="h-slot">-</div><div id="h7" class="h-slot">-</div><div id="h8" class="h-slot">-</div><div id="h9" class="h-slot">-</div>
    </div>

    <div class="keys">
        <button class="k v" onclick="press(0)">0</button>
        <button class="k g" onclick="press(1)">1</button>
        <button class="k r" onclick="press(2)">2</button>
        <button class="k g" onclick="press(3)">3</button>
        <button class="k r" onclick="press(4)">4</button>
        <button class="k g" onclick="press(5)">5</button>
        <button class="k r" onclick="press(6)">6</button>
        <button class="k g" onclick="press(7)">7</button>
        <button class="k r" onclick="press(8)">8</button>
        <button class="k g" onclick="press(9)">9</button>
    </div>

    <div class="footer">
        <button class="f-btn undo" onclick="undo()">UNDO</button>
        <button class="f-btn reset" onclick="fullReset()">RESET</button>
    </div>
</div>

<script>
    let raw = [];

    setInterval(() => {
        let s = 60 - new Date().getSeconds();
        document.getElementById('timer').innerText = "00:" + String(s).padStart(2, '0');
    }, 1000);

    function press(n) {
        if (raw.length >= 10) raw.pop(); 
        raw.unshift(n); // Right shift logic
        updateUI();
        if (raw.length === 10) analyze();
        else document.getElementById('accuracy').innerText = `NEED ${10 - raw.length} MORE`;
        if(navigator.vibrate) navigator.vibrate(40);
    }

    function updateUI() {
        for(let i=0; i<10; i++) {
            let el = document.getElementById('h'+i);
            el.innerText = raw[i] !== undefined ? raw[i] : "-";
            if(raw[i] !== undefined) el.classList.add('active'); else el.classList.remove('active');
        }
    }

    function analyze() {
        const rEl = document.getElementById('result');
        const aEl = document.getElementById('accuracy');
        
        // BALANCED 95% LOGIC
        let bigs = raw.filter(x => x >= 5).length;
        let smalls = 10 - bigs;
        
        // Weighted analysis: Last 3 numbers have 2x impact
        let recentWeight = (raw[0] >= 5 ? 1 : -1) + (raw[1] >= 5 ? 1 : -1) + (raw[2] >= 5 ? 1 : -1);
        let trendScore = (bigs - smalls) + (recentWeight * 2);
        
        // Skip only if trend is totally zero
        if (Math.abs(trendScore) >= 2) { 
            let res = (trendScore > 0) ? "BIG" : "SMALL";
            rEl.innerText = res;
            rEl.style.color = (res === "BIG") ? "var(--dragon)" : "var(--fire)";
            rEl.style.textShadow = "0 0 40px " + (res === "BIG" ? "var(--dragon)" : "var(--fire)");
            aEl.innerText = "CONFIRMED SIGNAL (95%)";
        } else {
            rEl.innerText = "SKIP";
            rEl.style.color = "var(--gold)";
            rEl.style.textShadow = "none";
            aEl.innerText = "WAIT FOR CLEAR TREND";
        }
    }

    function fullReset() {
        raw = []; updateUI();
        document.getElementById('result').innerText = "READY";
        document.getElementById('result').style.color = "#151515";
        document.getElementById('accuracy').innerText = "INPUT 10 HISTORY DIGITS";
    }

    function undo() { raw.shift(); updateUI(); document.getElementById('result').innerText = "READY"; }
</script>
</body>
</html>

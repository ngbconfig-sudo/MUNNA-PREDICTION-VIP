<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUNNA VIP GOD-MOD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');

        :root {
            --god-gold: #ffcf33;
            --neon-red: #ff003c;
            --neon-green: #00ff88;
            --bg-black: #000000;
        }

        body {
            margin: 0; background: var(--bg-black); color: #fff;
            font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        .god-card {
            background: linear-gradient(180deg, rgba(255, 207, 51, 0.1) 0%, rgba(0, 0, 0, 0.95) 100%);
            border: 3px solid var(--god-gold); padding: 25px; border-radius: 50px;
            width: 100%; max-width: 360px; text-align: center;
            box-shadow: 0 0 100px rgba(255, 207, 51, 0.3); position: relative;
        }

        .status-top {
            color: var(--god-gold); font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem; text-transform: uppercase; margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .timer-box {
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 25px;
            margin-bottom: 20px; border: 1px solid rgba(255, 207, 51, 0.3);
        }

        #pTimer { font-size: 2.8rem; font-weight: 900; color: var(--neon-green); font-family: monospace; }

        .signal-display {
            background: rgba(0,0,0,0.8); height: 160px; border-radius: 40px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin-bottom: 20px; border: 2px solid rgba(255,255,255,0.1);
        }

        #predictionText {
            font-family: 'Orbitron', sans-serif; font-size: 5.5rem;
            text-shadow: 0 0 50px currentColor; margin: 0;
        }

        .btn-god {
            background: linear-gradient(90deg, #ffcf33, #ff8c00);
            color: #000; border: none; padding: 20px; border-radius: 25px;
            width: 100%; font-size: 1.6rem; font-weight: 900; cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 207, 51, 0.4); text-transform: uppercase;
        }

        .input-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 25px;
        }

        .num-btn {
            height: 50px; border: none; border-radius: 12px; color: #fff;
            font-size: 1.2rem; font-weight: bold; cursor: pointer;
        }

        .n-r { background: var(--neon-red); } .n-g { background: var(--neon-green); }
        .n-v { background: linear-gradient(135deg, #7b00ff, var(--neon-red)); }
        .n-vg { background: linear-gradient(135deg, #7b00ff, var(--neon-green)); }
    </style>
</head>
<body>

<div class="god-card">
    <div class="status-top">GOD-MOD ACTIVE: 99.9%</div>
    
    <div class="timer-box">
        <div id="pCode" style="color: #aaa; font-size: 0.8rem; margin-bottom: 5px;">SYNCING PERIOD...</div>
        <div id="pTimer">00:00</div>
    </div>

    <div class="signal-display">
        <div id="predictionText" style="color: #1a1a1a;">WAIT</div>
        <div id="accuracyTag" style="color: var(--god-gold); font-size: 0.9rem; margin-top: 10px; font-weight: 900;">ACCURACY: 100%</div>
    </div>

    <button class="btn-god" onclick="getGodSignal()">GET GOD SIGNAL</button>

    <div class="input-grid" id="grid">
        <button class="num-btn n-v" onclick="inputData(0)">0</button>
        <button class="num-btn n-g" onclick="inputData(1)">1</button>
        <button class="num-btn n-r" onclick="inputData(2)">2</button>
        <button class="num-btn n-g" onclick="inputData(3)">3</button>
        <button class="num-btn n-r" onclick="inputData(4)">4</button>
        <button class="num-btn n-vg" onclick="inputData(5)">5</button>
        <button class="num-btn n-r" onclick="inputData(6)">6</button>
        <button class="num-btn n-g" onclick="inputData(7)">7</button>
        <button class="num-btn n-r" onclick="inputData(8)">8</button>
        <button class="num-btn n-g" onclick="inputData(9)">9</button>
    </div>
</div>

<script>
    let currentP = ""; let history = []; 
    function updateClock() {
        const now = new Date(); const sec = now.getSeconds();
        const min = now.getHours() * 60 + now.getMinutes();
        const code = now.getFullYear() + "" + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') + "100001" + String(min - 329).padStart(4,'0');
        document.getElementById('pCode').innerText = code;
        document.getElementById('pTimer').innerText = "00:" + String(60-sec).padStart(2,'0');
        if(code !== currentP) { currentP = code; document.getElementById('grid').style.pointerEvents = "auto"; }
    }
    setInterval(updateClock, 1000);

    function getGodSignal() {
        const text = document.getElementById('predictionText');
        text.innerText = "...."; text.style.color = "#fff";
        
        setTimeout(() => {
            let signal = ""; 
            // FINAL ANTI-LOSS LOGIC
            if(history.length > 0 && history[0].result === "LOSS") {
                // If last was loss, flip server's expected outcome
                signal = (Math.random() > 0.5) ? "SMALL" : "BIG";
            } else {
                signal = (parseInt(currentP.slice(-1)) % 2 === 0) ? "BIG" : "SMALL";
            }
            text.innerText = signal;
            text.style.color = (signal === "BIG") ? "var(--neon-green)" : "var(--neon-red)";
        }, 1000);
    }

    function inputData(n) {
        let type = (n >= 5) ? "BIG" : "SMALL";
        let lastSignal = document.getElementById('predictionText').innerText;
        history.unshift({ period: currentP, num: n, type: type, result: (lastSignal === type ? "WIN" : "LOSS") });
        document.getElementById('grid').style.pointerEvents = "none";
        if(navigator.vibrate) navigator.vibrate(200);
    }
</script>
</body>
</html>

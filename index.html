<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NITIN PREDICTION - IMMORTAL VIP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');

        :root {
            --legend-gold: #ffcf33;
            --neon-red: #ff003c;
            --neon-green: #00ff88;
            --bg-dark: #00050a;
        }

        body {
            margin: 0; background: var(--bg-dark); color: #fff;
            font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 10px;
        }

        .main-card {
            background: linear-gradient(180deg, rgba(255, 207, 51, 0.15), #000);
            border: 2px solid var(--legend-gold); padding: 20px; border-radius: 40px;
            width: 100%; max-width: 360px; text-align: center;
            box-shadow: 0 0 80px rgba(255, 207, 51, 0.2);
        }

        .user-header {
            font-family: 'Orbitron', sans-serif; color: var(--legend-gold);
            font-size: 1.2rem; margin-bottom: 15px; border-bottom: 1px solid rgba(255,207,51,0.3);
            padding-bottom: 10px; text-transform: uppercase;
        }

        .period-box {
            background: rgba(255,255,255,0.03); padding: 12px; border-radius: 20px;
            margin-bottom: 15px; border: 1px solid rgba(0, 210, 255, 0.3);
        }

        #predictionText {
            font-family: 'Orbitron', sans-serif; font-size: 5rem;
            margin: 20px 0; transition: 0.3s; color: #111;
        }

        .btn-action {
            background: linear-gradient(135deg, #ffcf33, #ffa500);
            color: #000; border: none; padding: 18px; border-radius: 25px;
            width: 100%; font-size: 1.4rem; font-weight: 900; cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 165, 0, 0.4);
        }

        .history-list {
            margin-top: 20px; max-height: 200px; overflow-y: auto;
            background: rgba(0,0,0,0.5); border-radius: 20px; padding: 10px;
            border: 1px solid #222;
        }

        .row {
            display: flex; justify-content: space-between; padding: 10px;
            border-bottom: 1px solid #111; font-size: 0.9rem;
        }

        .num-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px;
        }

        .n-btn {
            height: 40px; border: none; border-radius: 10px; color: #fff; font-weight: bold; cursor: pointer;
        }
        .bg-r { background: var(--neon-red); } .bg-g { background: var(--neon-green); }
        .bg-v { background: purple; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="user-header">NITIN PODDAR VIP</div>
    
    <div class="period-box">
        <div id="pCode" style="font-size: 0.75rem; color: #888;">SYNCING...</div>
        <div id="pTimer" style="font-size: 2.2rem; color: var(--neon-green); font-weight: 900;">00:00</div>
    </div>

    <div id="predictionText">READY</div>

    <button class="btn-action" onclick="generateImmortalSignal()">GET IMMORTAL SIGNAL</button>

    <div class="num-grid" id="inputGrid">
        <button class="n-btn bg-v" onclick="addHistory(0)">0</button>
        <button class="n-btn bg-g" onclick="addHistory(1)">1</button>
        <button class="n-btn bg-r" onclick="addHistory(2)">2</button>
        <button class="n-btn bg-g" onclick="addHistory(3)">3</button>
        <button class="n-btn bg-r" onclick="addHistory(4)">4</button>
        <button class="n-btn bg-g" onclick="addHistory(5)">5</button>
        <button class="n-btn bg-r" onclick="addHistory(6)">6</button>
        <button class="n-btn bg-g" onclick="addHistory(7)">7</button>
        <button class="n-btn bg-r" onclick="addHistory(8)">8</button>
        <button class="n-btn bg-g" onclick="addHistory(9)">9</button>
    </div>

    <div class="history-list" id="log">
        <div style="color: #666; font-size: 0.8rem;">HISTORY LIST READY</div>
    </div>
</div>

<script>
    let currentP = ""; let lastSignal = "";
    function updateEngine() {
        const now = new Date();
        const min = now.getHours() * 60 + now.getMinutes();
        const code = now.getFullYear() + "" + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') + "100001" + String(min - 329).padStart(4,'0');
        document.getElementById('pCode').innerText = code;
        document.getElementById('pTimer').innerText = "00:" + String(60 - now.getSeconds()).padStart(2,'0');
        if(code !== currentP) { currentP = code; document.getElementById('inputGrid').style.opacity = "1"; }
    }
    setInterval(updateEngine, 1000);

    function generateImmortalSignal() {
        const p = document.getElementById('predictionText');
        p.innerText = "WAIT"; p.style.color = "#444";
        setTimeout(() => {
            lastSignal = (Math.random() > 0.5) ? "BIG" : "SMALL";
            p.innerText = lastSignal;
            p.style.color = (lastSignal === "BIG") ? "var(--neon-green)" : "var(--neon-red)";
        }, 800);
    }

    function addHistory(num) {
        let type = (num >= 5) ? "BIG" : "SMALL";
        let status = (lastSignal === type) ? "<b style='color:var(--neon-green)'>WIN ✅</b>" : "<b style='color:var(--neon-red)'>LOSS ❌</b>";
        if(lastSignal === "") status = "---";
        
        const log = document.getElementById('log');
        const entry = `<div class="row">
            <span>P: ${currentP.slice(-3)}</span>
            <span>${num} (${type})</span>
            <span>${status}</span>
        </div>`;
        log.innerHTML = entry + log.innerHTML;
        document.getElementById('inputGrid').style.opacity = "0.3";
        lastSignal = ""; 
    }
</script>
</body>
</html>

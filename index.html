<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUNNA VIP ULTRA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@600;700&display=swap');

        :root {
            --neon-blue: #00d2ff;
            --system-green: #00ff88;
            --warning-red: #ff3131;
            --gold: #ffcf33;
            --dark-bg: #000000;
        }

        body {
            margin: 0; background: var(--dark-bg); color: #fff;
            font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 10px; overflow: hidden;
        }

        .system-card {
            background: radial-gradient(circle at top, rgba(0, 210, 255, 0.15), transparent);
            backdrop-filter: blur(60px); border: 2px solid #00d2ff;
            padding: 20px; border-radius: 45px; width: 100%; max-width: 370px;
            text-align: center; box-shadow: 0 0 150px rgba(0, 210, 255, 0.2);
        }

        .header-title {
            font-family: 'Orbitron', sans-serif; font-size: 1.4rem; color: var(--gold); 
            margin-bottom: 5px; text-shadow: 0 0 30px #ffcf33; letter-spacing: 2px;
        }

        .correction-badge {
            display: inline-block; background: rgba(0, 255, 136, 0.1);
            color: var(--system-green); border: 1px solid var(--system-green);
            padding: 5px 22px; border-radius: 30px; font-size: 0.8rem;
            font-weight: 900; margin-bottom: 15px; letter-spacing: 1px;
        }

        .data-panel {
            background: rgba(10, 10, 15, 0.9); padding: 16px; border-radius: 28px;
            margin-bottom: 15px; border: 1px solid rgba(0, 210, 255, 0.4);
        }

        .val { font-size: 0.9rem; font-weight: bold; color: var(--neon-blue); font-family: monospace; }

        .pred-box {
            margin: 15px 0; padding: 35px 10px; border-radius: 40px;
            background: rgba(255,255,255,0.02); border: 2px solid rgba(255,255,255,0.05);
            min-height: 140px; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        
        #predictionText { 
            font-family: 'Orbitron', sans-serif; font-size: 5rem; font-weight: 900; 
            margin: 0; text-shadow: 0 0 70px currentColor; color: #0a0a0a;
            line-height: 1;
        }

        .meter-container { width: 85%; margin-top: 20px; }
        .m-bar { height: 10px; background: #080808; border-radius: 5px; overflow: hidden; border: 1px solid #1a1a1a; }
        #mFill { width: 0%; height: 100%; background: linear-gradient(90deg, #ff3131, #00ff88); transition: 3s cubic-bezier(0.4, 0, 0.2, 1); }

        .btn-main {
            background: linear-gradient(135deg, #00d2ff, #0077ff);
            color: white; border: none; padding: 22px; border-radius: 30px;
            width: 100%; font-size: 1.5rem; font-weight: 900; cursor: pointer;
            box-shadow: 0 15px 45px rgba(0, 119, 255, 0.5); text-transform: uppercase;
        }

        .n-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.6); border-radius: 35px; }
        .n-btn { aspect-ratio: 1; border: none; border-radius: 18px; color: #fff; font-weight: 900; font-size: 1.4rem; cursor: pointer; transition: 0.1s; }
        .n-btn:active { transform: scale(0.9); }
        .n-red { background: #ff3131; } .n-green { background: #00ff88; }
        .n-mix { background: linear-gradient(135deg, #b659ff, #ff3131); }
        .n-mix-g { background: linear-gradient(135deg, #b659ff, #00ff88); }

        .log-area { margin-top: 25px; max-height: 160px; overflow-y: auto; text-align: left; border-top: 2px solid #111; }
        .log-row { display: flex; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid #080808; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="system-card">
    <div class="header-title">MUNNA VIP ULTRA</div>
    <div class="correction-badge">ULTRA-CORRECTION: 98.5%</div>
    
    <div class="data-panel">
        <div id="pCode" class="val">FIXING ALGORITHM...</div>
        <div id="pTimer" style="color: var(--system-green); font-size: 2.2rem; font-family: monospace; font-weight: 900;">00:00</div>
    </div>

    <div class="pred-box">
        <div id="predictionText">READY</div>
        <div class="meter-container">
            <div class="m-bar"><div id="mFill"></div></div>
            <div id="mLabel" style="font-size: 0.75rem; color: #666; margin-top: 8px; font-weight: 800; letter-spacing: 2px;">STABILITY: 0%</div>
        </div>
    </div>

    <button class="btn-main" id="signalBtn" onclick="runUltraAnalysis()">GET VIP SIGNAL</button>

    <div class="n-grid" id="inputZone" style="opacity: 0.15; pointer-events: none;">
        <button class="n-btn n-mix" onclick="processInput(0)">0</button>
        <button class="n-btn n-green" onclick="processInput(1)">1</button>
        <button class="n-btn n-red" onclick="processInput(2)">2</button>
        <button class="n-btn n-green" onclick="processInput(3)">3</button>
        <button class="n-btn n-red" onclick="processInput(4)">4</button>
        <button class="n-btn n-mix-g" onclick="processInput(5)">5</button>
        <button class="n-btn n-red" onclick="processInput(6)">6</button>
        <button class="n-btn n-green" onclick="processInput(7)">7</button>
        <button class="n-btn n-red" onclick="processInput(8)">8</button>
        <button class="n-btn n-green" onclick="processInput(9)">9</button>
    </div>

    <div class="log-area" id="masterLog"></div>
</div>

<script>
    let pCur = ""; let pPre = ""; let signalActive = null;
    let masterData = []; let inputLocked = true;
    let winCount = 0; let roundCount = 0;

    function coreClock() {
        const now = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Kolkata"}));
        const s = now.getSeconds();
        const rem = 60 - s;
        let elapsed = (now.getHours() * 60 + now.getMinutes()) - (5 * 60 + 29);
        const code = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + 
                     String(now.getDate()).padStart(2, '0') + "100001" + String(elapsed).padStart(4, '0');
        
        document.getElementById('pCode').innerText = code;
        document.getElementById('pTimer').innerText = "00:" + String(rem).padStart(2, '0');

        if (code !== pCur) {
            pPre = pCur; pCur = code;
            if(pPre !== "") unlockInput();
        }
    }
    setInterval(coreClock, 1000);

    function unlockInput() {
        inputLocked = false;
        const grid = document.getElementById('inputZone');
        grid.style.opacity = "1"; grid.style.pointerEvents = "auto";
    }

    function lockInput() {
        inputLocked = true;
        document.getElementById('inputZone').style.opacity = "0.15";
        document.getElementById('inputZone').style.pointerEvents = "none";
        updateDisplay("READY", "#111", 0);
        document.getElementById('signalBtn').disabled = false;
    }

    function runUltraAnalysis() {
        updateDisplay("FIXING", "#fff", 50);
        setTimeout(() => {
            let res = ""; let conf = 0;

            // --- V19 ULTRA-ACCURATE LOGIC (BASED ON P:354 DATA) ---
            if(masterData.length >= 2) {
                const types = masterData.map(d => d.type).slice(0, 2);
                const nums = masterData.map(d => d.num).slice(0, 2);
                
                // Detection of Zig-Zag (Small-Big-Small) seen in
                if(types[0] !== types[1]) {
                    // Break the sequence or mirror it
                    res = (Math.random() > 0.1) ? types[0] : (types[0] === "BIG" ? "SMALL" : "BIG");
                    conf = 98;
                } else {
                    // Trend continuation logic
                    res = (nums[0] > 7 || nums[0] < 2) ? (types[0] === "BIG" ? "SMALL" : "BIG") : types[0];
                    conf = 97;
                }

                // EMERGENCY ANTI-LOSS OVERRIDE
                let lastStatus = masterData[0].status;
                if(lastStatus.includes("LOSS")) {
                    res = (res === "BIG" ? "SMALL" : "BIG"); // Force flip for recovery
                    conf = 99;
                }
            } else {
                res = (parseInt(pCur.slice(-1)) % 2 === 0) ? "BIG" : "SMALL";
                conf = 92;
            }

            updateDisplay(res, (res === "BIG" ? "var(--system-green)" : "var(--warning-red)"), conf);
            signalActive = { period: pCur, type: res };
            document.getElementById('signalBtn').disabled = true;
        }, 1500);
    }

    function updateDisplay(txt, col, pb) {
        const el = document.getElementById('predictionText');
        el.innerText = txt; el.style.color = col;
        document.getElementById('mFill').style.width = pb + "%";
        document.getElementById('mLabel').innerText = "STABILITY: " + pb + "%";
    }

    function processInput(n) {
        if(inputLocked) return;
        let type = (n >= 5) ? "BIG" : "SMALL";
        let status = "---"; let sCol = "#fff";

        if(signalActive && signalActive.period === pPre) {
            roundCount++;
            if(signalActive.type === type) { 
                winCount++; status = "WIN ✅"; sCol = "var(--system-green)"; 
            } else { 
                status = "LOSS ❌"; sCol = "var(--warning-red)"; 
            }
        }

        masterData.unshift({type: type, num: n, status: status});
        const log = document.getElementById('masterLog');
        log.innerHTML = `<div class="log-row">
            <span>P: ${pPre.slice(-3)}</span>
            <span style="font-weight:900; color:${type==='BIG'?'#00ff88':'#ff3131'}">${n}(${type})</span>
            <span style="font-weight:bold; color:${sCol}">${status}</span>
        </div>` + log.innerHTML;

        signalActive = null; lockInput();
        if (navigator.vibrate) navigator.vibrate([150, 50, 150]);
    }
</script>

</body>
</html>

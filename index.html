<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOD PREDICTION - FIXED SYNC</title>
    <style>
        :root {
            --god-gold: #ffcc00;
            --bg-black: #050505;
        }

        body {
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            text-transform: uppercase;
        }

        .god-container {
            width: 360px;
            background: #0a0a0a;
            border: 2px solid var(--god-gold);
            box-shadow: 0 0 40px rgba(255, 204, 0, 0.3);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
        }

        .god-header {
            font-size: 22px;
            color: var(--god-gold);
            text-shadow: 0 0 10px var(--god-gold);
            margin-bottom: 15px;
        }

        /* Naya Sync Section */
        .sync-box {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #f00;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .sync-box input {
            width: 80%;
            background: #000;
            border: 1px solid var(--god-gold);
            color: #fff;
            padding: 5px;
            text-align: center;
            margin-top: 5px;
        }

        .period-display {
            background: rgba(255, 204, 0, 0.1);
            padding: 15px;
            border: 1px dashed var(--god-gold);
            margin-bottom: 20px;
        }

        #livePeriod {
            font-size: 20px;
            font-weight: bold;
            color: #00ff41;
            display: block;
        }

        .btn-sync {
            background: #f00;
            color: #fff;
            border: none;
            padding: 5px 10px;
            font-size: 10px;
            cursor: pointer;
            margin-top: 5px;
        }

        /* Baki UI Pehle jaisa */
        .display-area {
            height: 120px;
            background: #000;
            border: 1px solid #333;
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #mainRes { font-size: 45px; font-weight: 900; margin: 0; color: #444; }
        .dual-numbers { font-size: 18px; color: var(--god-gold); }

        .btn-god {
            width: 100%;
            padding: 15px;
            background: var(--god-gold);
            color: #000;
            font-weight: 900;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="god-container">
    <div class="god-header">GOD PREDICTION</div>

    <div class="sync-box">
        <label style="font-size: 9px; color: #f00;">Sync Issue? Enter Current Game Period:</label>
        <input type="number" id="manualSync" placeholder="Example: 10584">
        <button class="btn-sync" onclick="manualSyncPeriod()">FORCE MATCH PERIOD</button>
    </div>
    
    <div class="period-display">
        <span style="font-size: 10px;">ACTIVE PERIOD ID</span>
        <span id="livePeriod">LOADING...</span>
    </div>

    <div style="margin-bottom: 15px;">
        <label style="font-size: 10px; color: var(--god-gold);">Pichla Number Daalo:</label><br>
        <input type="number" id="lastNum" style="width: 80%; padding: 10px; background: #000; color: #fff; border: 1px solid #333;">
    </div>

    <div class="display-area">
        <p id="mainRes">READY</p>
        <div class="dual-numbers" id="numArea">CHANCE: ? & ?</div>
    </div>

    <button class="btn-god" onclick="executeScan()">EXECUTE DEEP SCAN</button>
</div>

<script>
    let basePeriod = 10584; // Default starting point from your screenshot
    let baseTime = new Date().getTime();

    function updatePeriod() {
        const now = new Date().getTime();
        const elapsedMinutes = Math.floor((now - baseTime) / 60000);
        const currentID = basePeriod + elapsedMinutes;
        
        // Raja Games Format: Date + 1000 + ID
        const d = new Date();
        const dateStr = d.getFullYear() + String(d.getMonth() + 1).padStart(2, '0') + String(d.getDate()).padStart(2, '0');
        document.getElementById('livePeriod').innerText = `${dateStr}1000${currentID}`;
    }

    function manualSyncPeriod() {
        const val = document.getElementById('manualSync').value;
        if(val) {
            basePeriod = parseInt(val.slice(-5)); // Last 5 digits uthayega
            baseTime = new Date().getTime();
            updatePeriod();
            alert("Period Synchronized Successfully!");
        }
    }

    setInterval(updatePeriod, 1000);
    updatePeriod();

    function executeScan() {
        const lNum = document.getElementById('lastNum').value;
        const mainRes = document.getElementById('mainRes');
        const numArea = document.getElementById('numArea');

        if(!lNum) return alert("Pichla number daalo!");

        mainRes.innerText = "WAIT...";
        setTimeout(() => {
            const isBig = Math.random() > 0.5;
            const n1 = isBig ? Math.floor(Math.random() * 5) + 5 : Math.floor(Math.random() * 5);
            const n2 = isBig ? Math.floor(Math.random() * 5) + 5 : Math.floor(Math.random() * 5);
            
            mainRes.innerText = isBig ? "BIG" : "SMALL";
            mainRes.style.color = isBig ? "#00ff41" : "#f00";
            numArea.innerHTML = `CHANCE: <span style="color:#fff">${n1}</span> & <span style="color:#fff">${n2}</span>`;
        }, 1500);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING PREDICTOR PRO - ACCURACY MODE</title>
    <style>
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; }
        .main-ui { display: flex; flex-direction: column; align-items: center; padding: 15px; }
        .card { 
            background: #0d0d0d; border: 2px solid #00f2fe; border-radius: 20px; 
            padding: 20px; width: 90%; max-width: 380px; text-align: center;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.3);
        }
        h1 { color: #ffcc00; font-size: 22px; margin: 0; text-shadow: 0 0 10px #ffcc00; }
        .timer-tag { background: #1a1a1a; margin: 15px 0; padding: 10px; border-radius: 10px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin: 15px 0; }
        .n-btn { height: 40px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: #fff; }
        .r { background: #ff4757; } .g { background: #2ed573; }
        .vr { background: linear-gradient(135deg, #a55eea 50%, #ff4757 50%); }
        .vg { background: linear-gradient(135deg, #a55eea 50%, #2ed573 50%); }
        
        /* Accuracy Meter Style */
        .res-box { background: #000; padding: 15px; border-radius: 12px; margin: 15px 0; border: 2px dashed #ffcc00; position: relative; }
        #p-val { font-size: 28px; font-weight: 900; margin-bottom: 5px; }
        .accuracy-meter { font-size: 14px; font-weight: bold; color: #00f2fe; }
        
        .main-btn { background: #ffcc00; color: #000; border: none; padding: 16px; width: 100%; font-weight: bold; border-radius: 10px; cursor: pointer; }
        table { width: 100%; margin-top: 20px; background: #0a0a0a; border-collapse: collapse; font-size: 11px; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid #222; }
        .win { color: #2ed573; font-weight: bold; }
        .loss { color: #ff4757; font-weight: bold; }
    </style>
</head>
<body>

<div class="main-ui">
    <div class="card">
        <h1>KING PREDICTOR</h1>
        <div class="timer-tag">
            <div id="p-id" style="font-size: 12px; color: #888;">PERIOD: ----</div>
            <div id="p-timer" style="font-size: 24px; color: #ff4757; font-weight: bold;">00:00</div>
        </div>

        <p style="font-size: 11px;">TAP LAST RESULT NUMBER:</p>
        <div class="grid">
            <button class="n-btn vr" onclick="addResult(0)">0</button>
            <button class="n-btn g" onclick="addResult(1)">1</button>
            <button class="n-btn r" onclick="addResult(2)">2</button>
            <button class="n-btn g" onclick="addResult(3)">3</button>
            <button class="n-btn r" onclick="addResult(4)">4</button>
            <button class="n-btn vg" onclick="addResult(5)">5</button>
            <button class="n-btn r" onclick="addResult(6)">6</button>
            <button class="n-btn g" onclick="addResult(7)">7</button>
            <button class="n-btn r" onclick="addResult(8)">8</button>
            <button class="n-btn g" onclick="addResult(9)">9</button>
        </div>

        <div class="res-box">
            <div id="p-val">WAITING</div>
            <div id="p-acc" class="accuracy-meter">ACCURACY: --%</div>
            <div id="status" style="font-size: 10px; color: #555; margin-top: 5px;">READY FOR ANALYSIS</div>
        </div>

        <button class="main-btn" onclick="generatePrediction()">GENERATE PREDICTION</button>
    </div>

    <table>
        <thead><tr><th>Period</th><th>Num</th><th>Size</th><th>Result</th></tr></thead>
        <tbody id="h-body"></tbody>
    </table>
</div>

<script>
    let history = [];
    let lastEnteredPeriod = "";
    let activePrediction = null;

    function updateTime() {
        const now = new Date();
        const ist = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Kolkata"}));
        const sec = ist.getSeconds();
        const rem = 60 - sec;
        const elapsed = (ist.getHours() * 60 + ist.getMinutes()) - (5 * 60 + 29);
        const dateStr = ist.getFullYear() + String(ist.getMonth()+1).padStart(2,'0') + String(ist.getDate()).padStart(2,'0');
        
        const period = dateStr + "100001" + String(elapsed < 0 ? 0 : elapsed).padStart(4,'0');
        document.getElementById('p-id').innerText = "PERIOD: " + period;
        document.getElementById('p-timer').innerText = "00:" + String(rem).padStart(2,'0');

        if(rem === 59) {
            document.getElementById('p-val').innerText = "WAITING";
            document.getElementById('p-acc').innerText = "ACCURACY: --%";
        }
    }
    setInterval(updateTime, 1000);

    function addResult(n) {
        const curPeriod = document.getElementById('p-id').innerText.split(": ")[1];
        if (lastEnteredPeriod === curPeriod) {
            alert("Is period ka result already enter kar diya hai!");
            return;
        }

        const pastP = (BigInt(curPeriod) - 1n).toString();
        const size = n >= 5 ? "BIG" : "SMALL";
        
        let outcome = "---";
        // Pura check: Kya pichli prediction sahi thi?
        if (activePrediction && activePrediction.period === pastP) {
            outcome = (size === activePrediction.size) ? "WIN" : "LOSS";
        }

        history.unshift({ p: pastP, n: n, s: size, res: outcome });
        if(history.length > 10) history.pop();
        
        lastEnteredPeriod = curPeriod;
        renderHistory();
        document.getElementById('status').innerText = "LAST DATA RECORDED";
    }

    function renderHistory() {
        const body = document.getElementById('h-body');
        body.innerHTML = history.map(d => `
            <tr>
                <td>...${d.p.slice(-4)}</td>
                <td style="color:#00f2fe; font-weight:bold;">${d.n}</td>
                <td>${d.s}</td>
                <td class="${d.res.toLowerCase()}">${d.res}</td>
            </tr>
        `).join('');
    }

    function generatePrediction() {
        if(history.length < 2) {
            alert("Analysis ke liye kam se kam 2 results add karein!");
            return;
        }

        const out = document.getElementById('p-val');
        const accDisp = document.getElementById('p-acc');
        const status = document.getElementById('status');
        const curPeriod = document.getElementById('p-id').innerText.split(": ")[1];

        status.innerText = "CALCULATING PROBABILITY...";

        setTimeout(() => {
            const h = history;
            let pSize = "";
            let accuracy = 0;

            // Pattern Logic + Accuracy Calculation
            if (h[0].s === h[1].s && h[1].s === (h[2] ? h[2].s : "")) {
                // Long Dragon Trend (3+ same)
                pSize = h[0].s; 
                accuracy = Math.floor(Math.random() * (98 - 92) + 92); // High confidence
                status.innerText = "STRONG DRAGON DETECTED";
            } else if (h[0].s !== h[1].s) {
                // Mirror Trend (Alternate)
                pSize = h[0].s === "BIG" ? "SMALL" : "BIG";
                accuracy = Math.floor(Math.random() * (85 - 75) + 75);
                status.innerText = "MIRROR TREND DETECTED";
            } else {
                // Normal Pattern
                pSize = Math.random() > 0.5 ? "BIG" : "SMALL";
                accuracy = Math.floor(Math.random() * (70 - 60) + 60);
                status.innerText = "AVERAGE CONFIDENCE";
            }

            // Violet Rule
            if (h[0].n === 0 || h[0].n === 5) {
                accuracy = 95;
                pSize = "BIG";
                status.innerText = "VIOLET TREND ALERT";
            }

            out.innerText = pSize;
            out.style.color = pSize === "BIG" ? "#ff4757" : "#2ed573";
            accDisp.innerText = "ACCURACY: " + accuracy + "%";
            
            // Store this prediction to check in next result
            activePrediction = { size: pSize, period: curPeriod };
            
        }, 1000);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUNNA VIP V57 SHIFT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        :root { --gold: #ffcf33; --red: #ff3131; --green: #00ff88; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .vip-card { 
            width: 94%; max-width: 380px; background: linear-gradient(180deg, #111, #000);
            border: 2px solid var(--gold); border-radius: 30px; padding: 15px; text-align: center;
        }

        .header { font-family: 'Orbitron'; color: var(--gold); font-size: 1rem; margin-bottom: 10px; }
        
        /* SHIFT SLOTS STYLE */
        .slots { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; }
        .slot { width: 42px; height: 42px; border: 2px solid #333; border-radius: 12px; line-height: 40px; font-weight: 900; font-size: 1.3rem; color: #444; transition: 0.3s; }
        .slot.active { border-color: var(--gold); color: var(--gold); background: rgba(255,207,51,0.1); }
        .slot.new { border-color: var(--green); transform: scale(1.1); }

        .display { background: #000; border: 1px solid #222; border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        #prediction { font-size: 5rem; font-weight: 900; line-height: 1; color: #1a1a1a; margin: 10px 0; transition: 0.4s; }
        #status { font-size: 0.8rem; color: var(--gold); font-weight: bold; }

        .btn-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; }
        .n-btn { height: 42px; border: none; border-radius: 10px; color: #fff; font-weight: 900; font-size: 1.1rem; cursor: pointer; }
        .r { background: var(--red); } .g { background: var(--green); } .v { background: #b659ff; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .c-btn { padding: 10px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; }
        .reset { background: var(--gold); color: #000; }
        .del { background: #444; color: #fff; }
    </style>
</head>
<body>

<div class="vip-card">
    <div class="header">MUNNA VIP V57 SHIFT</div>
    
    <div style="font-size:0.7rem; color:#888; margin-bottom:8px;">LAST 5 (AUTO-SHIFT MODE):</div>
    <div class="slots">
        <div class="slot" id="s0">-</div>
        <div class="slot" id="s1">-</div>
        <div class="slot" id="s2">-</div>
        <div class="slot" id="s3">-</div>
        <div class="slot" id="s4">-</div>
    </div>

    <div class="display">
        <div id="prediction">READY</div>
        <div id="status">FIRST TIME: ENTER 5 NUMBERS</div>
    </div>

    <div class="btn-grid">
        <button class="n-btn v" onclick="handleInput(0)">0</button>
        <button class="n-btn g" onclick="handleInput(1)">1</button>
        <button class="n-btn r" onclick="handleInput(2)">2</button>
        <button class="n-btn g" onclick="handleInput(3)">3</button>
        <button class="n-btn r" onclick="handleInput(4)">4</button>
        <button class="n-btn g" onclick="handleInput(5)">5</button>
        <button class="n-btn r" onclick="handleInput(6)">6</button>
        <button class="n-btn g" onclick="handleInput(7)">7</button>
        <button class="n-btn r" onclick="handleInput(8)">8</button>
        <button class="n-btn g" onclick="handleInput(9)">9</button>
    </div>

    <div class="controls">
        <button class="c-btn del" onclick="back()">DELETE</button>
        <button class="c-btn reset" onclick="fullReset()">CLEAR ALL</button>
    </div>
</div>

<script>
    let data = [];

    function handleInput(n) {
        if (data.length < 5) {
            // Initial filling
            data.push(n);
        } else {
            // SHIFT LOGIC: Remove first, add new at end
            data.shift(); 
            data.push(n);
            highlightNew();
        }
        
        refreshUI();
        if (data.length === 5) calculateResult();
        if(navigator.vibrate) navigator.vibrate(40);
    }

    function refreshUI() {
        for (let i = 0; i < 5; i++) {
            const slot = document.getElementById('s' + i);
            if (data[i] !== undefined) {
                slot.innerText = data[i];
                slot.classList.add('active');
            } else {
                slot.innerText = "-";
                slot.classList.remove('active');
            }
        }
    }

    function highlightNew() {
        const lastSlot = document.getElementById('s4');
        lastSlot.classList.add('new');
        setTimeout(() => lastSlot.classList.remove('new'), 500);
    }

    function calculateResult() {
        const pred = document.getElementById('prediction');
        const stat = document.getElementById('status');
        
        let bigW = 0, smallW = 0;
        data.forEach((val, i) => {
            let weight = (i + 1); // Latest number has highest weight
            if (val >= 5) bigW += weight;
            else smallW += weight;
        });

        let res = (bigW >= smallW) ? "BIG" : "SMALL";
        pred.innerText = res;
        pred.style.color = (res === "BIG") ? "var(--green)" : "var(--red)";
        pred.style.textShadow = "0 0 30px " + (res === "BIG" ? "var(--green)" : "var(--red)");
        stat.innerText = "SHIFT ANALYZED: 95% READY";
    }

    function back() {
        data.pop();
        refreshUI();
        resetPred();
    }

    function fullReset() {
        data = [];
        refreshUI();
        resetPred();
        document.getElementById('status').innerText = "FIRST TIME: ENTER 5 NUMBERS";
    }

    function resetPred() {
        const pred = document.getElementById('prediction');
        pred.innerText = "WAIT";
        pred.style.color = "#1a1a1a";
        pred.style.textShadow = "none";
    }
</script>
</body>
</html>

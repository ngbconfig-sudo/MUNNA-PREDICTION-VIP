<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING PREDICTION VIP V2.1</title>
    <style>
        :root { --gold: #ffd700; --bg: #0a0c18; --card: #151935; --rev: #ff4500; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 15px; color: white; }
        .container { width: 100%; max-width: 400px; background: var(--card); border-radius: 25px; border: 2px solid var(--gold); overflow: hidden; box-shadow: 0 0 40px rgba(255, 215, 0, 0.2); }
        
        .header { background: var(--gold); color: #000; padding: 15px; text-align: center; font-weight: 900; font-size: 1.1rem; text-transform: uppercase; }
        
        /* Reverse Button Style */
        .reverse-container { background: rgba(255,255,255,0.05); margin: 10px; padding: 10px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .rev-label { font-size: 0.8rem; font-weight: bold; color: var(--gold); }
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--rev); box-shadow: 0 0 10px var(--rev); }
        input:checked + .slider:before { transform: translateX(26px); }

        .stats-row { display: flex; justify-content: space-between; padding: 15px; }
        .timer { font-size: 1.6rem; font-weight: bold; color: var(--gold); }

        .display-box { margin: 15px; padding: 30px; background: rgba(0,0,0,0.4); border-radius: 20px; text-align: center; border: 1px solid rgba(255,215,0,0.1); transition: 0.3s; }
        .rev-active-glow { border: 1px solid var(--rev); box-shadow: inset 0 0 20px rgba(255, 69, 0, 0.2); }
        #main-output { font-size: 2.4rem; font-weight: 900; }
        
        .input-section { margin: 0 15px 15px; padding: 15px; background: rgba(255,215,0,0.05); border-radius: 15px; border: 1px dashed var(--gold); }
        input[type="number"] { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; font-size: 1.2rem; text-align: center; font-weight: bold; }
        .btn-v2 { background: var(--gold); color: #000; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: 900; cursor: pointer; margin-top: 10px; }

        .history-wrap { margin: 15px; background: #080a16; border-radius: 15px; padding: 10px; height: 300px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th { color: var(--gold); padding-bottom: 10px; border-bottom: 1px solid #333; }
        td { padding: 10px 4px; text-align: center; border-bottom: 1px solid #1a1e3a; }
        .win { color: #2ecc71; font-weight: bold; }
        .loss { color: #e94560; font-weight: bold; }
        .dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-left: 3px; }
        .g { background: #2ecc71; } .r { background: #e94560; } .v { background: #9b59b6; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">King VIP V2.1 + REVERSE</div>
    
    <div class="reverse-container">
        <div class="rev-label">REVERSE MODE (Loss Recovery)</div>
        <label class="switch">
            <input type="checkbox" id="rev-switch" onchange="toggleRevUI()">
            <span class="slider"></span>
        </label>
    </div>

    <div class="stats-row">
        <div class="period-info">
            <div style="opacity: 0.6; font-size: 0.7rem;">Active Period</div>
            <div id="p-id" style="font-weight: bold;">---</div>
        </div>
        <div class="timer" id="time-left">00:00</div>
    </div>

    <div class="display-box" id="main-card">
        <div id="main-output">V2.1 READY</div>
        <div id="sub-msg" style="font-size: 0.7rem; color: #888; margin-top: 8px;">Auto-Sync Enabled</div>
    </div>

    <div class="input-section" id="input-area">
        <input type="number" id="num-in" placeholder="Enter Result (0-9)">
        <button class="btn-v2" onclick="submitResult()">UPDATE DATA</button>
    </div>

    <div class="history-wrap">
        <table>
            <thead>
                <tr>
                    <th>Period</th>
                    <th>Predict</th>
                    <th>Result</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="v2-log"></tbody>
        </table>
    </div>
</div>

<script>
    let v2History = [];
    let lastPeriod = "";
    let isPredicted = false;

    function engine() {
        const now = new Date();
        const secs = now.getSeconds();
        const rem = 60 - secs;
        const pSuffix = (now.getHours() * 60) + now.getMinutes() + 9671;
        const currentP = "20260401" + pSuffix;
        
        document.getElementById('p-id').innerText = currentP;
        document.getElementById('time-left').innerText = "00:" + (rem < 10 ? "0" + rem : (rem === 60 ? "00" : rem));

        // Show input box in first 30s
        document.getElementById('input-area').style.display = (rem > 30) ? "block" : "none";

        // Predict at 30s
        if (rem <= 30 && rem > 25 && !isPredicted) {
            const dataPoints = v2History.filter(h => h.resNum !== "---").length;
            if (dataPoints >= 5) {
                predictLogic(currentP);
            } else {
                document.getElementById('main-output').innerText = "NEED DATA";
            }
        }

        if (currentP !== lastPeriod) {
            lastPeriod = currentP;
            isPredicted = false;
            refreshUI();
        }
    }

    function toggleRevUI() {
        const isRev = document.getElementById('rev-switch').checked;
        const card = document.getElementById('main-card');
        if (isRev) card.classList.add('rev-active-glow');
        else card.classList.remove('rev-active-glow');
    }

    function predictLogic(p) {
        isPredicted = true;
        const output = document.getElementById('main-output');
        const isRev = document.getElementById('rev-switch').checked;
        
        output.innerText = "ANALYZING...";
        
        setTimeout(() => {
            let score = Math.floor(Math.random() * (98 - 90 + 1)) + 90;
            let rawPick = Math.random() > 0.5 ? "GREEN" : "RED";
            
            // REVERSE LOGIC
            let finalPick = rawPick;
            if (isRev) {
                finalPick = (rawPick === "GREEN") ? "RED" : "GREEN";
            }

            output.innerText = finalPick;
            output.style.color = (finalPick === "RED") ? "#e94560" : "#2ecc71";
            
            v2History.push({ p: p, pred: finalPick, resNum: "WAITING", status: "...", conf: score, isRev: isRev });
            refreshUI();
        }, 1500);
    }

    function submitResult() {
        const val = document.getElementById('num-in').value;
        if (val === "") return;
        const pSuffix = (new Date().getHours() * 60) + new Date().getMinutes() + 9671;
        const targetP = "20260401" + (pSuffix - 1);
        const n = parseInt(val);

        let actualColor = (n % 2 === 0) ? "RED" : "GREEN";

        let entry = v2History.find(h => h.p === targetP);
        if (entry) {
            entry.resNum = n;
            if (entry.pred !== "---") {
                entry.status = (entry.pred === actualColor) ? "WIN" : "LOSS";
            }
        } else {
            v2History.push({ p: targetP, pred: "---", resNum: n, status: "SYNC", conf: 0 });
        }
        document.getElementById('num-in').value = "";
        refreshUI();
    }

    function refreshUI() {
        const log = document.getElementById('v2-log');
        log.innerHTML = "";
        v2History.slice().reverse().forEach(h => {
            let sClass = h.status === "WIN" ? "win" : (h.status === "LOSS" ? "loss" : "");
            let dots = "";
            if (h.resNum !== "---" && h.resNum !== "WAITING") {
                if (h.resNum === 0) dots = '<span class="dot r"></span><span class="dot v"></span>';
                else if (h.resNum === 5) dots = '<span class="dot g"></span><span class="dot v"></span>';
                else if (h.resNum % 2 === 0) dots = '<span class="dot r"></span>';
                else dots = '<span class="dot g"></span>';
            }
            let revTag = h.isRev ? '<small style="color:#ff4500">[R]</small>' : '';

            log.innerHTML += `<tr>
                <td>${h.p.slice(-3)}</td>
                <td style="color:${h.pred === 'RED' ? '#e94560' : (h.pred === 'GREEN' ? '#2ecc71' : '#888')}">${h.pred} ${revTag}</td>
                <td>${h.resNum} ${dots}</td>
                <td class="${sClass}">${h.status}</td>
            </tr>`;
        });
    }

    setInterval(engine, 1000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING PREDICTOR - FINAL STICKY MODE</title>
    <style>
        body { margin: 0; background: #050505; font-family: 'Segoe UI', sans-serif; color: #fff; overflow-x: hidden; }
        .container { display: flex; flex-direction: column; align-items: center; padding: 15px; }
        .card { 
            background: #000; border: 2px solid #00f2fe; border-radius: 20px; 
            padding: 20px; width: 90%; max-width: 380px; text-align: center;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.4);
        }
        h1 { color: #ffcc00; font-size: 24px; margin: 0; text-shadow: 0 0 15px #ffcc00; }
        .timer-box { background: #111; margin: 15px 0; padding: 10px; border-radius: 12px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin: 15px 0; }
        .n-btn { height: 42px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: #fff; font-size: 16px; }
        .r { background: #ff4757; } .g { background: #2ed573; }
        .vr { background: linear-gradient(135deg, #a55eea 50%, #ff4757 50%); }
        .vg { background: linear-gradient(135deg, #a55eea 50%, #2ed573 50%); }
        
        .res-area { 
            background: #080808; padding: 20px; border-radius: 15px; margin: 15px 0; 
            border: 2px dashed #ffcc00; min-height: 100px; position: relative;
        }
        #p-val { font-size: 32px; font-weight: 900; color: #fff; }
        .accuracy-tag { font-size: 14px; color: #00f2fe; font-weight: bold; margin-top: 5px; }
        
        .main-btn { 
            background: linear-gradient(to right, #ffcc00, #ff9900); color: #000; 
            border: none; padding: 18px; width: 100%; font-weight: 900; border-radius: 12px; cursor: pointer; font-size: 18px;
        }
        .main-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

        table { width: 100%; margin-top: 20px; background: #000; border-collapse: collapse; font-size: 12px; }
        th { padding: 12px; color: #555; border-bottom: 2px solid #222; }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #111; }
        .win { color: #2ed573; font-weight: bold; }
        .loss { color: #ff4757; font-weight: bold; }
        .lock-icon { font-size: 10px; color: #ffcc00; vertical-align: middle; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>KING PREDICTOR</h1>
        <div class="timer-box">
            <div id="p-id" style="font-size: 12px; color: #777;">PERIOD: ----</div>
            <div id="p-timer" style="font-size: 26px; color: #ff4757; font-weight: bold;">00:00</div>
        </div>

        <p id="data-count" style="font-size: 11px; color: #00f2fe;">PLEASE ADD 5 PREVIOUS RESULTS (0/5)</p>
        <div class="grid">
            <button class="n-btn vr" onclick="addHistory(0)">0</button>
            <button class="n-btn g" onclick="addHistory(1)">1</button>
            <button class="n-btn r" onclick="addHistory(2)">2</button>
            <button class="n-btn g" onclick="addHistory(3)">3</button>
            <button class="n-btn r" onclick="addHistory(4)">4</button>
            <button class="n-btn vg" onclick="addHistory(5)">5</button>
            <button class="n-btn r" onclick="addHistory(6)">6</button>
            <button class="n-btn g" onclick="addHistory(7)">7</button>
            <button class="n-btn r" onclick="addHistory(8)">8</button>
            <button class="n-btn g" onclick="addHistory(9)">9</button>
        </div>

        <div class="res-area">
            <div id="p-status" style="font-size: 10px; color: #666;">SYSTEM LOCKED</div>
            <div id="p-val">WAITING</div>
            <div id="p-acc" class="accuracy-tag">ACCURACY: --%</div>
        </div>

        <button id="predict-btn" class="main-btn" onclick="lockAndPredict()" disabled>GET PREDICTION</button>
        <p style="font-size: 10px; color: #444; margin-top: 10px;">ANALYZING JALWA.GAME PATTERNS...</p>
    </div>

    <table>
        <thead><tr><th>Period</th><th>Num</th><th>Size</th><th>Result</th></tr></thead>
        <tbody id="h-body"></tbody>
    </table>
</div>

<script>
    let history = [];
    let lastEnteredPeriod = "";
    let lockedPredictions = {}; // Result ko lock karne ke liye memory

    function updateTime() {
        const now = new Date();
        const ist = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Kolkata"}));
        const sec = ist.getSeconds();
        const rem = 60 - sec;
        const elapsed = (ist.getHours() * 60 + ist.getMinutes()) - (5 * 60 + 29);
        const dateStr = ist.getFullYear() + String(ist.getMonth()+1).padStart(2,'0') + String(ist.getDate()).padStart(2,'0');
        
        const currentPeriod = dateStr + "100001" + String(elapsed < 0 ? 0 : elapsed).padStart(4,'0');
        document.getElementById('p-id').innerText = "PERIOD: " + currentPeriod;
        document.getElementById('p-timer').innerText = "00:" + String(rem).padStart(2,'0');

        // New Period par UI reset nahi hoga, sirf waiting dikhayega agar prediction nahi hai
        if(rem === 59) {
            if(!lockedPredictions[currentPeriod]) {
                document.getElementById('p-val').innerText = "WAITING";
                document.getElementById('p-acc').innerText = "ACCURACY: --%";
            }
        }
    }
    setInterval(updateTime, 1000);

    function addHistory(n) {
        const curP = document.getElementById('p-id').innerText.split(": ")[1];
        if (lastEnteredPeriod === curP) {
            alert("Is period ka result aapne pehle hi daal diya hai!");
            return;
        }

        const pastP = (BigInt(curP) - 1n).toString();
        const size = n >= 5 ? "BIG" : "SMALL";
        
        // Check Win/Loss from Locked Prediction
        let outcome = "---";
        if (lockedPredictions[pastP]) {
            outcome = (size === lockedPredictions[pastP].size) ? "WIN" : "LOSS";
        }

        history.unshift({ p: pastP, n: n, s: size, res: outcome });
        if(history.length > 15) history.pop();
        
        lastEnteredPeriod = curP;
        
        // Counter logic
        const count = history.length;
        document.getElementById('data-count').innerText = count >= 5 ? "DATA SUFFICIENT (STABLE)" : `PLEASE ADD ${5-count} MORE RESULTS (${count}/5)`;
        document.getElementById('predict-btn').disabled = count < 5;

        renderTable();
    }

    function renderTable() {
        const body = document.getElementById('h-body');
        body.innerHTML = history.map(d => `
            <tr>
                <td>...${d.p.slice(-4)}</td>
                <td style="color:#00f2fe; font-weight:bold">${d.n}</td>
                <td>${d.s}</td>
                <td class="${d.res.toLowerCase()}">${d.res}</td>
            </tr>
        `).join('');
    }

    function lockAndPredict() {
        const curP = document.getElementById('p-id').innerText.split(": ")[1];
        const out = document.getElementById('p-val');
        const accDisp = document.getElementById('p-acc');
        const status = document.getElementById('p-status');

        // AGAR IS PERIOD KI PREDICTION PEHLE HI HO CHUKI HAI TOH WAHI DIKHAO
        if (lockedPredictions[curP]) {
            const locked = lockedPredictions[curP];
            out.innerText = locked.size;
            out.style.color = locked.size === "BIG" ? "#ff4757" : "#2ed573";
            accDisp.innerText = "ACCURACY: " + locked.acc + "% (LOCKED)";
            status.innerText = "PREDICTION ALREADY GENERATED";
            return;
        }

        status.innerText = "EXTRACTING PATTERNS...";
        out.innerText = "● ● ●";

        setTimeout(() => {
            const h = history;
            let pSize = "";
            let acc = 0;

            // --- JALWA PHOTOS PATTERN LOGIC ---
            // Pattern: Dragon 1 (3+ same)
            if (h[0].s === h[1].s && h[1].s === h[2].s) {
                pSize = h[0].s; 
                acc = Math.floor(Math.random() * (98 - 94) + 94);
                status.innerText = "DRAGON TREND DETECTED";
            } 
            // Pattern: 1:1 Mirror (Big-Small-Big)
            else if (h[0].s !== h[1].s && h[1].s !== h[2].s) {
                pSize = h[0].s === "BIG" ? "SMALL" : "BIG";
                acc = Math.floor(Math.random() * (92 - 88) + 88);
                status.innerText = "MIRROR TREND DETECTED";
            }
            // Pattern: 2:2 Logic (Small-Small-Big-Big)
            else if (h[0].s === h[1].s && h[0].s !== h[2].s && h[2].s === h[3].s) {
                pSize = h[0].s === "BIG" ? "SMALL" : "BIG";
                acc = 95;
                status.innerText = "2:2 PATTERN DETECTED";
            }
            else {
                pSize = Math.random() > 0.5 ? "BIG" : "SMALL";
                acc = Math.floor(Math.random() * (82 - 76) + 76);
                status.innerText = "SITUATIONAL ANALYSIS";
            }

            // Violet Rule (0/5)
            if (h[0].n === 0 || h[0].n === 5) {
                pSize = "BIG"; acc = 97;
                status.innerText = "VIOLET TREND SHIFT";
            }

            // LOCK THE RESULT FOR THIS PERIOD
            lockedPredictions[curP] = { size: pSize, acc: acc };

            out.innerText = pSize;
            out.style.color = pSize === "BIG" ? "#ff4757" : "#2ed573";
            accDisp.innerText = "ACCURACY: " + acc + "%";
            status.innerText = "PREDICTION SECURED 🔒";

        }, 1200);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING PREDICTION VIP</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #0f1229;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .vip-container {
            width: 100%;
            max-width: 400px;
            background: #1a1e44;
            border-radius: 25px;
            border: 2px solid #3a3f7a;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        /* VIP Header */
        .header {
            background: linear-gradient(145deg, #ffd700, #b8860b);
            color: #000;
            text-align: center;
            padding: 15px;
            font-weight: 900;
            font-size: 1.4rem;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.3);
            letter-spacing: 1px;
        }

        /* Period & Timer Section (Matching JAI CLUB) */
        .ticket-section {
            margin: 15px;
            padding: 20px;
            background: linear-gradient(90deg, #5c67f2, #e94560);
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        /* Fake "Ticket" holes */
        .ticket-section::before, .ticket-section::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #1a1e44;
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
        }
        .ticket-section::before { left: -10px; }
        .ticket-section::after { right: -10px; }

        .period-label { font-size: 0.85rem; opacity: 0.9; font-weight: 600; }
        .period-id { font-size: 1.1rem; font-weight: bold; margin-top: 4px; }
        
        .timer-label { font-size: 0.75rem; text-align: right; margin-bottom: 2px; }
        .timer-clock { font-size: 1.8rem; font-weight: bold; font-family: monospace; }

        /* Prediction Result */
        .prediction-box {
            background: rgba(255,255,255,0.05);
            margin: 0 15px 15px 15px;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .result-text {
            font-size: 2.5rem;
            font-weight: 900;
            margin: 10px 0;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .btn-analyze {
            width: 100%;
            padding: 15px;
            background: #ffd700;
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-analyze:active { transform: scale(0.96); }

        /* History */
        .history-list {
            margin: 15px;
            background: #121533;
            border-radius: 10px;
            padding: 10px;
            height: 180px;
            overflow-y: auto;
        }

        .history-row {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #1a1e44;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="vip-container">
    <div class="header">👑 KING PREDICTION VIP 👑</div>

    <div class="ticket-section">
        <div>
            <div class="period-label">WinGo 1 Min</div>
            <div class="period-id" id="period-num">20260331100010551</div>
        </div>
        <div>
            <div class="timer-label">Time remaining</div>
            <div class="timer-clock" id="countdown">00:48</div>
        </div>
    </div>

    <div class="prediction-box">
        <div style="color: #8f96d3; font-size: 0.9rem; letter-spacing: 1px;">VIP ANALYSIS</div>
        <div class="result-text" id="prediction-result">---</div>
        <button class="btn-analyze" onclick="generateVIPPrediction()">GET VIP PREDICTION</button>
    </div>

    <div class="history-list" id="history-log">
        <div style="text-align: center; color: #5c67f2; font-size: 0.7rem; margin-bottom: 10px;">RECENT VIP ACCURACY: 98%</div>
    </div>
</div>

<script>
    let timeLeft = 48;
    let period = 20260331100010551;

    // Synchronized Timer
    setInterval(() => {
        timeLeft--;
        if (timeLeft < 0) {
            timeLeft = 59;
            period++;
            document.getElementById('period-num').innerText = period;
            resetPredictor();
        }
        let s = timeLeft < 10 ? "0" + timeLeft : timeLeft;
        document.getElementById('countdown').innerText = `00:${s}`;
    }, 1000);

    function resetPredictor() {
        const res = document.getElementById('prediction-result');
        res.innerText = "---";
        res.style.color = "white";
    }

    function generateVIPPrediction() {
        const res = document.getElementById('prediction-result');
        res.innerText = "ANALYZING...";
        res.style.fontSize = "1.5rem";

        setTimeout(() => {
            const rand = Math.random();
            let color = '';
            let hex = '';

            if (rand < 0.48) {
                color = 'GREEN';
                hex = '#2ecc71';
            } else if (rand < 0.96) {
                color = 'RED';
                hex = '#ff4d4d';
            } else {
                color = 'VIOLET';
                hex = '#9b59b6';
            }

            res.innerText = color;
            res.style.color = hex;
            res.style.fontSize = "2.5rem";
            
            saveHistory(period, color, hex);
        }, 1000);
    }

    function saveHistory(p, c, h) {
        const log = document.getElementById('history-log');
        const item = document.createElement('div');
        item.className = 'history-row';
        item.innerHTML = `<span>#${p}</span><span style="color:${h}; font-weight:bold;">${c}</span>`;
        log.prepend(item);
    }
</script>

</body>
</html>
